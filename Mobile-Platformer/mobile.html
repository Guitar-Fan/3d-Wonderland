// ==================== CONTROLS ====================
function setupControls() {
    const joystickZone = document.getElementById('joystick-zone');
    const joystickThumb = document.getElementById('joystick-thumb');
    const joystickBase = document.getElementById('joystick-base');
    const jumpBtn = document.getElementById('jump-btn');
    const attackBtn = document.getElementById('attack-btn');
    const devSecretCode = 'pls';
    let devTypedBuffer = '';

    document.querySelectorAll('.rebind-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
            if (!btn.dataset.action) return;
            beginKeyRemap(btn.dataset.action);
        });
    });

    document.getElementById('reset-keys-btn').addEventListener('click', () => {
        Object.assign(KeyBindings, DefaultKeyBindings);
        activeRemapAction = null;
        saveKeyBindings();
        updateControlPanelUI();
        showMessage('Controls reset');
    });

    // Joystick
    joystickZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.changedTouches[0];
        Input.joystick.active = true;
        Input.joystick.id = touch.identifier;
        updateJoystick(touch);
    });

    joystickZone.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (let t of e.changedTouches) {
            if (t.identifier === Input.joystick.id) {
                updateJoystick(t);
            }
        }
    });

    joystickZone.addEventListener('touchend', (e) => {
        e.preventDefault();
        for (let t of e.changedTouches) {
            if (t.identifier === Input.joystick.id) {
                Input.joystick.active = false;
                Input.joystick.x = 0;
                Input.joystick.y = 0;
                Input.joystick.id = null;
                joystickThumb.style.left = '50px';
                joystickThumb.style.top = '50px';
            }
        }
    });

    function updateJoystick(touch) {
        const rect = joystickBase.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        let dx = touch.clientX - cx;
        let dy = touch.clientY - cy;
        const maxDist = rect.width / 2 - 10;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxDist) {
            dx = dx / dist * maxDist;
            dy = dy / dist * maxDist;
        }
        Input.joystick.x = dx / maxDist;
        Input.joystick.y = dy / maxDist;

        joystickThumb.style.left = (50 + dx - 10) + 'px';
        joystickThumb.style.top = (50 + dy - 10) + 'px';
    }

    function bindActionButton(btn, action) {
        const triggerAction = (e) => {
            if (e && e.cancelable) e.preventDefault();
            action();
        };

        btn.addEventListener('touchstart', triggerAction);
        btn.addEventListener('pointerdown', triggerAction);
        btn.addEventListener('mousedown', triggerAction);
        btn.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                triggerAction(e);
            }
        });
    }

    // Mobile + desktop action controls
    bindActionButton(jumpBtn, () => {
        Input.jump = true;
    });

    bindActionButton(attackBtn, () => {
        Input.attack = true;
    });

    // Keyboard fallback
    document.addEventListener('keydown', (e) => {
        if (activeRemapAction) {
            if (e.code === 'Escape') {
                activeRemapAction = null;
                updateControlPanelUI();
                showMessage('Remap cancelled');
                return;
            }
            if (e.code) {
                e.preventDefault();
                KeyBindings[activeRemapAction] = e.code;
                activeRemapAction = null;
                saveKeyBindings();
                updateControlPanelUI();
                showMessage('Control mapped');
            }
            return;
        }

        const startScreenVisible = !document.getElementById('start-screen').classList.contains('hidden');
        if (startScreenVisible && Game.state === 'menu' && e.key.length === 1) {
            devTypedBuffer = (devTypedBuffer + e.key.toLowerCase()).slice(-devSecretCode.length);
            if (devTypedBuffer === devSecretCode) {
                devTypedBuffer = '';
                openDeveloperLevelSelect();
                return;
            }
        } else if (e.key === 'Escape') {
            devTypedBuffer = '';
        }

        if (isBoundAction('left', e.code)) Input.joystick.x = -1;
        if (isBoundAction('right', e.code)) Input.joystick.x = 1;
        if (isBoundAction('up', e.code)) Input.joystick.y = -1;
        if (isBoundAction('down', e.code)) Input.joystick.y = 1;
        if (isBoundAction('jump', e.code)) Input.jump = true;
        if (isBoundAction('attack', e.code)) Input.attack = true;
        if (isBoundAction('crouch', e.code)) Input.crouch = true;

        if (
            isBoundAction('left', e.code) ||
            isBoundAction('right', e.code) ||
            isBoundAction('up', e.code) ||
            isBoundAction('down', e.code) ||
            isBoundAction('jump', e.code) ||
            isBoundAction('attack', e.code) ||
            isBoundAction('crouch', e.code)
        ) {
            if (e.cancelable) e.preventDefault();
        }
    });

    document.addEventListener('keyup', (e) => {
        if (isBoundAction('left', e.code) && Input.joystick.x < 0) Input.joystick.x = 0;
        if (isBoundAction('right', e.code) && Input.joystick.x > 0) Input.joystick.x = 0;
        if (isBoundAction('up', e.code) && Input.joystick.y < 0) Input.joystick.y = 0;
        if (isBoundAction('down', e.code) && Input.joystick.y > 0) Input.joystick.y = 0;
        if (isBoundAction('crouch', e.code)) Input.crouch = false;
    });

    // Menu buttons
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('start-btn').addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });
    document.getElementById('retry-btn').addEventListener('click', startGame);
    document.getElementById('retry-btn').addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });
    document.getElementById('next-btn').addEventListener('click', nextLevel);
    document.getElementById('next-btn').addEventListener('touchstart', (e) => { e.preventDefault(); nextLevel(); });
}

function openDeveloperLevelSelect() {
    const input = window.prompt(`Dev Jump Unlocked! Enter level (1-${Game.maxLevel})`);
    if (input === null) return;

    const selectedLevel = parseInt(input.trim(), 10);
    if (Number.isNaN(selectedLevel) || selectedLevel < 1 || selectedLevel > Game.maxLevel) {
        showMessage(`Invalid level. Pick 1-${Game.maxLevel}`);
        return;
    }

    startGame(selectedLevel);
}

// ==================== GAME STATE ====================
function startGame(startLevel = 1) {
    Game.state = 'playing';
    Game.score = 0;
    Game.coins = 0;
    Game.lives = 3;
    Game.level = Math.max(1, Math.min(Game.maxLevel, startLevel));
    Game.activePowerup = null;
    Game.powerupTimer = 0;
    Player.invincible = false;
    Player.invincibleTimer = 0;
    resetMovementKit();

    updateUI();
    generateLevel(Game.level);

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('win-screen').classList.add('hidden');
}

function nextLevel() {
    Game.level++;
    if (Game.level > Game.maxLevel) {
        // You beat all levels!
        showMessage('🎉 All Levels Complete! 🎉');
        Game.level = 1;
        Game.score += 500;
    }
    Game.activePowerup = null;
    Game.powerupTimer = 0;
    resetMovementKit();

    generateLevel(Game.level);
    Game.state = 'playing';

    document.getElementById('win-screen').classList.add('hidden');
    updateUI();
}

function gameOver() {
    Game.state = 'gameover';
    document.getElementById('final-score').textContent = `Score: ${Game.score} | Coins: ${Game.coins}`;
    document.getElementById('game-over-screen').classList.remove('hidden');
}

function winLevel() {
    Game.state = 'win';
    Game.score += 200;
    document.getElementById('win-score').textContent = `Score: ${Game.score} | Coins: ${Game.coins}`;
    if (Game.level >= Game.maxLevel) {
        document.getElementById('next-btn').textContent = 'PLAY AGAIN';
    } else {
        document.getElementById('next-btn').textContent = 'NEXT LEVEL';
    }
    document.getElementById('win-screen').classList.remove('hidden');
    updateUI();
}

function respawn() {
    Game.lives--;
    if (Game.lives <= 0) {
        gameOver();
        return;
    }
    Player.position = { ...Game.checkpointPos };
    Player.velocity = { x: 0, y: 0, z: 0 };
    Player.moveMomentum = { x: 0, z: 0 };
    Player.invincible = true;
    Player.invincibleTimer = 2;
    resetMovementKit();
    updateUI();
    showMessage('Respawning...');
}

function resetMovementKit() {
    Player.movementState = 'airborne';
    Player.crouchCharge = 0;
    Player.coyoteTimer = 0;
    Player.jumpBufferTimer = 0;
    Player.wallNormal = { x: 0, z: 0 };
    Player.isWallSliding = false;
    Player.wallJumpLock = 0;
    Player.slideTimer = 0;
    Player.isDiving = false;
    Player.diveTimer = 0;
    Player.diveCancelTimer = 0;
    Player.groundPoundActive = false;
    Player.comboCount = 0;
    Player.comboTimer = 0;
    Player.hasCrystal = false;
    Player.crystalCooldown = 0;
    Player.orbitalVelocity = { x: 0, y: 0, z: 0 };
    Player.radialVelocity = 0;
}

function showMessage(text) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.style.opacity = '1';
    if (Game.messageTimeout) clearTimeout(Game.messageTimeout);
    Game.messageTimeout = setTimeout(() => {
        el.style.opacity = '0';
    }, 1500);
}

function updateUI() {
    document.getElementById('score').textContent = `Score: ${Game.score}`;
    document.getElementById('coins-display').textContent = `🪙 ${Game.coins}`;
    let hearts = '';
    for (let i = 0; i < Game.lives; i++) hearts += '❤';
    document.getElementById('lives').textContent = hearts;

    const powerEl = document.getElementById('powerup-indicator');
    if (Game.activePowerup) {
        const timer = Math.ceil(Game.powerupTimer);
        const icons = { speed: '⚡', shield: '🛡️' };
        powerEl.textContent = `${icons[Game.activePowerup] || ''} ${timer}s`;
    } else {
        powerEl.textContent = '';
    }

    if (Player.comboCount > 1) {
        const comboText = `x${Player.comboCount} Combo`;
        powerEl.textContent = powerEl.textContent ? `${powerEl.textContent} | ${comboText}` : comboText;
    }

    if (Game.finalBoss && Game.finalBoss.active) {
        const hpText = `Boss ${Game.finalBoss.health}/${Game.finalBoss.maxHealth}`;
        const crystalText = Player.hasCrystal ? 'Crystal Ready' : 'Find Crystal';
        powerEl.textContent = powerEl.textContent
            ? `${powerEl.textContent} | ${hpText} | ${crystalText}`
            : `${hpText} | ${crystalText}`;
    }
}

// ==================== PARTICLES ====================
function spawnParticles(x, y, z, color, count, spread) {
    for (let i = 0; i < count; i++) {
        const size = 0.05 + Math.random() * 0.1;
        const geo = new THREE.BoxGeometry(size, size, size);
        const mat = new THREE.MeshBasicMaterial({ color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        mesh.userData.velocity = {
            x: (Math.random() - 0.5) * spread,
            y: Math.random() * spread * 0.7 + 2,
            z: (Math.random() - 0.5) * spread,
        };
        mesh.userData.life = 1;
        Game.scene.add(mesh);
        Game.particles.push(mesh);
    }
}

function updateParticles(dt) {
    for (let i = Game.particles.length - 1; i >= 0; i--) {
        const p = Game.particles[i];
        p.userData.life -= dt * 2;
        if (p.userData.life <= 0) {
            Game.scene.remove(p);
            Game.particles.splice(i, 1);
            continue;
        }
        p.position.x += p.userData.velocity.x * dt;
        p.position.y += p.userData.velocity.y * dt;
        p.position.z += p.userData.velocity.z * dt;
        p.userData.velocity.y -= 10 * dt;
        p.material.opacity = p.userData.life;
        p.material.transparent = true;
        p.rotation.x += dt * 5;
        p.rotation.y += dt * 5;
    }
}

// ==================== COLLISION ====================
function boxCollision(ax, ay, az, aw, ah, ad, bx, by, bz, bw, bh, bd) {
    return (
        ax - aw / 2 < bx + bw / 2 &&
        ax + aw / 2 > bx - bw / 2 &&
        ay - ah / 2 < by + bh / 2 &&
        ay + ah / 2 > by - bh / 2 &&
        az - ad / 2 < bz + bd / 2 &&
        az + ad / 2 > bz - bd / 2
    );
}

function sphereCollision(ax, ay, az, ar, bx, by, bz, br) {
    const dx = ax - bx, dy = ay - by, dz = az - bz;
    return dx * dx + dy * dy + dz * dz < (ar + br) * (ar + br);
}

function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function normalize2D(x, z) {
    const len = Math.sqrt(x * x + z * z);
    if (len < 0.0001) return { x: 0, z: 1 };
    return { x: x / len, z: z / len };
}

function registerComboHit(points, x, y, z, color) {
    Player.comboCount += 1;
    Player.comboTimer = 2.2;
    const comboBonus = Math.max(0, (Player.comboCount - 1) * 5);
    Game.score += points + comboBonus;
    spawnParticles(x, y, z, color || 0xff1744, 14, 4);
    if (Player.comboCount > 1) {
        showMessage(`Combo x${Player.comboCount}`);
    }
    updateUI();
}

function transitionMovementState(isCrouching) {
    if (Player.groundPoundActive) {
        Player.movementState = 'airborne';
        return;
    }
    if (Player.isAttacking) {
        Player.movementState = 'spin';
        return;
    }
    if (Player.isWallSliding) {
        Player.movementState = 'wall';
        return;
    }
    if (Player.slideTimer > 0) {
        Player.movementState = 'slide';
        return;
    }
    if (Player.onGround) {
        Player.movementState = isCrouching ? 'crouch' : 'grounded';
    } else {
        Player.movementState = 'airborne';
    }
}

// ==================== UPDATE ====================
function update(dt) {
    if (Game.state !== 'playing') return;

    dt = Math.min(dt, 0.05); // Cap delta time

    if (Game.finalBoss && Game.finalBoss.active) {
        updateFinalBossLevel(dt);
        return;
    }

    const wasOnGround = Player.onGround;

    if (wasOnGround) {
        Player.coyoteTimer = 0.12;
    } else {
        Player.coyoteTimer = Math.max(0, Player.coyoteTimer - dt);
    }

    if (Player.jumpBufferTimer > 0) Player.jumpBufferTimer -= dt;
    if (Player.wallJumpLock > 0) Player.wallJumpLock -= dt;
    if (Player.slideTimer > 0) Player.slideTimer -= dt;
    if (Player.diveTimer > 0) Player.diveTimer -= dt;
    if (Player.diveCancelTimer > 0) Player.diveCancelTimer -= dt;
    if (Player.comboTimer > 0) {
        Player.comboTimer -= dt;
    } else if (Player.comboCount > 0) {
        Player.comboCount = 0;
        updateUI();
    }

    const isCrouching = Input.crouch || Input.joystick.y > 0.65;

    if (Input.jump) {
        Input.jump = false;
        Player.jumpBufferTimer = 0.16;
    }

    const attackTriggered = Input.attack;
    Input.attack = false;

    // --- Input Processing ---
    const speed = Player.speed * (Game.activePowerup === 'speed' ? 1.5 : 1);
    const inputX = Input.joystick.x;
    const inputZ = Input.joystick.y;
    const targetX = inputX * speed;
    const targetZ = inputZ * speed;

    const accel = Player.onGround ? Game.physics.accelGround : Game.physics.accelAir;
    const friction = isCrouching && Player.onGround
        ? Game.physics.frictionCrouch
        : Game.physics.frictionGround;
    const blend = clamp(accel * dt, 0, 1);
    const drag = clamp(friction * dt, 0, 1);

    if (Math.abs(inputX) > 0.02 || Math.abs(inputZ) > 0.02) {
        Player.moveMomentum.x += (targetX - Player.moveMomentum.x) * blend;
        Player.moveMomentum.z += (targetZ - Player.moveMomentum.z) * blend;
    } else {
        Player.moveMomentum.x += (0 - Player.moveMomentum.x) * drag;
        Player.moveMomentum.z += (0 - Player.moveMomentum.z) * drag;
    }

    if (Player.slideTimer > 0 && Player.onGround) {
        Player.moveMomentum.x *= 0.995;
        Player.moveMomentum.z *= 0.995;
    }

    Player.velocity.x = Player.moveMomentum.x;
    Player.velocity.z = Player.moveMomentum.z;

    const horizontalSpeed = Math.sqrt(Player.velocity.x * Player.velocity.x + Player.velocity.z * Player.velocity.z);
    if (horizontalSpeed > 0.08) {
        Player.facing = normalize2D(Player.velocity.x, Player.velocity.z);
    }

    if (Player.onGround && isCrouching) {
        Player.crouchCharge = Math.min(1.2, Player.crouchCharge + dt * 1.4);
    } else {
        Player.crouchCharge = Math.max(0, Player.crouchCharge - dt * 2);
    }

    // Attack
    if (attackTriggered) {
        if (!Player.onGround && isCrouching && !Player.groundPoundActive) {
            Player.groundPoundActive = true;
            Player.isDiving = false;
            Player.velocity.y = -26;
            Player.moveMomentum.x *= 0.35;
            Player.moveMomentum.z *= 0.35;
            showMessage('Ground Pound!');
            spawnParticles(Player.position.x, Player.position.y, Player.position.z, 0xff9800, 10, 2.5);
        } else if (!Player.onGround && !Player.isDiving) {
            const diveDir = normalize2D(
                Math.abs(inputX) > 0.1 || Math.abs(inputZ) > 0.1 ? inputX : Player.facing.x,
                Math.abs(inputX) > 0.1 || Math.abs(inputZ) > 0.1 ? inputZ : Player.facing.z
            );
            Player.isDiving = true;
            Player.diveTimer = 0.4;
            Player.diveCancelTimer = 0.32;
            Player.velocity.x = diveDir.x * 15;
            Player.velocity.z = diveDir.z * 15;
            Player.moveMomentum.x = Player.velocity.x;
            Player.moveMomentum.z = Player.velocity.z;
            Player.velocity.y = Math.max(Player.velocity.y - 6, -10);
            showMessage('Dive!');
            spawnParticles(Player.position.x, Player.position.y + 0.4, Player.position.z, 0x4fc3f7, 8, 3.5);
        } else if (!Player.isAttacking) {
            Player.isAttacking = true;
            Player.attackTimer = 0.3;
            Player.spinAngle = 0;
            spawnParticles(Player.position.x, Player.position.y + 0.5, Player.position.z, 0xff9800, 5, 3);
        }
    }

    // Attack timer
    if (Player.isAttacking) {
        Player.attackTimer -= dt;
        Player.spinAngle += dt * 20;
        if (Player.attackTimer <= 0) {
            Player.isAttacking = false;
            Player.mesh.rotation.y = Math.atan2(Player.facing.x, Player.facing.z);
        }
    }

    if (Player.isDiving && Player.diveTimer <= 0) {
        Player.isDiving = false;
    }

    // Invincibility
    if (Player.invincible) {
        Player.invincibleTimer -= dt;
        if (Player.invincibleTimer <= 0) {
            Player.invincible = false;
        }
    }

    // Powerup timer
    if (Game.activePowerup) {
        Game.powerupTimer -= dt;
        if (Game.powerupTimer <= 0) {
            Game.activePowerup = null;
            updateUI();
        }
    }

    // --- Physics ---
    const gravityVec = sampleGravityAt(Player.position);
    Player.velocity.y += gravityVec.y * dt;
    Player.moveMomentum.x += gravityVec.x * dt * Game.physics.gravityLateralFactor;
    Player.moveMomentum.z += gravityVec.z * dt * Game.physics.gravityLateralFactor;
    if (Player.isWallSliding && Player.velocity.y < -5.5) {
        Player.velocity.y = -5.5;
    }
    Player.position.x += Player.velocity.x * dt;
    Player.position.y += Player.velocity.y * dt;
    Player.position.z += Player.velocity.z * dt;

    // --- Platform Collision ---
    Player.onGround = false;
    Player.currentPlatform = null;
    Player.isWallSliding = false;
    let landedThisFrame = false;
    let sideContact = false;

    const allPlatforms = [
        ...Game.platforms.map(p => ({
            x: p.mesh.position.x, y: p.mesh.position.y, z: p.mesh.position.z,
            w: p.w, h: p.h, d: p.d, checkpoint: p.checkpoint, moving: false
        })),
        ...Game.movingPlatforms.map(m => ({
            x: m.mesh.position.x, y: m.mesh.position.y, z: m.mesh.position.z,
            w: m.w, h: m.h, d: m.d, checkpoint: false, moving: true, ref: m
        })),
    ];

    for (const plat of allPlatforms) {
        const pTop = plat.y + plat.h / 2;
        const pBot = plat.y - plat.h / 2;

        // Check if player overlaps in XZ
        const overlapX = Player.position.x + 0.3 > plat.x - plat.w / 2 &&
                         Player.position.x - 0.3 < plat.x + plat.w / 2;
        const overlapZ = Player.position.z + 0.3 > plat.z - plat.d / 2 &&
                         Player.position.z - 0.3 < plat.z + plat.d / 2;

        if (overlapX && overlapZ) {
            // Landing on top
            if (Player.velocity.y <= 0 &&
                Player.position.y - 0.5 <= pTop &&
                Player.position.y - 0.5 > pTop - 0.5) {
                Player.position.y = pTop + 0.5;
                Player.velocity.y = 0;
                Player.onGround = true;
                Player.canDoubleJump = true;
                landedThisFrame = !wasOnGround;

                if (plat.moving) {
                    Player.currentPlatform = plat.ref;
                }

                // Checkpoint
                if (plat.checkpoint) {
                    const newCP = { x: plat.x, y: pTop + 1, z: plat.z };
                    if (Game.checkpointPos.x !== newCP.x || Game.checkpointPos.z !== newCP.z) {
                        Game.checkpointPos = newCP;
                        const cpEl = document.getElementById('checkpoint-indicator');
                        cpEl.style.opacity = '1';
                        setTimeout(() => cpEl.style.opacity = '0', 2000);
                        Game.score += 50;
                        updateUI();
                    }
                }
            }
            // Hitting bottom
            else if (Player.velocity.y > 0 &&
                     Player.position.y + 0.8 >= pBot &&
                     Player.position.y + 0.8 < pBot + 0.5) {
                Player.velocity.y = 0;
                Player.position.y = pBot - 0.8;
            }
        }

        // Side collision
        if (Player.position.y + 0.5 > pBot + 0.1 && Player.position.y - 0.3 < pTop - 0.1) {
            if (overlapX && overlapZ) {
                // Push out from sides
                const overlapLeft = (Player.position.x + 0.3) - (plat.x - plat.w / 2);
                const overlapRight = (plat.x + plat.w / 2) - (Player.position.x - 0.3);
                const overlapFront = (Player.position.z + 0.3) - (plat.z - plat.d / 2);
                const overlapBack = (plat.z + plat.d / 2) - (Player.position.z - 0.3);

                const minOverlap = Math.min(overlapLeft, overlapRight, overlapFront, overlapBack);

                if (!Player.onGround || Player.position.y - 0.5 > pTop + 0.1) {
                    sideContact = true;
                    if (minOverlap === overlapLeft) {
                        Player.position.x = plat.x - plat.w / 2 - 0.3;
                        Player.wallNormal = { x: -1, z: 0 };
                    }
                    else if (minOverlap === overlapRight) {
                        Player.position.x = plat.x + plat.w / 2 + 0.3;
                        Player.wallNormal = { x: 1, z: 0 };
                    }
                    else if (minOverlap === overlapFront) {
                        Player.position.z = plat.z - plat.d / 2 - 0.3;
                        Player.wallNormal = { x: 0, z: -1 };
                    }
                    else if (minOverlap === overlapBack) {
                        Player.position.z = plat.z + plat.d / 2 + 0.3;
                        Player.wallNormal = { x: 0, z: 1 };
                    }
                }
            }
        }
    }

    if (!Player.onGround && sideContact && Player.velocity.y < 0 && Player.wallJumpLock <= 0) {
        Player.isWallSliding = true;
    }

    if (landedThisFrame && Player.groundPoundActive) {
        Player.groundPoundActive = false;
        Player.slideTimer = 0.35;
        Player.velocity.y = 0;
        Player.moveMomentum.x *= 0.4;
        Player.moveMomentum.z *= 0.4;
        spawnParticles(Player.position.x, Player.position.y - 0.45, Player.position.z, 0xffc107, 36, 7);
        showMessage('Shockwave!');

        Game.enemies.forEach(e => {
            if (!e.alive) return;
            const dx = e.mesh.position.x - Player.position.x;
            const dz = e.mesh.position.z - Player.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist < 3.6) {
                e.alive = false;
                e.mesh.visible = false;
                registerComboHit(30, e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, 0xffb74d);
            }
        });
    }

    if (landedThisFrame && Player.isDiving) {
        Player.isDiving = false;
        Player.slideTimer = 0.45;
        Player.moveMomentum.x *= 1.1;
        Player.moveMomentum.z *= 1.1;
    }

    const canGroundJump = Player.onGround || Player.coyoteTimer > 0;
    if (Player.jumpBufferTimer > 0) {
        if (Player.isWallSliding) {
            Player.jumpBufferTimer = 0;
            Player.coyoteTimer = 0;
            Player.isWallSliding = false;
            Player.wallJumpLock = 0.18;
            Player.velocity.y = Player.jumpForce * 0.95;
            Player.moveMomentum.x = Player.wallNormal.x * 8 + inputX * 2.5;
            Player.moveMomentum.z = Player.wallNormal.z * 8 + inputZ * 2.5;
            Player.velocity.x = Player.moveMomentum.x;
            Player.velocity.z = Player.moveMomentum.z;
            Player.onGround = false;
            spawnParticles(Player.position.x, Player.position.y, Player.position.z, 0x90caf9, 10, 3);
        } else if (canGroundJump) {
            const jumpFromCrouch = isCrouching && Player.crouchCharge > 0.15;
            const sprintJump = horizontalSpeed > speed * 0.72;
            Player.jumpBufferTimer = 0;
            Player.coyoteTimer = 0;
            Player.onGround = false;
            Player.canDoubleJump = true;

            if (jumpFromCrouch && sprintJump) {
                const dir = normalize2D(Player.facing.x, Player.facing.z);
                Player.velocity.y = Player.jumpForce * 0.78;
                const boost = 11 + Player.crouchCharge * 4;
                Player.moveMomentum.x = dir.x * boost;
                Player.moveMomentum.z = dir.z * boost;
                Player.velocity.x = Player.moveMomentum.x;
                Player.velocity.z = Player.moveMomentum.z;
                Player.slideTimer = 0.15;
                showMessage('Long Jump!');
                spawnParticles(Player.position.x, Player.position.y - 0.5, Player.position.z, 0x80d8ff, 10, 3.5);
            } else if (jumpFromCrouch) {
                const backward = normalize2D(-Player.facing.x, -Player.facing.z);
                Player.velocity.y = Player.jumpForce * (1.22 + Player.crouchCharge * 0.12);
                const kick = 7.5 + Player.crouchCharge * 3;
                Player.moveMomentum.x = backward.x * kick;
                Player.moveMomentum.z = backward.z * kick;
                Player.velocity.x = Player.moveMomentum.x;
                Player.velocity.z = Player.moveMomentum.z;
                showMessage('Backflip!');
                spawnParticles(Player.position.x, Player.position.y - 0.5, Player.position.z, 0xffffff, 12, 3);
            } else {
                Player.velocity.y = Player.jumpForce;
                spawnParticles(Player.position.x, Player.position.y - 0.5, Player.position.z, 0xffffff, 5, 2);
            }

            Player.crouchCharge = 0;
        } else if (!Player.onGround && Player.canDoubleJump && !Player.groundPoundActive) {
            Player.jumpBufferTimer = 0;
            Player.velocity.y = Player.jumpForce * 0.85;
            Player.canDoubleJump = false;
            Player.isDiving = false;
            spawnParticles(Player.position.x, Player.position.y, Player.position.z, 0x4fc3f7, 8, 3);
        }
    }

    // Moving platform carry
    if (Player.currentPlatform) {
        const mp = Player.currentPlatform;
        Player.position.x += mp.mesh.position.x - mp.prevX;
        Player.position.z += mp.mesh.position.z - mp.prevZ;
    }

    // --- Moving Platforms Update ---
    Game.movingPlatforms.forEach(mp => {
        mp.prevX = mp.mesh.position.x;
        mp.prevY = mp.mesh.position.y;
        mp.prevZ = mp.mesh.position.z;

        mp.time += dt * mp.speed;
        if (mp.axis === 'x') {
            mp.mesh.position.x = mp.originX + Math.sin(mp.time) * mp.range;
        } else if (mp.axis === 'y') {
            mp.mesh.position.y = mp.originY + Math.sin(mp.time) * mp.range;
        } else if (mp.axis === 'z') {
            mp.mesh.position.z = mp.originZ + Math.sin(mp.time) * mp.range;
        }
    });

    // --- Collectibles ---
    Game.collectibles.forEach(c => {
        if (c.collected) return;
        c.time += dt * 3;
        c.mesh.position.y = c.y + Math.sin(c.time) * 0.2;
        c.mesh.rotation.z += dt * 2;

        if (sphereCollision(Player.position.x, Player.position.y, Player.position.z, 0.5,
                            c.mesh.position.x, c.mesh.position.y, c.mesh.position.z, 0.3)) {
            c.collected = true;
            c.mesh.visible = false;
            Game.coins++;
            Game.score += 10;
            spawnParticles(c.mesh.position.x, c.mesh.position.y, c.mesh.position.z, 0xffd700, 10, 3);
            updateUI();
        }
    });

    // --- Powerups ---
    Game.powerups.forEach(p => {
        if (p.collected) return;
        p.time += dt * 2;
        p.mesh.position.y = p.y + Math.sin(p.time) * 0.3;
        p.mesh.rotation.y += dt * 2;

        if (sphereCollision(Player.position.x, Player.position.y, Player.position.z, 0.5,
                            p.mesh.position.x, p.mesh.position.y, p.mesh.position.z, 0.4)) {
            p.collected = true;
            p.mesh.visible = false;
            Game.activePowerup = p.type;
            Game.powerupTimer = 8;
            spawnParticles(p.mesh.position.x, p.mesh.position.y, p.mesh.position.z,
                           p.type === 'speed' ? 0x00e5ff : 0xffab00, 15, 4);
            showMessage(p.type === 'speed' ? '⚡ Speed Boost!' : '🛡️ Shield!');
            updateUI();
        }
    });

    // --- Trampolines ---
    Game.trampoline.forEach(t => {
        const dx = Player.position.x - t.x;
        const dz = Player.position.z - t.z;
        const distXZ = Math.sqrt(dx * dx + dz * dz);
        if (distXZ < t.radius + 0.3 &&
            Player.position.y - 0.5 < t.y + 0.2 &&
            Player.position.y - 0.5 > t.y - 0.5 &&
            Player.velocity.y <= 0) {
            Player.velocity.y = t.power;
            Player.onGround = false;
            Player.canDoubleJump = true;
            spawnParticles(t.x, t.y + 0.3, t.z, 0x76ff03, 10, 3);
            showMessage('🚀 Boing!');
        }
    });

    // --- Enemies ---
    Game.enemies.forEach(e => {
        if (!e.alive) return;
        e.time += dt * e.speed;

        if (e.type === 'charger') {
            const dx = Player.position.x - e.mesh.position.x;
            const dz = Player.position.z - e.mesh.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            e.chargeCooldown -= dt;

            if (dist < e.range + 4 && e.chargeCooldown <= 0) {
                const dir = normalize2D(dx, dz);
                e.chargeDir = dir;
                e.chargeCooldown = 1.8;
            }

            const chargeSpeed = e.chargeCooldown > 1.3 ? 5.5 : 2;
            e.mesh.position.x += e.chargeDir.x * chargeSpeed * dt;
            e.mesh.position.z += e.chargeDir.z * chargeSpeed * dt;

            // Keep chargers near their lane so they don't drift forever.
            e.mesh.position.x += (e.originX - e.mesh.position.x) * dt * 0.45;
            e.mesh.position.z += (e.originZ - e.mesh.position.z) * dt * 0.45;
            e.mesh.position.y = e.originY + Math.sin(e.time * 3.5) * 0.16;
        } else if (e.type === 'orbiter') {
            e.mesh.position.x = e.originX + Math.cos(e.time * 1.1) * e.range;
            e.mesh.position.z = e.originZ + Math.sin(e.time * 1.1) * e.range;
            e.mesh.position.y = e.originY + Math.sin(e.time * 2.2) * 0.45;
        } else if (e.type === 'jumper') {
            e.mesh.position.x = e.originX + Math.sin(e.time * 0.9) * e.range;
            e.mesh.position.z = e.originZ + Math.cos(e.time * 0.7) * (e.range * 0.55);
            const hop = Math.max(0, Math.sin(e.time * 2.8));
            e.mesh.position.y = e.originY + hop * 1.15;
        } else {
            e.mesh.position.x = e.originX + Math.sin(e.time) * e.range;
            e.mesh.position.z = e.originZ;
            e.mesh.position.y = e.originY + Math.sin(e.time * 3) * 0.12;
        }

        e.mesh.rotation.y += dt * 3;

        // Collision with player
        if (sphereCollision(Player.position.x, Player.position.y, Player.position.z, 0.4,
                            e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, e.size)) {

            // Attack kills enemy
            if (Player.isAttacking) {
                e.alive = false;
                e.mesh.visible = false;
                registerComboHit(25, e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, 0xff1744);
            }
            // Dive kill / bounce
            else if (Player.isDiving) {
                e.alive = false;
                e.mesh.visible = false;
                Player.velocity.y = 9;
                Player.isDiving = false;
                Player.slideTimer = 0.25;
                registerComboHit(30, e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, 0x4fc3f7);
            }
            // Ground pound impact hit
            else if (Player.groundPoundActive && Player.velocity.y < -10) {
                e.alive = false;
                e.mesh.visible = false;
                registerComboHit(35, e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, 0xffb74d);
            }
            // Stomp kill (landing on top)
            else if (Player.velocity.y < -1 && Player.position.y > e.mesh.position.y) {
                e.alive = false;
                e.mesh.visible = false;
                Player.velocity.y = 10;
                registerComboHit(25, e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, 0xff1744);
            }
            // Player gets hit
            else if (!Player.invincible) {
                if (Game.activePowerup === 'shield') {
                    Game.activePowerup = null;
                    Game.powerupTimer = 0;
                    Player.invincible = true;
                    Player.invincibleTimer = 1;
                    Player.velocity.y = 8;
                    spawnParticles(Player.position.x, Player.position.y, Player.position.z, 0xffab00, 15, 4);
                    showMessage('Shield Broken!');
                    updateUI();
                } else {
                    spawnParticles(Player.position.x, Player.position.y, Player.position.z, 0xff0000, 15, 4);
                    respawn();
                }
            }
        }
    });

    // --- Hazards ---
    Game.hazards.forEach(h => {
        if (boxCollision(Player.position.x, Player.position.y, Player.position.z, 0.6, 1.0, 0.6,
                         h.x, h.y, h.z, h.w, h.h, h.d)) {
            if (!Player.invincible) {
                if (Game.activePowerup === 'shield') {
                    Game.activePowerup = null;
                    Game.powerupTimer = 0;
                    Player.invincible = true;
                    Player.invincibleTimer = 1;
                    Player.velocity.y = 10;
                    showMessage('Shield Broken!');
                    updateUI();
                } else {
                    spawnParticles(Player.position.x, Player.position.y, Player.position.z, 0xff3d00, 15, 4);
                    respawn();
                }
            }
        }
    });

    // --- Goal ---
    if (Game.goalPlatform) {
        Game.goalPlatform.time += dt;
        Game.goalPlatform.mesh.rotation.y += dt * 1.5;

        // Star float
        const star = Game.goalPlatform.mesh.children[2];
        if (star) star.position.y = 3 + Math.sin(Game.goalPlatform.time * 2) * 0.3;

        if (sphereCollision(Player.position.x, Player.position.y, Player.position.z, 0.5,
                            Game.goalPlatform.mesh.position.x,
                            Game.goalPlatform.mesh.position.y + 1.5,
                            Game.goalPlatform.mesh.position.z, 1.5)) {
            spawnParticles(
                Game.goalPlatform.mesh.position.x,
                Game.goalPlatform.mesh.position.y + 1.5,
                Game.goalPlatform.mesh.position.z,
                0xffd700, 30, 5
            );
            winLevel();
        }
    }

    // --- Fall death ---
    if (Player.position.y < -10) {
        respawn();
    }

    transitionMovementState(isCrouching);

    // --- Update Player Mesh ---
    Player.mesh.position.set(Player.position.x, Player.position.y, Player.position.z);

    // Face direction of movement
    if (Math.abs(Player.velocity.x) > 0.08 || Math.abs(Player.velocity.z) > 0.08) {
        const targetAngle = Math.atan2(Player.velocity.x, Player.velocity.z);
        Player.mesh.rotation.y = targetAngle;
    }

    // Attack spin
    if (Player.isAttacking) {
        Player.mesh.rotation.y = Player.spinAngle;
    }

    if (Player.movementState === 'crouch') {
        Player.mesh.scale.y = 0.82;
    } else if (Player.movementState === 'wall') {
        Player.mesh.scale.y = 0.92;
    } else {
        Player.mesh.scale.y += (1 - Player.mesh.scale.y) * clamp(dt * 10, 0, 1);
    }

    // Walking animation
    const walkSpeed = Math.sqrt(Player.velocity.x ** 2 + Player.velocity.z ** 2);
    if (walkSpeed > 0.5 && Player.onGround) {
        const t = Date.now() * 0.01;
        const leftLeg = Player.mesh.getObjectByName('leftLeg');
        const rightLeg = Player.mesh.getObjectByName('rightLeg');
        const leftArm = Player.mesh.getObjectByName('leftArm');
        const rightArm = Player.mesh.getObjectByName('rightArm');
        if (leftLeg) leftLeg.rotation.x = Math.sin(t) * 0.5;
        if (rightLeg) rightLeg.rotation.x = -Math.sin(t) * 0.5;
        if (leftArm) leftArm.rotation.x = -Math.sin(t) * 0.4;
        if (rightArm) rightArm.rotation.x = Math.sin(t) * 0.4;
    } else {
        const leftLeg = Player.mesh.getObjectByName('leftLeg');
        const rightLeg = Player.mesh.getObjectByName('rightLeg');
        const leftArm = Player.mesh.getObjectByName('leftArm');
        const rightArm = Player.mesh.getObjectByName('rightArm');
        if (leftLeg) leftLeg.rotation.x = 0;
        if (rightLeg) rightLeg.rotation.x = 0;
        if (leftArm) leftArm.rotation.x = 0;
        if (rightArm) rightArm.rotation.x = 0;
    }

    // Invincibility flashing
    if (Player.invincible) {
        Player.mesh.visible = Math.sin(Date.now() * 0.02) > 0;
    } else {
        Player.mesh.visible = true;
    }

    // --- Camera Follow ---
    const camTargetX = Player.position.x;
    const camTargetY = Player.position.y + 6;
    const camTargetZ = Player.position.z + 10;

    Game.camera.position.x += (camTargetX - Game.camera.position.x) * 4 * dt;
    Game.camera.position.y += (camTargetY - Game.camera.position.y) * 3 * dt;
    Game.camera.position.z += (camTargetZ - Game.camera.position.z) * 4 * dt;

    Game.camera.lookAt(
        Player.position.x,
        Player.position.y + 1,
        Player.position.z
    );

    // --- Particles ---
    updateParticles(dt);

    // --- PowerupUI update ---
    if (Game.activePowerup) {
        updateUI();
    }
}

// ==================== RENDER LOOP ====================
function animate() {
    requestAnimationFrame(animate);

    const dt = Game.clock.getDelta();
    update(dt);

    Game.renderer.render(Game.scene, Game.camera);
}

function onResize() {
    Game.camera.aspect = window.innerWidth / window.innerHeight;
    Game.camera.updateProjectionMatrix();
    Game.renderer.setSize(window.innerWidth, window.innerHeight);
}

// ==================== START ====================
init();
</script>
