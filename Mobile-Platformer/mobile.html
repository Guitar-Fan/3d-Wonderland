<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sky Runner 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #score {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #lives {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #ff4444;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        #coins-display {
            position: absolute;
            top: 45px;
            left: 20px;
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #level-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            pointer-events: auto;
        }

        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.3);
            left: 15px;
            top: 15px;
        }

        #joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            border: 2px solid rgba(255,255,255,0.7);
            left: 50px;
            top: 50px;
            transition: none;
        }

        #jump-btn {
            position: absolute;
            bottom: 40px;
            right: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.5);
            border: 3px solid rgba(76, 175, 80, 0.8);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        #jump-btn:active {
            background: rgba(76, 175, 80, 0.8);
            transform: scale(0.95);
        }

        #attack-btn {
            position: absolute;
            bottom: 40px;
            right: 130px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(244, 67, 54, 0.5);
            border: 3px solid rgba(244, 67, 54, 0.8);
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        #attack-btn:active {
            background: rgba(244, 67, 54, 0.8);
            transform: scale(0.95);
        }

        #start-screen, #game-over-screen, #win-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            pointer-events: auto;
            z-index: 10;
        }

        #start-screen h1 {
            font-size: 42px;
            color: #4fc3f7;
            text-shadow: 0 0 20px rgba(79,195,247,0.5);
            margin-bottom: 10px;
        }

        #start-screen p {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 30px;
        }

        #controls-panel {
            width: min(560px, 92vw);
            margin-top: 10px;
            padding: 14px;
            border-radius: 14px;
            background: rgba(11, 20, 46, 0.65);
            border: 1px solid rgba(148, 196, 255, 0.3);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        #controls-panel h3 {
            color: #d6e8ff;
            font-size: 16px;
            margin-bottom: 8px;
            text-align: center;
        }

        #controls-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: #d2dcf4;
            font-size: 14px;
            padding: 6px 8px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
        }

        .rebind-btn {
            min-width: 84px;
            padding: 5px 10px;
            border: 1px solid rgba(132, 202, 255, 0.5);
            border-radius: 7px;
            background: rgba(79, 195, 247, 0.2);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }

        .rebind-btn:active {
            transform: scale(0.96);
        }

        #controls-footer {
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        #controls-hint {
            color: #9db3d9;
            font-size: 12px;
            margin: 0;
        }

        #reset-keys-btn {
            padding: 6px 10px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 7px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }

        @media (max-width: 720px) {
            #controls-grid {
                grid-template-columns: 1fr;
            }
        }

        .menu-btn {
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #4fc3f7, #2196f3);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(33,150,243,0.4);
        }

        .menu-btn:active {
            transform: scale(0.95);
        }

        #game-over-screen h1 {
            color: #ff4444;
            font-size: 36px;
            margin-bottom: 10px;
        }

        #win-screen h1 {
            color: #4caf50;
            font-size: 36px;
            margin-bottom: 10px;
        }

        #game-over-screen p, #win-screen p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        #message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #checkpoint-indicator {
            position: absolute;
            top: 75px;
            left: 20px;
            color: #4caf50;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #powerup-indicator {
            position: absolute;
            top: 75px;
            right: 20px;
            color: #ff9800;
            font-size: 14px;
            text-align: right;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="lives">❤❤❤</div>
    <div id="coins-display">🪙 0</div>
    <div id="level-display">Level 1</div>
    <div id="message"></div>
    <div id="checkpoint-indicator">✅ Checkpoint!</div>
    <div id="powerup-indicator"></div>

    <div id="joystick-zone">
        <div id="joystick-base">
            <div id="joystick-thumb"></div>
        </div>
    </div>

    <div id="jump-btn" tabindex="0" role="button" aria-label="Jump">JUMP</div>
    <div id="attack-btn" tabindex="0" role="button" aria-label="Attack">ATK</div>

    <div id="start-screen">
        <h1>🌟 Sky Runner</h1>
        <p>3D Platformer Adventure</p>
        <button class="menu-btn" id="start-btn">START GAME</button>

        <div id="controls-panel">
            <h3>Keyboard Controls</h3>
            <div id="controls-grid">
                <div class="control-row"><span>Move Left</span><button class="rebind-btn" data-action="left">A</button></div>
                <div class="control-row"><span>Move Right</span><button class="rebind-btn" data-action="right">D</button></div>
                <div class="control-row"><span>Move Forward</span><button class="rebind-btn" data-action="up">W</button></div>
                <div class="control-row"><span>Move Back</span><button class="rebind-btn" data-action="down">S</button></div>
                <div class="control-row"><span>Jump</span><button class="rebind-btn" data-action="jump">Space</button></div>
                <div class="control-row"><span>Attack</span><button class="rebind-btn" data-action="attack">X</button></div>
                <div class="control-row"><span>Crouch</span><button class="rebind-btn" data-action="crouch">Shift</button></div>
            </div>
            <div id="controls-footer">
                <p id="controls-hint">Click a key to remap. Secret dev code on menu: pls</p>
                <button id="reset-keys-btn">Reset Keys</button>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1>💀 Game Over</h1>
        <p id="final-score">Score: 0</p>
        <button class="menu-btn" id="retry-btn">RETRY</button>
    </div>

    <div id="win-screen" class="hidden">
        <h1>🏆 You Win!</h1>
        <p id="win-score">Score: 0</p>
        <button class="menu-btn" id="next-btn">NEXT LEVEL</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ================das==== GAME ENGINE ====================
const Game = {
    scene: null,
    camera: null,
    renderer: null,
    clock: null,
    state: 'menu', // menu, playing, gameover, win
    score: 0,
    coins: 0,
    lives: 3,
    level: 1,
    maxLevel: 9,
    gravity: -25,
    physics: {
        gravity: -25,
        accelGround: 16,
        accelAir: 9,
        frictionGround: 4,
        frictionCrouch: 8,
        gravityLateralFactor: 0.35,
    },
    gravityFields: [],
    checkpointPos: null,
    particles: [],
    enemies: [],
    platforms: [],
    collectibles: [],
    movingPlatforms: [],
    hazards: [],
    powerups: [],
    trampoline: [],
    goalPlatform: null,
    finalBoss: null,
    messageTimeout: null,
    activePowerup: null,
    powerupTimer: 0,
};

// ==================== PLAYER ====================
const Player = {
    mesh: null,
    body: null,
    velocity: { x: 0, y: 0, z: 0 },
    moveMomentum: { x: 0, z: 0 },
    facing: { x: 0, z: 1 },
    movementState: 'airborne',
    position: { x: 0, y: 5, z: 0 },
    onGround: false,
    canDoubleJump: true,
    jumpForce: 12,
    speed: 8,
    size: 0.5,
    isAttacking: false,
    attackTimer: 0,
    invincible: false,
    invincibleTimer: 0,
    currentPlatform: null,
    spinAngle: 0,
    crouchCharge: 0,
    coyoteTimer: 0,
    jumpBufferTimer: 0,
    wallNormal: { x: 0, z: 0 },
    isWallSliding: false,
    wallJumpLock: 0,
    slideTimer: 0,
    isDiving: false,
    diveTimer: 0,
    diveCancelTimer: 0,
    groundPoundActive: false,
    comboCount: 0,
    comboTimer: 0,
    hasCrystal: false,
    crystalCooldown: 0,
    orbitalVelocity: { x: 0, y: 0, z: 0 },
    radialVelocity: 0,
};

// ==================== INPUT ====================
const Input = {
    joystick: { x: 0, y: 0, active: false, id: null },
    jump: false,
    attack: false,
    crouch: false,
};

const CONTROL_BINDING_STORAGE_KEY = 'skyRunner3D.keyBindings';
const DefaultKeyBindings = {
    left: 'KeyA',
    right: 'KeyD',
    up: 'KeyW',
    down: 'KeyS',
    jump: 'Space',
    attack: 'KeyX',
    crouch: 'ShiftLeft',
};
const KeyBindings = { ...DefaultKeyBindings };
let activeRemapAction = null;

function keyLabelFromCode(code) {
    if (!code) return '-';
    const special = {
        Space: 'Space',
        ShiftLeft: 'Shift',
        ShiftRight: 'Shift',
        ArrowLeft: 'Left',
        ArrowRight: 'Right',
        ArrowUp: 'Up',
        ArrowDown: 'Down',
        Enter: 'Enter',
    };
    if (special[code]) return special[code];
    if (code.startsWith('Key')) return code.slice(3);
    if (code.startsWith('Digit')) return code.slice(5);
    return code;
}

function loadKeyBindings() {
    try {
        const raw = localStorage.getItem(CONTROL_BINDING_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        Object.keys(DefaultKeyBindings).forEach((action) => {
            const value = parsed[action];
            if (typeof value === 'string' && value.length > 0) {
                KeyBindings[action] = value;
            }
        });
    } catch (err) {
        // If saved data is invalid, silently keep defaults.
    }
}

function saveKeyBindings() {
    localStorage.setItem(CONTROL_BINDING_STORAGE_KEY, JSON.stringify(KeyBindings));
}

function updateControlPanelUI() {
    document.querySelectorAll('.rebind-btn').forEach((btn) => {
        const action = btn.dataset.action;
        if (!action) return;
        btn.textContent = activeRemapAction === action
            ? 'PRESS KEY'
            : keyLabelFromCode(KeyBindings[action]);
    });
}

function beginKeyRemap(action) {
    activeRemapAction = action;
    updateControlPanelUI();
    showMessage(`Press a key for ${action.toUpperCase()}`);
}

function isBoundAction(action, code) {
    if (!code) return false;
    if (action === 'crouch') {
        return code === KeyBindings.crouch || (KeyBindings.crouch === 'ShiftLeft' && code === 'ShiftRight');
    }
    return KeyBindings[action] === code;
}

// ==================== INITIALIZATION ====================
function init() {
    // Scene
    Game.scene = new THREE.Scene();

    // Camera
    Game.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    Game.camera.position.set(0, 10, 12);
    Game.camera.lookAt(0, 0, 0);

    // Renderer be cool now
    Game.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    Game.renderer.setSize(window.innerWidth, window.innerHeight);
    Game.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    Game.renderer.shadowMap.enabled = true;
    Game.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    Game.renderer.setClearColor(0x050816);
    document.body.insertBefore(Game.renderer.domElement, document.getElementById('ui'));

    // Clock
    Game.clock = new THREE.Clock();

    // Lighting
    setupLighting();

    // Create player
    createPlayer();

    loadKeyBindings();
    updateControlPanelUI();

    // Setup controls
    setupControls();

    // Window resize
    window.addEventListener('resize', onResize);

    // Start loop
    animate();
}

function setupLighting() {
    // Ambient
    const ambient = new THREE.AmbientLight(0x2f3f80, 0.5);
    Game.scene.add(ambient);

    // Hemisphere light
    const hemi = new THREE.HemisphereLight(0x334a9d, 0x12081f, 0.45);
    Game.scene.add(hemi);

    // Directional (sun)
    const sun = new THREE.DirectionalLight(0xbcd3ff, 0.85);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 100;
    sun.shadow.camera.left = -30;
    sun.shadow.camera.right = 30;
    sun.shadow.camera.top = 30;
    sun.shadow.camera.bottom = -30;
    Game.scene.add(sun);

    // Fog
    Game.scene.fog = new THREE.FogExp2(0x0c1028, 0.009);
}

function createPlayer() {
    // Player body (character made of simple shapes)
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(0.7, 0.8, 0.5);
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0x2196f3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.4;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.3, 12, 12);
    const headMat = new THREE.MeshLambertMaterial({ color: 0xffcc88 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.1;
    head.castShadow = true;
    group.add(head);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.06, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.1, 1.15, 0.25);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.1, 1.15, 0.25);
    group.add(rightEye);

    // Hat
    const hatGeo = new THREE.ConeGeometry(0.25, 0.4, 8);
    const hatMat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
    const hat = new THREE.Mesh(hatGeo, hatMat);
    hat.position.y = 1.5;
    hat.castShadow = true;
    group.add(hat);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
    const armMat = new THREE.MeshLambertMaterial({ color: 0x2196f3 });
    const leftArm = new THREE.Mesh(armGeo, armMat);
    leftArm.position.set(-0.5, 0.4, 0);
    leftArm.name = 'leftArm';
    group.add(leftArm);
    const rightArm = new THREE.Mesh(armGeo, armMat);
    rightArm.position.set(0.5, 0.4, 0);
    rightArm.name = 'rightArm';
    group.add(rightArm);

    // Legs
    const legGeo = new THREE.BoxGeometry(0.25, 0.5, 0.25);
    const legMat = new THREE.MeshLambertMaterial({ color: 0x1565c0 });
    const leftLeg = new THREE.Mesh(legGeo, legMat);
    leftLeg.position.set(-0.18, -0.2, 0);
    leftLeg.name = 'leftLeg';
    group.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, legMat);
    rightLeg.position.set(0.18, -0.2, 0);
    rightLeg.name = 'rightLeg';
    group.add(rightLeg);

    group.position.set(0, 5, 0);
    Game.scene.add(group);
    Player.mesh = group;
}

// ==================== LEVEL GENERATION ====================
function clearLevel() {
    // Remove old objects
    Game.platforms.forEach(p => Game.scene.remove(p.mesh));
    Game.enemies.forEach(e => Game.scene.remove(e.mesh));
    Game.collectibles.forEach(c => Game.scene.remove(c.mesh));
    Game.hazards.forEach(h => Game.scene.remove(h.mesh));
    Game.movingPlatforms.forEach(m => Game.scene.remove(m.mesh));
    Game.powerups.forEach(p => Game.scene.remove(p.mesh));
    Game.trampoline.forEach(t => Game.scene.remove(t.mesh));
    Game.particles.forEach(p => Game.scene.remove(p));
    if (Game.goalPlatform) Game.scene.remove(Game.goalPlatform.mesh);
    if (Game.finalBoss) {
        if (Game.finalBoss.planetoid && Game.finalBoss.planetoid.mesh) {
            Game.scene.remove(Game.finalBoss.planetoid.mesh);
        }
        if (Game.finalBoss.boss && Game.finalBoss.boss.mesh) {
            Game.scene.remove(Game.finalBoss.boss.mesh);
        }
        (Game.finalBoss.crystals || []).forEach(c => {
            if (c.mesh) Game.scene.remove(c.mesh);
        });
        (Game.finalBoss.projectiles || []).forEach(p => {
            if (p.mesh) Game.scene.remove(p.mesh);
        });
        (Game.finalBoss.enemyProjectiles || []).forEach(p => {
            if (p.mesh) Game.scene.remove(p.mesh);
        });
    }

    Game.platforms = [];
    Game.enemies = [];
    Game.collectibles = [];
    Game.hazards = [];
    Game.movingPlatforms = [];
    Game.powerups = [];
    Game.trampoline = [];
    Game.particles = [];
    Game.goalPlatform = null;
    Game.finalBoss = null;

    // Remove decorations
    const toRemove = [];
    Game.scene.traverse(child => {
        if (child.userData && child.userData.decoration) {
            toRemove.push(child);
        }
    });
    toRemove.forEach(obj => Game.scene.remove(obj));
}

function generateLevel(level) {
    clearLevel();

    // Cosmic sky/fog palette per level
    const skyColors = [0x070b1f, 0x140b2d, 0x040611];
    const fogColors = [0x111a40, 0x281344, 0x0a0f2a];
    Game.renderer.setClearColor(skyColors[(level - 1) % 3]);
    Game.scene.fog = new THREE.FogExp2(fogColors[(level - 1) % 3], 0.01);

    const platformConfigs = getLevelConfig(level);
    applySpacePalette(platformConfigs, level);
    applyLevelPhysics(platformConfigs.physics);
    Game.gravityFields = platformConfigs.gravityFields || [];

    if (platformConfigs.mode === 'boss-planet') {
        setupFinalBossLevel(platformConfigs);
        document.getElementById('level-display').textContent = `Level ${level}`;
        return;
    }

    platformConfigs.platforms.forEach(p => createPlatform(p));
    platformConfigs.movingPlatforms.forEach(p => createMovingPlatform(p));
    platformConfigs.enemies.forEach(e => createEnemy(e));
    platformConfigs.coins.forEach(c => createCoin(c));
    platformConfigs.hazards.forEach(h => createHazard(h));
    platformConfigs.powerups.forEach(p => createPowerup(p));
    platformConfigs.trampolines.forEach(t => createTrampoline(t));

    // Goal
    if (platformConfigs.goal) createGoal(platformConfigs.goal);

    // Major planet set pieces for advanced routes
    createPlanetStructures(platformConfigs);

    // Decorations
    createDecorations(level);

    // Set spawn
    Player.position = { ...platformConfigs.spawn };
    Player.velocity = { x: 0, y: 0, z: 0 };
    Game.checkpointPos = { ...platformConfigs.spawn };

    document.getElementById('level-display').textContent = `Level ${level}`;
}

function applyLevelPhysics(physicsConfig) {
    const defaults = {
        gravity: -25,
        accelGround: 16,
        accelAir: 9,
        frictionGround: 4,
        frictionCrouch: 8,
        gravityLateralFactor: 0.35,
    };
    Game.physics = {
        ...defaults,
        ...(physicsConfig || {}),
    };
    Game.gravity = Game.physics.gravity;
}

function sampleGravityAt(position) {
    let gx = 0;
    let gy = Game.physics.gravity;
    let gz = 0;

    Game.gravityFields.forEach((field) => {
        const dx = field.x - position.x;
        const dy = field.y - position.y;
        const dz = field.z - position.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (dist < 0.0001 || dist > field.radius) return;

        const influence = 1 - (dist / field.radius);
        const strength = field.strength * Math.pow(influence, field.falloff || 1.5);
        gx += (dx / dist) * strength;
        gy += (dy / dist) * strength;
        gz += (dz / dist) * strength;
    });

    return { x: gx, y: gy, z: gz };
}

function createPlanetStructures(config) {
    if (!config.planets || !config.planets.length) return;

    config.planets.forEach((planet) => {
        const bodyGeo = new THREE.SphereGeometry(planet.radius, 24, 24);
        const bodyMat = new THREE.MeshLambertMaterial({
            color: planet.color,
            emissive: planet.color,
            emissiveIntensity: 0.12,
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.set(planet.x, planet.y, planet.z);
        body.userData.decoration = true;
        Game.scene.add(body);

        if (planet.hasRing) {
            const ringGeo = new THREE.TorusGeometry(planet.radius * 1.5, planet.radius * 0.12, 12, 48);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.2,
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI * 0.4;
            ring.rotation.y = planet.ringYaw || 0;
            ring.position.copy(body.position);
            ring.userData.decoration = true;
            Game.scene.add(ring);
        }

        const craterCount = planet.craters || 0;
        for (let i = 0; i < craterCount; i++) {
            const craterGeo = new THREE.RingGeometry(planet.radius * 0.08, planet.radius * 0.16, 18);
            const craterMat = new THREE.MeshBasicMaterial({
                color: 0x0d132f,
                transparent: true,
                opacity: 0.45,
                side: THREE.DoubleSide,
            });
            const crater = new THREE.Mesh(craterGeo, craterMat);

            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const normal = new THREE.Vector3(
                Math.sin(phi) * Math.cos(theta),
                Math.cos(phi),
                Math.sin(phi) * Math.sin(theta)
            );
            crater.position.copy(body.position).add(normal.multiplyScalar(planet.radius * 1.01));
            crater.lookAt(body.position);
            crater.userData.decoration = true;
            Game.scene.add(crater);
        }
    });
}

function normalize3D(x, y, z) {
    const len = Math.sqrt(x * x + y * y + z * z);
    if (len < 0.0001) return { x: 0, y: 1, z: 0 };
    return { x: x / len, y: y / len, z: z / len };
}

function setupFinalBossLevel(config) {
    const bossCfg = config.bossFight;
    if (!bossCfg) return;

    createDecorations(Game.level);

    const center = {
        x: bossCfg.planetoid.x,
        y: bossCfg.planetoid.y,
        z: bossCfg.planetoid.z,
    };
    const surfaceRadius = bossCfg.planetoid.radius + 0.5;

    const planetoidGeo = new THREE.SphereGeometry(bossCfg.planetoid.radius, 48, 48);

        emissive: bossCfg.planetoid.color,

    });
    const planetoidMesh = new THREE.Mesh(planetoidGeo, planetoidMat);
    planetoidMesh.position.set(center.x, center.y, center.z);
    planetoidMesh.userData.decoration = true;
    Game.scene.add(planetoidMesh);

    const bossGroup = new THREE.Group();
    const coreGeo = new THREE.SphereGeometry(1.8, 18, 18);
    const coreMat = new THREE.MeshLambertMaterial({ color: 0xff3d6d, emissive: 0x6a1028, emissiveIntensity: 0.5 });
    const core = new THREE.Mesh(coreGeo, coreMat);
    bossGroup.add(core);

    const eyeGeo = new THREE.SphereGeometry(0.28, 10, 10);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffb0 });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
    eyeL.position.set(-0.5, 0.35, 1.4);
    bossGroup.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
    eyeR.position.set(0.5, 0.35, 1.4);
    bossGroup.add(eyeR);

    const hornGeo = new THREE.ConeGeometry(0.25, 0.9, 8);
    const hornMat = new THREE.MeshLambertMaterial({ color: 0x2d0f1f });
    const hornL = new THREE.Mesh(hornGeo, hornMat);
    hornL.position.set(-0.85, 1.3, 0);
    hornL.rotation.z = 0.5;
    bossGroup.add(hornL);
    const hornR = new THREE.Mesh(hornGeo, hornMat);
    hornR.position.set(0.85, 1.3, 0);
    hornR.rotation.z = -0.5;
    bossGroup.add(hornR);

    const bossDir = normalize3D(
        bossCfg.bossAnchor.x,
        bossCfg.bossAnchor.y,
        bossCfg.bossAnchor.z
    );
    bossGroup.position.set(
        center.x + bossDir.x * (surfaceRadius + 4.2),
        center.y + bossDir.y * (surfaceRadius + 4.2),
        center.z + bossDir.z * (surfaceRadius + 4.2)
    );
    Game.scene.add(bossGroup);

    const crystals = [];
    (bossCfg.crystalSpawns || []).forEach((spawn) => {
        const dir = normalize3D(spawn.x, spawn.y, spawn.z);
        const geo = new THREE.OctahedronGeometry(0.45, 0);
        const mat = new THREE.MeshLambertMaterial({ color: 0x66f2ff, emissive: 0x147d91, emissiveIntensity: 0.45 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(
            center.x + dir.x * (surfaceRadius + 0.5),
            center.y + dir.y * (surfaceRadius + 0.5),
            center.z + dir.z * (surfaceRadius + 0.5)
        );
        Game.scene.add(mesh);
        crystals.push({
            mesh,
            active: true,
            respawn: 0,
            dir,
        });
    });

    const potholes = (bossCfg.potholes || []).map((hole) => {
        const dir = normalize3D(hole.x, hole.y, hole.z);
        return {
            pos: {
                x: center.x + dir.x * surfaceRadius,
                y: center.y + dir.y * surfaceRadius,
                z: center.z + dir.z * surfaceRadius,
            },
            radius: hole.radius,
        };
    });

    Game.finalBoss = {
        active: true,
        maxHealth: bossCfg.maxHealth,
        health: bossCfg.maxHealth,
        phase: 1,
        phaseAnchors: bossCfg.phaseAnchors,
        attackTimer: 0,
        moveTime: 0,
        planetoid: {
            center,
            radius: bossCfg.planetoid.radius,
            mesh: planetoidMesh,
        },
        boss: {
            mesh: bossGroup,
            anchorIndex: 0,
        },
        crystals,
        projectiles: [],
        enemyProjectiles: [],
        potholes,
    };

    const startDir = normalize3D(
        bossCfg.spawnDir.x,
        bossCfg.spawnDir.y,
        bossCfg.spawnDir.z
    );
    Player.position = {
        x: center.x + startDir.x * surfaceRadius,
        y: center.y + startDir.y * surfaceRadius,
        z: center.z + startDir.z * surfaceRadius,
    };
    Player.velocity = { x: 0, y: 0, z: 0 };
    Player.moveMomentum = { x: 0, z: 0 };
    Player.orbitalVelocity = { x: 0, y: 0, z: 0 };
    Player.radialVelocity = 0;
    Game.checkpointPos = { ...Player.position };
    Game.goalPlatform = null;

    showMessage('Final Boss: collect crystals and launch them!');
    updateUI();
}

function updateFinalBossLevel(dt) {
    const bossState = Game.finalBoss;
    if (!bossState || !bossState.active) return;

    dt = Math.min(dt, 0.05);

    if (Player.comboTimer > 0) Player.comboTimer -= dt;
    else if (Player.comboCount > 0) Player.comboCount = 0;
    if (Player.crystalCooldown > 0) Player.crystalCooldown -= dt;
    if (Player.invincible) {
        Player.invincibleTimer -= dt;
        if (Player.invincibleTimer <= 0) Player.invincible = false;
    }
    if (Game.activePowerup) {
        Game.powerupTimer -= dt;
        if (Game.powerupTimer <= 0) {
            Game.activePowerup = null;
            updateUI();
        }
    }

    const center = bossState.planetoid.center;
    const planetRadius = bossState.planetoid.radius + 0.5;

    const toPlayer = {
        x: Player.position.x - center.x,
        y: Player.position.y - center.y,
        z: Player.position.z - center.z,
    };
    const up = normalize3D(toPlayer.x, toPlayer.y, toPlayer.z);

    const forwardHint = normalize3D(
        bossState.boss.mesh.position.x - Player.position.x,
        bossState.boss.mesh.position.y - Player.position.y,
        bossState.boss.mesh.position.z - Player.position.z
    );
    let right = {
        x: forwardHint.y * up.z - forwardHint.z * up.y,
        y: forwardHint.z * up.x - forwardHint.x * up.z,
        z: forwardHint.x * up.y - forwardHint.y * up.x,
    };
    right = normalize3D(right.x, right.y, right.z);
    let forward = {
        x: up.y * right.z - up.z * right.y,
        y: up.z * right.x - up.x * right.z,
        z: up.x * right.y - up.y * right.x,
    };
    forward = normalize3D(forward.x, forward.y, forward.z);

    const speed = (Player.speed + 1.6) * (Game.activePowerup === 'speed' ? 1.35 : 1);
    const inputX = Input.joystick.x;
    const inputZ = Input.joystick.y;

    const desired = {
        x: right.x * inputX * speed + forward.x * inputZ * speed,
        y: right.y * inputX * speed + forward.y * inputZ * speed,
        z: right.z * inputX * speed + forward.z * inputZ * speed,
    };
    const moveBlend = clamp((Player.onGround ? 11 : 7) * dt, 0, 1);
    Player.orbitalVelocity.x += (desired.x - Player.orbitalVelocity.x) * moveBlend;
    Player.orbitalVelocity.y += (desired.y - Player.orbitalVelocity.y) * moveBlend;
    Player.orbitalVelocity.z += (desired.z - Player.orbitalVelocity.z) * moveBlend;

    if (Math.abs(inputX) < 0.02 && Math.abs(inputZ) < 0.02) {
        const drag = clamp(3.2 * dt, 0, 1);
        Player.orbitalVelocity.x += (0 - Player.orbitalVelocity.x) * drag;
        Player.orbitalVelocity.y += (0 - Player.orbitalVelocity.y) * drag;
        Player.orbitalVelocity.z += (0 - Player.orbitalVelocity.z) * drag;
    }

    const jumpPressed = Input.jump;
    Input.jump = false;
    if (jumpPressed && Player.onGround) {
        Player.radialVelocity = Player.jumpForce * 0.85;
        Player.onGround = false;
    }

    const attackPressed = Input.attack;
    Input.attack = false;
    if (attackPressed && Player.hasCrystal && Player.crystalCooldown <= 0) {
        Player.hasCrystal = false;
        Player.crystalCooldown = 0.42;
        const projGeo = new THREE.OctahedronGeometry(0.28, 0);
        const projMat = new THREE.MeshBasicMaterial({ color: 0x8df3ff });
        const projMesh = new THREE.Mesh(projGeo, projMat);
        projMesh.position.set(Player.position.x, Player.position.y + 0.4, Player.position.z);
        Game.scene.add(projMesh);

        const dirToBoss = normalize3D(
            bossState.boss.mesh.position.x - Player.position.x,
            bossState.boss.mesh.position.y - Player.position.y,
            bossState.boss.mesh.position.z - Player.position.z
        );
        bossState.projectiles.push({
            mesh: projMesh,
            vel: { x: dirToBoss.x * 30, y: dirToBoss.y * 30, z: dirToBoss.z * 30 },
            life: 2.4,
        });
        showMessage('Crystal launched!');
    }

    const gravityVec = sampleGravityAt(Player.position);
    const gravAlongUp = gravityVec.x * up.x + gravityVec.y * up.y + gravityVec.z * up.z;
    Player.radialVelocity += gravAlongUp * dt;

    Player.position.x += Player.orbitalVelocity.x * dt + up.x * Player.radialVelocity * dt;
    Player.position.y += Player.orbitalVelocity.y * dt + up.y * Player.radialVelocity * dt;
    Player.position.z += Player.orbitalVelocity.z * dt + up.z * Player.radialVelocity * dt;

    const toPlayerAfter = {
        x: Player.position.x - center.x,
        y: Player.position.y - center.y,
        z: Player.position.z - center.z,
    };
    const newUp = normalize3D(toPlayerAfter.x, toPlayerAfter.y, toPlayerAfter.z);
    let dist = Math.sqrt(toPlayerAfter.x * toPlayerAfter.x + toPlayerAfter.y * toPlayerAfter.y + toPlayerAfter.z * toPlayerAfter.z);

    if (dist <= planetRadius) {
        dist = planetRadius;
        Player.radialVelocity = 0;
        Player.onGround = true;
    } else {
        Player.onGround = false;
    }

    Player.position.x = center.x + newUp.x * dist;
    Player.position.y = center.y + newUp.y * dist;
    Player.position.z = center.z + newUp.z * dist;

    bossState.potholes.forEach((hole) => {
        const dx = Player.position.x - hole.pos.x;
        const dy = Player.position.y - hole.pos.y;
        const dz = Player.position.z - hole.pos.z;
        const d = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (d < hole.radius && Player.onGround && !Player.invincible) {
            showMessage('Fell in a crater!');
            respawn();
        }
    });

    bossState.crystals.forEach((crystal) => {
        if (crystal.active) {
            crystal.mesh.rotation.y += dt * 2.5;
            const bob = Math.sin(performance.now() * 0.004) * 0.08;
            crystal.mesh.position.set(
                center.x + crystal.dir.x * (planetRadius + 0.5 + bob),
                center.y + crystal.dir.y * (planetRadius + 0.5 + bob),
                center.z + crystal.dir.z * (planetRadius + 0.5 + bob)
            );
            if (!Player.hasCrystal && sphereCollision(
                Player.position.x, Player.position.y, Player.position.z, 0.5,
                crystal.mesh.position.x, crystal.mesh.position.y, crystal.mesh.position.z, 0.7
            )) {
                Player.hasCrystal = true;
                crystal.active = false;
                crystal.respawn = 5;
                crystal.mesh.visible = false;
                showMessage('Crystal acquired! Launch it at boss');
            }
        } else {
            crystal.respawn -= dt;
            if (crystal.respawn <= 0) {
                crystal.active = true;
                crystal.mesh.visible = true;
            }
        }
    });

    const phaseThresholds = [bossState.maxHealth * 0.66, bossState.maxHealth * 0.33];
    const targetPhase = bossState.health <= phaseThresholds[1] ? 3 : bossState.health <= phaseThresholds[0] ? 2 : 1;
    if (targetPhase !== bossState.phase) {
        bossState.phase = targetPhase;
        bossState.boss.anchorIndex = Math.min(targetPhase - 1, bossState.phaseAnchors.length - 1);
        showMessage(`Boss Phase ${bossState.phase}!`);
    }

    const anchor = bossState.phaseAnchors[bossState.boss.anchorIndex] || bossState.phaseAnchors[0];
    const anchorDir = normalize3D(anchor.x, anchor.y, anchor.z);
    const bossTarget = {
        x: center.x + anchorDir.x * (planetRadius + 4.2),
        y: center.y + anchorDir.y * (planetRadius + 4.2),
        z: center.z + anchorDir.z * (planetRadius + 4.2),
    };
    const bossMove = clamp((0.8 + bossState.phase * 0.25) * dt, 0, 1);
    bossState.boss.mesh.position.x += (bossTarget.x - bossState.boss.mesh.position.x) * bossMove;
    bossState.boss.mesh.position.y += (bossTarget.y - bossState.boss.mesh.position.y) * bossMove;
    bossState.boss.mesh.position.z += (bossTarget.z - bossState.boss.mesh.position.z) * bossMove;
    bossState.boss.mesh.lookAt(Player.position.x, Player.position.y, Player.position.z);

    bossState.attackTimer -= dt;
    if (bossState.attackTimer <= 0) {
        const fireDir = normalize3D(
            Player.position.x - bossState.boss.mesh.position.x,
            Player.position.y - bossState.boss.mesh.position.y,
            Player.position.z - bossState.boss.mesh.position.z
        );
        const shotGeo = new THREE.SphereGeometry(0.3, 10, 10);
        const shotMat = new THREE.MeshBasicMaterial({ color: 0xff557f });
        const shot = new THREE.Mesh(shotGeo, shotMat);
        shot.position.copy(bossState.boss.mesh.position);
        Game.scene.add(shot);
        const speed = 8 + bossState.phase * 2.4;
        bossState.enemyProjectiles.push({
            mesh: shot,
            vel: { x: fireDir.x * speed, y: fireDir.y * speed, z: fireDir.z * speed },
            life: 5,
        });
        bossState.attackTimer = Math.max(0.75, 2 - bossState.phase * 0.35);
    }

    for (let i = bossState.projectiles.length - 1; i >= 0; i--) {
        const p = bossState.projectiles[i];
        p.life -= dt;
        p.mesh.position.x += p.vel.x * dt;
        p.mesh.position.y += p.vel.y * dt;
        p.mesh.position.z += p.vel.z * dt;
        p.mesh.rotation.y += dt * 8;

        if (p.life <= 0) {
            Game.scene.remove(p.mesh);
            bossState.projectiles.splice(i, 1);
            continue;
        }

        if (sphereCollision(
            p.mesh.position.x, p.mesh.position.y, p.mesh.position.z, 0.4,
            bossState.boss.mesh.position.x, bossState.boss.mesh.position.y, bossState.boss.mesh.position.z, 2.2
        )) {
            Game.scene.remove(p.mesh);
            bossState.projectiles.splice(i, 1);
            bossState.health -= 1;
            Game.score += 60;
            spawnParticles(
                bossState.boss.mesh.position.x,
                bossState.boss.mesh.position.y,
                bossState.boss.mesh.position.z,
                0xff98b6,
                20,
                4
            );
            showMessage('Direct hit!');
            updateUI();
        }
    }

    for (let i = bossState.enemyProjectiles.length - 1; i >= 0; i--) {
        const p = bossState.enemyProjectiles[i];
        p.life -= dt;
        p.mesh.position.x += p.vel.x * dt;
        p.mesh.position.y += p.vel.y * dt;
        p.mesh.position.z += p.vel.z * dt;
        if (p.life <= 0) {
            Game.scene.remove(p.mesh);
            bossState.enemyProjectiles.splice(i, 1);
            continue;
        }

        if (sphereCollision(
            p.mesh.position.x, p.mesh.position.y, p.mesh.position.z, 0.42,
            Player.position.x, Player.position.y, Player.position.z, 0.55
        )) {
            Game.scene.remove(p.mesh);
            bossState.enemyProjectiles.splice(i, 1);
            if (!Player.invincible) {
                spawnParticles(Player.position.x, Player.position.y, Player.position.z, 0xff557f, 12, 3);
                respawn();
            }
        }
    }

    if (bossState.health <= 0) {
        bossState.active = false;
        showMessage('Boss defeated!');
        spawnParticles(bossState.boss.mesh.position.x, bossState.boss.mesh.position.y, bossState.boss.mesh.position.z, 0xffd700, 45, 6);
        Game.score += 1200;
        updateUI();
        setTimeout(() => {
            if (Game.state === 'playing') winLevel();
        }, 800);
    }

    if (Player.position.y < center.y - bossState.planetoid.radius - 20) {
        respawn();
    }

    Player.mesh.position.set(Player.position.x, Player.position.y, Player.position.z);
    Player.mesh.lookAt(
        Player.position.x + forward.x,
        Player.position.y + forward.y,
        Player.position.z + forward.z
    );
    if (Player.invincible) {
        Player.mesh.visible = Math.sin(Date.now() * 0.02) > 0;
    } else {
        Player.mesh.visible = true;
    }

    Game.camera.position.x += ((Player.position.x + newUp.x * 6 - forward.x * 8) - Game.camera.position.x) * 3.8 * dt;
    Game.camera.position.y += ((Player.position.y + newUp.y * 6 - forward.y * 8) - Game.camera.position.y) * 3.8 * dt;
    Game.camera.position.z += ((Player.position.z + newUp.z * 6 - forward.z * 8) - Game.camera.position.z) * 3.8 * dt;
    Game.camera.lookAt(Player.position.x + newUp.x * 1.1, Player.position.y + newUp.y * 1.1, Player.position.z + newUp.z * 1.1);

    updateParticles(dt);
    updateUI();
}

            moving: 0xbdefff,
            hazard: 0xff77b4,
            trampoline: 0xb4ff8a,
            goal: 0xffea9c,
        },
    };

    const palette = palettes[level] || palettes[1];
    config.platforms.forEach((platform, idx) => {
        platform.color = platform.checkpoint
            ? 0xffffff
            : palette.platforms[idx % palette.platforms.length];
    });

    if (config.platforms.length) {
        config.platforms[config.platforms.length - 1].color = palette.goal;
    }

    config.movingPlatforms.forEach((platform) => {
        platform.color = palette.moving;
    });

    config.hazards.forEach((hazard) => {
        hazard.color = (level >= 7 || hazard.type === 'pit') ? 0x1b233b : palette.hazard;
    });

    config.trampolines.forEach((trampoline) => {
        trampoline.color = palette.trampoline;
    });
}

function createPlatform(config) {
    const geo = new THREE.BoxGeometry(config.w, config.h, config.d);
    const mat = new THREE.MeshLambertMaterial({ color: config.color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(config.x, config.y, config.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    Game.scene.add(mesh);

    const platform = {
        mesh,
        x: config.x, y: config.y, z: config.z,
        w: config.w, h: config.h, d: config.d,
        checkpoint: config.checkpoint || false,
    };

    // Add checkpoint flag
    if (config.checkpoint) {
        const poleGeo = new THREE.CylinderGeometry(0.05, 0.05, 2, 8);
        const poleMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(config.x + config.w / 2 - 0.3, config.y + 1.5, config.z);
        pole.userData.decoration = true;
        Game.scene.add(pole);

        const flagGeo = new THREE.PlaneGeometry(0.6, 0.4);
        const flagMat = new THREE.MeshLambertMaterial({ color: 0xff0000, side: THREE.DoubleSide });
        const flag = new THREE.Mesh(flagGeo, flagMat);
        flag.position.set(config.x + config.w / 2, config.y + 2.2, config.z);
        flag.userData.decoration = true;
        Game.scene.add(flag);
    }

    Game.platforms.push(platform);
}

function createMovingPlatform(config) {
    const geo = new THREE.BoxGeometry(config.w, config.h, config.d);
    const mat = new THREE.MeshLambertMaterial({ color: config.color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(config.x, config.y, config.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    Game.scene.add(mesh);

    // Glow edges
    const edgeGeo = new THREE.EdgesGeometry(geo);
    const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    const edges = new THREE.LineSegments(edgeGeo, edgeMat);
    mesh.add(edges);

    Game.movingPlatforms.push({
        mesh,
        originX: config.x, originY: config.y, originZ: config.z,
        w: config.w, h: config.h, d: config.d,
        axis: config.axis, range: config.range, speed: config.speed,
        time: Math.random() * Math.PI * 2,
        prevX: config.x, prevY: config.y, prevZ: config.z,
    });
}

function createEnemy(config) {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.SphereGeometry(0.4, 10, 10);
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0xff1744 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    group.add(body);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const lEye = new THREE.Mesh(eyeGeo, eyeMat);
    lEye.position.set(-0.15, 0.1, 0.35);
    group.add(lEye);
    const rEye = new THREE.Mesh(eyeGeo, eyeMat);
    rEye.position.set(0.15, 0.1, 0.35);
    group.add(rEye);

    // Pupils
    const pupilGeo = new THREE.SphereGeometry(0.05, 8, 8);
    const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const lPupil = new THREE.Mesh(pupilGeo, pupilMat);
    lPupil.position.set(-0.15, 0.1, 0.42);
    group.add(lPupil);
    const rPupil = new THREE.Mesh(pupilGeo, pupilMat);
    rPupil.position.set(0.15, 0.1, 0.42);
    group.add(rPupil);
