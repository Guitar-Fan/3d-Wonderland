<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Realistic Goku - Three.js</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        #controls button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b00, #ff9500);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        #controls button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 150, 0, 0.5);
        }
        #controls button.active {
            background: linear-gradient(135deg, #00aaff, #0066ff);
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.7);
        }
    </style>
</head>
<body>
    <div id="info">🐉 Ultra Realistic Goku | Arrow keys to walk/turn | Drag to rotate | Scroll to zoom</div>
    <div id="controls">
        <button onclick="setMode('base')">Base Form</button>
        <button onclick="setMode('ssj')">Super Saiyan</button>
        <button onclick="setMode('ssb')">SSJ Blue</button>
        <button onclick="setMode('ui')">Ultra Instinct</button>
        <button onclick="toggleAura()">Toggle Aura</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
        if (window.eruda) {
            window.eruda.init();
        }
    </script>
    <script>
        // ============================================
        // SCENE SETUP
        // ============================================
        let scene, camera, renderer, clock;
        let gokuGroup, auraGroup, hairGroup;
        let currentMode = 'base';
        let showAura = true;
        let mixer;
        let materials = {};
        let hairMeshes = [];
        let eyeMeshes = [];
        let auraMeshes = [];
        let particleSystems = [];
        let groundPlane;
        let rig = {};
        let orbitState;
        const moveState = {
            keys: {
                ArrowUp: false,
                ArrowDown: false,
                ArrowLeft: false,
                ArrowRight: false,
            },
            heading: 0,
            speed: 0,
            walkCycle: 0,
            verticalOffset: 0,
        };

        const MOVE_CONFIG = {
            forwardSpeed: 2.8,
            backwardSpeed: 1.7,
            turnSpeed: 2.8,
            acceleration: 9.0,
            deceleration: 12.0,
            gaitRate: 8.5,
            maxRange: 12.0,
        };
        const moveForward = new THREE.Vector3();
        const orbitFollowTarget = new THREE.Vector3();

        const SKIN_COLOR = new THREE.Color(0.96, 0.82, 0.68);
        const GI_ORANGE = new THREE.Color(1.0, 0.45, 0.05);
        const GI_BLUE_UNDER = new THREE.Color(0.15, 0.2, 0.55);
        const BELT_COLOR = new THREE.Color(0.15, 0.2, 0.55);
        const BOOT_COLOR = new THREE.Color(0.15, 0.2, 0.55);
        const HAIR_BLACK = new THREE.Color(0.02, 0.02, 0.04);
        const SSJ_GOLD = new THREE.Color(1.0, 0.85, 0.1);
        const SSB_BLUE = new THREE.Color(0.1, 0.6, 1.0);
        const UI_SILVER = new THREE.Color(0.85, 0.85, 0.92);

        init();
        animate();

        function init() {
            clock = new THREE.Clock();

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);
            camera.lookAt(0, 2.5, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.body.appendChild(renderer.domElement);

            // Lights
            setupLights();

            // Ground
            setupGround();

            // Background
            setupBackground();

            // Build Goku
            gokuGroup = new THREE.Group();
            scene.add(gokuGroup);
            buildGoku();

            // Aura
            auraGroup = new THREE.Group();
            scene.add(auraGroup);
            createAura();

            // Particles
            createParticles();

            // Controls (manual orbit)
            setupControls();
            setupMovementControls();

            window.addEventListener('resize', onResize);
        }

        function setupLights() {
            // Ambient
            const ambient = new THREE.AmbientLight(0x334466, 0.4);
            scene.add(ambient);

            // Main directional (sun-like)
            const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.camera.left = -10;
            dirLight.shadow.camera.right = 10;
            dirLight.shadow.camera.top = 10;
            dirLight.shadow.camera.bottom = -10;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);

            // Rim light (back)
            const rimLight = new THREE.DirectionalLight(0x4488ff, 0.6);
            rimLight.position.set(-3, 5, -5);
            scene.add(rimLight);

            // Fill light
            const fillLight = new THREE.DirectionalLight(0xff8844, 0.3);
            fillLight.position.set(-5, 3, 3);
            scene.add(fillLight);

            // Bottom bounce
            const bounceLight = new THREE.DirectionalLight(0x443322, 0.2);
            bounceLight.position.set(0, -3, 0);
            scene.add(bounceLight);

            // Point light for face
            const faceLight = new THREE.PointLight(0xffeedd, 0.3, 10);
            faceLight.position.set(0, 4, 3);
            scene.add(faceLight);
        }

        function setupGround() {
            // Create rocky ground
            const groundGeo = new THREE.CircleGeometry(20, 64);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x2a2a3a,
                roughness: 0.9,
                metalness: 0.1,
            });
            groundPlane = new THREE.Mesh(groundGeo, groundMat);
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);

            // Add rocky formations
            for (let i = 0; i < 15; i++) {
                const rockGeo = new THREE.DodecahedronGeometry(Math.random() * 0.5 + 0.2, 1);
                const rockMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(0.15 + Math.random() * 0.1, 0.12 + Math.random() * 0.08, 0.18 + Math.random() * 0.1),
                    roughness: 0.95,
                    metalness: 0.05,
                });

                // Deform rock
                const positions = rockGeo.attributes.position;
                for (let j = 0; j < positions.count; j++) {
                    positions.setY(j, positions.getY(j) * 0.5);
                    positions.setX(j, positions.getX(j) * (1 + Math.random() * 0.3));
                    positions.setZ(j, positions.getZ(j) * (1 + Math.random() * 0.3));
                }
                rockGeo.computeVertexNormals();

                const rock = new THREE.Mesh(rockGeo, rockMat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 3 + Math.random() * 12;
                rock.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
                rock.rotation.y = Math.random() * Math.PI;
                rock.castShadow = true;
                rock.receiveShadow = true;
                scene.add(rock);
            }
        }

        function setupBackground() {
            // Starfield
            const starsGeo = new THREE.BufferGeometry();
            const starPositions = [];
            for (let i = 0; i < 2000; i++) {
                starPositions.push(
                    (Math.random() - 0.5) * 200,
                    Math.random() * 100 + 5,
                    (Math.random() - 0.5) * 200
                );
            }
            starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true });
            scene.add(new THREE.Points(starsGeo, starsMat));
        }

        // ============================================
        // GOKU BODY CONSTRUCTION
        // ============================================
        function buildGoku() {
            gokuGroup.clear();
            hairMeshes = [];
            eyeMeshes = [];
            rig = {};

            // Skin material with subsurface scattering approximation
            materials.skin = new THREE.MeshPhysicalMaterial({
                color: SKIN_COLOR,
                roughness: 0.5,
                metalness: 0.0,
                clearcoat: 0.1,
                clearcoatRoughness: 0.8,
            });

            // Gi material
            materials.gi = new THREE.MeshStandardMaterial({
                color: GI_ORANGE,
                roughness: 0.75,
                metalness: 0.0,
            });

            // Undershirt
            materials.undershirt = new THREE.MeshStandardMaterial({
                color: GI_BLUE_UNDER,
                roughness: 0.7,
                metalness: 0.05,
            });

            // Belt
            materials.belt = new THREE.MeshStandardMaterial({
                color: BELT_COLOR,
                roughness: 0.6,
                metalness: 0.05,
            });

            // Boot material
            materials.boot = new THREE.MeshStandardMaterial({
                color: BOOT_COLOR,
                roughness: 0.55,
                metalness: 0.05,
            });

            // Wristband
            materials.wristband = new THREE.MeshStandardMaterial({
                color: new THREE.Color(0.15, 0.2, 0.55),
                roughness: 0.6,
                metalness: 0.05,
            });

            // Hair material
            materials.hair = new THREE.MeshPhysicalMaterial({
                color: HAIR_BLACK,
                roughness: 0.35,
                metalness: 0.1,
                clearcoat: 0.3,
                clearcoatRoughness: 0.4,
            });

            // Eye materials
            materials.eyeWhite = new THREE.MeshStandardMaterial({
                color: 0xf5f5f0,
                roughness: 0.1,
                metalness: 0.0,
            });

            materials.iris = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                roughness: 0.2,
                metalness: 0.1,
            });

            materials.pupil = new THREE.MeshStandardMaterial({
                color: 0x000000,
                roughness: 0.0,
                metalness: 0.0,
            });

            buildHead();
            buildTorso();
            buildArms();
            buildLegs();
            buildHair();

            gokuGroup.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
        }

        // ============================================
        // HEAD
        // ============================================
        function buildHead() {
            const headGroup = new THREE.Group();
            headGroup.position.set(0, 4.55, 0);

            // Main head shape - slightly elongated sphere with anime proportions
            const headGeo = new THREE.SphereGeometry(0.42, 64, 64);
            // Shape the head: slightly wider jaw, narrower top
            const headPositions = headGeo.attributes.position;
            for (let i = 0; i < headPositions.count; i++) {
                let x = headPositions.getX(i);
                let y = headPositions.getY(i);
                let z = headPositions.getZ(i);

                // Elongate vertically
                y *= 1.12;

                // Flatten back slightly
                if (z < -0.1) z *= 0.92;

                // Jaw definition
                if (y < -0.1) {
                    const jawFactor = Math.abs(y + 0.1) / 0.35;
                    x *= 1 - jawFactor * 0.3;
                    z *= 1 - jawFactor * 0.15;
                }

                // Chin
                if (y < -0.25) {
                    const chinFactor = (Math.abs(y) - 0.25) / 0.2;
                    x *= 1 - chinFactor * 0.4;
                    z *= 1 - chinFactor * 0.2;
                }

                // Cheekbones
                if (y > -0.15 && y < 0.1 && Math.abs(x) > 0.2) {
                    x *= 1.05;
                }

                // Forehead
                if (y > 0.2) {
                    z *= 1.05;
                }

                headPositions.setXYZ(i, x, y, z);
            }
            headGeo.computeVertexNormals();
            const head = new THREE.Mesh(headGeo, materials.skin);
            headGroup.add(head);

            // NECK
            const neckGeo = new THREE.CylinderGeometry(0.16, 0.19, 0.3, 16);
            const neck = new THREE.Mesh(neckGeo, materials.skin);
            neck.position.set(0, -0.55, 0);
            headGroup.add(neck);

            // Nose
            const noseGroup = new THREE.Group();
            noseGroup.position.set(0, -0.05, 0.38);

            // Nose bridge
            const noseBridgeGeo = new THREE.BoxGeometry(0.06, 0.12, 0.08);
            const noseBridge = new THREE.Mesh(noseBridgeGeo, materials.skin);
            noseBridge.position.set(0, 0.05, 0);
            noseGroup.add(noseBridge);

            // Nose tip
            const noseTipGeo = new THREE.SphereGeometry(0.04, 16, 16);
            const noseTip = new THREE.Mesh(noseTipGeo, materials.skin);
            noseTip.position.set(0, -0.02, 0.02);
            noseGroup.add(noseTip);

            headGroup.add(noseGroup);

            // EYES
            buildEye(headGroup, -0.14, 0.06, 0.34, false); // Left eye
            buildEye(headGroup, 0.14, 0.06, 0.34, true);   // Right eye

            // Eyebrows
            buildEyebrow(headGroup, -0.14, 0.18, 0.36, false);
            buildEyebrow(headGroup, 0.14, 0.18, 0.36, true);

            // MOUTH
            const mouthGeo = new THREE.TorusGeometry(0.06, 0.012, 8, 16, Math.PI);
            const mouthMat = new THREE.MeshStandardMaterial({ color: 0x993333, roughness: 0.5 });
            const mouth = new THREE.Mesh(mouthGeo, mouthMat);
            mouth.position.set(0, -0.2, 0.36);
            mouth.rotation.z = Math.PI;
            mouth.scale.set(1.2, 0.6, 1);
            headGroup.add(mouth);

            // EARS
            buildEar(headGroup, -0.4, 0.0, 0.0, false);
            buildEar(headGroup, 0.4, 0.0, 0.0, true);

            rig.head = headGroup;
            gokuGroup.add(headGroup);
        }

        function buildEye(parent, x, y, z, isRight) {
            const eyeGroup = new THREE.Group();
            eyeGroup.position.set(x, y, z);

            // Eye socket depression - shape around eye
            const eyeSocketGeo = new THREE.SphereGeometry(0.09, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
            const eyeSocket = new THREE.Mesh(eyeSocketGeo, materials.skin);
            eyeSocket.rotation.x = Math.PI;
            eyeSocket.scale.set(1.3, 0.8, 0.5);
            eyeGroup.add(eyeSocket);

            // Eyeball
            const eyeGeo = new THREE.SphereGeometry(0.065, 32, 32);
            const eyeball = new THREE.Mesh(eyeGeo, materials.eyeWhite);
            eyeball.scale.set(1.3, 0.9, 0.6);
            eyeGroup.add(eyeball);
            eyeMeshes.push({ mesh: eyeball, type: 'white' });

            // Iris
            const irisGeo = new THREE.CircleGeometry(0.04, 32);
            const iris = new THREE.Mesh(irisGeo, materials.iris);
            iris.position.z = 0.039;
            iris.scale.set(0.9, 1, 1);
            eyeGroup.add(iris);
            eyeMeshes.push({ mesh: iris, type: 'iris' });

            // Pupil
            const pupilGeo = new THREE.CircleGeometry(0.02, 32);
            const pupil = new THREE.Mesh(pupilGeo, materials.pupil);
            pupil.position.z = 0.04;
            eyeGroup.add(pupil);

            // Eye highlight
            const highlightGeo = new THREE.CircleGeometry(0.012, 16);
            const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const highlight = new THREE.Mesh(highlightGeo, highlightMat);
            highlight.position.set(0.015, 0.015, 0.041);
            eyeGroup.add(highlight);

            // Eyelid upper
            const eyelidGeo = new THREE.SphereGeometry(0.07, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.35);
            const eyelidMat = new THREE.MeshStandardMaterial({ color: SKIN_COLOR, roughness: 0.5, side: THREE.DoubleSide });
            const eyelid = new THREE.Mesh(eyelidGeo, eyelidMat);
            eyelid.scale.set(1.3, 0.9, 0.6);
            eyelid.rotation.x = 0.1;
            eyeGroup.add(eyelid);

            parent.add(eyeGroup);
        }

        function buildEyebrow(parent, x, y, z, isRight) {
            const browGeo = new THREE.BoxGeometry(0.18, 0.035, 0.04);
            // Deform the brow slightly
            const browPositions = browGeo.attributes.position;
            for (let i = 0; i < browPositions.count; i++) {
                let bx = browPositions.getX(i);
                let by = browPositions.getY(i);
                // Angle the brow (angry/determined look)
                if (isRight) {
                    by += bx * 0.15;
                } else {
                    by -= bx * 0.15;
                }
                browPositions.setY(i, by);
            }
            browGeo.computeVertexNormals();

            const browMat = new THREE.MeshStandardMaterial({ color: HAIR_BLACK, roughness: 0.4 });
            const brow = new THREE.Mesh(browGeo, browMat);
            brow.position.set(x, y, z);
            parent.add(brow);
        }

        function buildEar(parent, x, y, z, isRight) {
            const earGroup = new THREE.Group();
            earGroup.position.set(x, y, z);

            const earGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const ear = new THREE.Mesh(earGeo, materials.skin);
            ear.scale.set(0.35, 1, 0.7);
            earGroup.add(ear);

            // Inner ear
            const innerGeo = new THREE.SphereGeometry(0.05, 16, 16);
            const innerMat = new THREE.MeshStandardMaterial({ color: 0xd4a090, roughness: 0.5 });
            const inner = new THREE.Mesh(innerGeo, innerMat);
            inner.scale.set(0.3, 0.8, 0.5);
            inner.position.z = isRight ? -0.01 : 0.01;
            earGroup.add(inner);

            parent.add(earGroup);
        }

        // ============================================
        // HAIR (Goku's iconic spiky hair)
        // ============================================
        function buildHair() {
            hairGroup = new THREE.Group();
            hairGroup.position.set(0, rig.head ? 0 : 4.55, 0);

            // Base hair cap
            const hairCapGeo = new THREE.SphereGeometry(0.44, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.6);
            const hairCap = new THREE.Mesh(hairCapGeo, materials.hair);
            hairCap.position.y = 0.05;
            hairCap.scale.set(1.05, 1.0, 1.05);
            hairGroup.add(hairCap);
            hairMeshes.push(hairCap);

            // Spiky hair - Goku's signature wild spikes
            // Front spikes (bangs)
            createHairSpike(hairGroup, 0, 0.25, 0.35, 0.12, 0.25, -0.3, 0, 0, 0);
            createHairSpike(hairGroup, -0.12, 0.22, 0.33, 0.1, 0.22, -0.25, 0, 0, 0.15);
            createHairSpike(hairGroup, 0.12, 0.22, 0.33, 0.1, 0.22, -0.25, 0, 0, -0.15);
            createHairSpike(hairGroup, -0.22, 0.18, 0.28, 0.08, 0.2, -0.2, 0, 0, 0.3);
            createHairSpike(hairGroup, 0.22, 0.18, 0.28, 0.08, 0.2, -0.2, 0, 0, -0.3);

            // Top spikes (main upward spikes)
            createHairSpike(hairGroup, 0, 0.47, 0.0, 0.13, 0.35, 0.05, 0, 0, 0);
            createHairSpike(hairGroup, -0.1, 0.45, -0.05, 0.11, 0.33, 0.1, 0, 0, 0.2);
            createHairSpike(hairGroup, 0.1, 0.45, -0.05, 0.11, 0.33, 0.1, 0, 0, -0.2);
            createHairSpike(hairGroup, -0.2, 0.42, -0.1, 0.1, 0.3, 0.15, 0, 0, 0.35);
            createHairSpike(hairGroup, 0.2, 0.42, -0.1, 0.1, 0.3, 0.15, 0, 0, -0.35);
            createHairSpike(hairGroup, 0, 0.44, -0.15, 0.12, 0.32, 0.2, 0, 0, 0);

            // Side spikes
            createHairSpike(hairGroup, -0.35, 0.2, 0.0, 0.1, 0.25, 0.0, 0, 0, 0.5);
            createHairSpike(hairGroup, 0.35, 0.2, 0.0, 0.1, 0.25, 0.0, 0, 0, -0.5);
            createHairSpike(hairGroup, -0.38, 0.1, -0.1, 0.09, 0.22, 0.05, 0, 0, 0.6);
            createHairSpike(hairGroup, 0.38, 0.1, -0.1, 0.09, 0.22, 0.05, 0, 0, -0.6);

            // Back spikes (longer, pointing backwards and up)
            createHairSpike(hairGroup, 0, 0.35, -0.3, 0.12, 0.35, 0.4, -0.3, 0, 0);
            createHairSpike(hairGroup, -0.15, 0.3, -0.32, 0.1, 0.32, 0.35, -0.25, 0, 0.1);
            createHairSpike(hairGroup, 0.15, 0.3, -0.32, 0.1, 0.32, 0.35, -0.25, 0, -0.1);
            createHairSpike(hairGroup, -0.25, 0.22, -0.3, 0.09, 0.28, 0.3, -0.2, 0, 0.2);
            createHairSpike(hairGroup, 0.25, 0.22, -0.3, 0.09, 0.28, 0.3, -0.2, 0, -0.2);
            createHairSpike(hairGroup, 0, 0.15, -0.35, 0.11, 0.3, 0.45, -0.35, 0, 0);
            createHairSpike(hairGroup, -0.12, 0.1, -0.34, 0.09, 0.26, 0.4, -0.3, 0, 0.15);
            createHairSpike(hairGroup, 0.12, 0.1, -0.34, 0.09, 0.26, 0.4, -0.3, 0, -0.15);

            if (rig.head) {
                rig.head.add(hairGroup);
            } else {
                gokuGroup.add(hairGroup);
            }
        }

        function createHairSpike(parent, x, y, z, radius, height, rotX, rotY, rotZ, lean) {
            const spikeGeo = new THREE.ConeGeometry(radius, height, 8, 4);
            // Deform for more natural look
            const positions = spikeGeo.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                let px = positions.getX(i);
                let py = positions.getY(i);
                let pz = positions.getZ(i);

                // Add some randomness
                px += (Math.random() - 0.5) * 0.01;
                pz += (Math.random() - 0.5) * 0.01;

                // Lean the spike
                px += py * lean * 0.5;

                // Slight curve
                const t = (py + height / 2) / height;
                px *= 1 - t * 0.1;
                pz *= 1 - t * 0.1;

                positions.setXYZ(i, px, py, pz);
            }
            spikeGeo.computeVertexNormals();

            const spike = new THREE.Mesh(spikeGeo, materials.hair);
            spike.position.set(x, y, z);
            spike.rotation.set(rotX, rotY, rotZ);
            parent.add(spike);
            hairMeshes.push(spike);
        }

        // ============================================
        // TORSO
        // ============================================
        function buildTorso() {
            const torsoGroup = new THREE.Group();

            // Upper body - chest (muscular)
            const chestGeo = createMuscularTorso();
            const chest = new THREE.Mesh(chestGeo, materials.gi);
            chest.position.set(0, 3.6, 0);

            // Belt tails
            const beltTailGeo = new THREE.BoxGeometry(0.08, 0.35, 0.03);

            // Lower gi (skirt-like)
            const lowerGiGeo = new THREE.CylinderGeometry(0.28, 0.42, 0.6, 16, 4);

            for (let i = 0; i < lgiPositions.count; i++) {

                let z = lgiPositions.getZ(i);
                // Add cloth wrinkle effect
                const angle = Math.atan2(z, x);
                const r = Math.sqrt(x * x + z * z);
                const wrinkle = Math.sin(angle * 8) * 0.01 * (1 - (y + 0.3) / 0.6);
                x += Math.cos(angle) * wrinkle;
                z += Math.sin(angle) * wrinkle;
                lgiPositions.setXYZ(i, x, y, z);

            lowerGiGeo.computeVertexNormals();

        function createMuscularTorso() {
            const geo = new THREE.CylinderGeometry(0.28, 0.35, 1.2, 24, 12);
            const positions = geo.attributes.position;

            for (let i = 0; i < positions.count; i++) {
                let x = positions.getX(i);
                let y = positions.getY(i);
                let z = positions.getZ(i);

                const t = (y + 0.6) / 1.2; // 0 at bottom, 1 at top

                // Chest expansion (pecs)
                if (t > 0.5 && z > 0) {
                    z *= 1 + Math.sin((t - 0.5) * Math.PI) * 0.25;
                    // Pec separation
                    if (Math.abs(x) < 0.05) {
                        z *= 0.92;
                    }
                }

                // Shoulder width
                if (t > 0.7) {
                    x *= 1 + (t - 0.7) * 0.8;
                }

                // Waist taper
                if (t < 0.3) {
                    x *= 0.85 + t * 0.5;
                }

                // Lats (back width)
                if (t > 0.3 && t < 0.8 && z < 0) {
                    x *= 1 + Math.sin((t - 0.3) * Math.PI / 0.5) * 0.15;
                }

                // V-taper
                const vTaper = Math.max(0, 1 - t) * 0.15;
                x *= 1 - vTaper;

                positions.setXYZ(i, x, y, z);
            }

            geo.computeVertexNormals();
            return geo;
        }

        // ============================================
        // ARMS
        // ============================================
        function buildArms() {
            const leftArmRig = buildArm(true);
            const rightArmRig = buildArm(false);

            rig.leftArm = leftArmRig.shoulderPivot;
            rig.rightArm = rightArmRig.shoulderPivot;

        function buildArm(isLeft) {
            const side = isLeft ? -1 : 1;
            const shoulderPivot = new THREE.Group();
            shoulderPivot.position.set(side * 0.48, 4.1, 0.02);

            // Shoulder (deltoid)
            const shoulderGeo = new THREE.SphereGeometry(0.17, 16, 16);
            const shoulder = new THREE.Mesh(shoulderGeo, materials.gi);
            shoulder.scale.set(1, 0.9, 0.85);
            shoulderPivot.add(shoulder);

            // Upper arm (bicep/tricep)
            const upperArmGeo = new THREE.CylinderGeometry(0.11, 0.13, 0.6, 12);
            // Add muscle definition
            const uaPos = upperArmGeo.attributes.position;
            for (let i = 0; i < uaPos.count; i++) {
                let x = uaPos.getX(i);
                let y = uaPos.getY(i);
                let z = uaPos.getZ(i);
                // Bicep bulge
                const t = (y + 0.3) / 0.6;
                if (z > 0) {
                    z *= 1 + Math.sin(t * Math.PI) * 0.2;
                }
                uaPos.setXYZ(i, x, y, z);
            }
            upperArmGeo.computeVertexNormals();

            const upperArm = new THREE.Mesh(upperArmGeo, materials.undershirt);
            upperArm.position.set(side * 0.05, -0.32, 0);
            upperArm.rotation.z = side * 0.08;
            shoulderPivot.add(upperArm);

            const elbowPivot = new THREE.Group();
            elbowPivot.position.set(side * 0.09, -0.63, 0.03);
            shoulderPivot.add(elbowPivot);

            // Elbow
            const elbowGeo = new THREE.SphereGeometry(0.1, 12, 12);
            const elbow = new THREE.Mesh(elbowGeo, materials.skin);
            elbowPivot.add(elbow);

            // Forearm
            const forearmGeo = new THREE.CylinderGeometry(0.08, 0.11, 0.55, 12);
            const forearm = new THREE.Mesh(forearmGeo, materials.skin);
            forearm.position.set(0, -0.27, 0.05);
            forearm.rotation.x = -0.15;
            elbowPivot.add(forearm);

            // Wristband
            const wristbandGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.12, 12);
            const wristband = new THREE.Mesh(wristbandGeo, materials.wristband);
            wristband.position.set(0, -0.54, 0.08);
            elbowPivot.add(wristband);

            // Hand (fist)
            const handGroup = buildHand(isLeft);
            handGroup.position.set(0, -0.66, 0.1);
            elbowPivot.add(handGroup);

            gokuGroup.add(shoulderPivot);

            return { shoulderPivot, elbowPivot };
        }

        function buildHand(isLeft) {
            const handGroup = new THREE.Group();
            const side = isLeft ? -1 : 1;

            // Palm
            const palmGeo = new THREE.BoxGeometry(0.1, 0.12, 0.08);
            // Round the palm
            const pPos = palmGeo.attributes.position;
            for (let i = 0; i < pPos.count; i++) {
                let x = pPos.getX(i);
                let y = pPos.getY(i);
                let z = pPos.getZ(i);
                const d = Math.sqrt(x * x + y * y + z * z);
                const scale = 1 - d * 0.1;
                pPos.setXYZ(i, x * scale, y * scale, z * scale);
            }
            palmGeo.computeVertexNormals();
            const palm = new THREE.Mesh(palmGeo, materials.skin);
            handGroup.add(palm);

            // Fingers (curled for fist)
            for (let f = 0; f < 4; f++) {
                const fingerGeo = new THREE.CylinderGeometry(0.015, 0.018, 0.08, 8);
                const finger = new THREE.Mesh(fingerGeo, materials.skin);
                finger.position.set((f - 1.5) * 0.025, -0.06, 0.03);
                finger.rotation.x = 1.2;
                handGroup.add(finger);
            }

            // Thumb
            const thumbGeo = new THREE.CylinderGeometry(0.017, 0.02, 0.07, 8);
            const thumb = new THREE.Mesh(thumbGeo, materials.skin);
            thumb.position.set(side * 0.05, -0.02, 0.04);
            thumb.rotation.x = 0.8;
            thumb.rotation.z = side * 0.5;
            handGroup.add(thumb);

            return handGroup;
        }

        function buildLeg(isLeft) {

            for (let i = 0; i < tPos.count; i++) {
                let x = tPos.getX(i);
                let y = tPos.getY(i);
                let z = tPos.getZ(i);
                const t = (y + 0.35) / 0.7;
                // Quad bulge
                if (z > 0) {

            thighGeo.computeVertexNormals();

            thigh.position.set(0, -0.36, 0.01);

        function buildBoot(isLeft) {
            const bootGroup = new THREE.Group();
            bootGroup.rotation.y = isLeft ? 0.03 : -0.03;

            const bootUpperGeo = new THREE.CylinderGeometry(0.11, 0.13, 0.4, 12);

            const cuff = new THREE.Mesh(cuffGeo, cuffMat);

        // ============================================
        // AURA SYSTEM
        // ============================================
        function createAura() {
            auraGroup.clear();
            auraMeshes = [];

            // Inner aura
            const innerAuraGeo = new THREE.CylinderGeometry(0.1, 0.8, 5, 32, 20, true);
            const innerAuraMat = new THREE.ShaderMaterial({
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                uniforms: {
                    uTime: { value: 0 },
                    uColor1: { value: new THREE.Color(1, 1, 1) },
                    uColor2: { value: new THREE.Color(1, 0.9, 0.3) },
                    uOpacity: { value: 0.15 },
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vPos;
                    uniform float uTime;
                    void main() {
                        vUv = uv;
                        vPos = position;
                        vec3 pos = position;
                        float wave = sin(pos.y * 3.0 + uTime * 3.0) * 0.1;
                        float wave2 = cos(pos.y * 5.0 + uTime * 2.5) * 0.05;
                        pos.x += wave + wave2;
                        pos.z += cos(pos.y * 4.0 + uTime * 2.0) * 0.08;
                        // Flicker
                        float flicker = sin(uTime * 10.0 + pos.y * 20.0) * 0.02;
                        pos.x += flicker;
                        pos.z += flicker;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec2 vUv;
                    varying vec3 vPos;
                    uniform vec3 uColor1;
                    uniform vec3 uColor2;
                    uniform float uOpacity;
                    uniform float uTime;
                    void main() {
                        float alpha = (1.0 - vUv.y) * uOpacity;
                        alpha *= sin(vUv.y * 3.14159);
                        // Flame-like noise
                        float noise = sin(vUv.x * 30.0 + uTime * 5.0) * 0.5 + 0.5;
                        noise *= sin(vUv.y * 20.0 + uTime * 3.0) * 0.5 + 0.5;
                        alpha *= 0.5 + noise * 0.5;
                        vec3 color = mix(uColor1, uColor2, vUv.y + noise * 0.3);
                        gl_FragColor = vec4(color, alpha);
                    }
                `
            });
            const innerAura = new THREE.Mesh(innerAuraGeo, innerAuraMat);
            innerAura.position.set(0, 2.8, 0);
            auraGroup.add(innerAura);
            auraMeshes.push({ mesh: innerAura, mat: innerAuraMat });

            // Outer aura
            const outerAuraGeo = new THREE.CylinderGeometry(0.15, 1.2, 6, 32, 20, true);
            const outerAuraMat = innerAuraMat.clone();
            outerAuraMat.uniforms.uOpacity.value = 0.06;
            const outerAura = new THREE.Mesh(outerAuraGeo, outerAuraMat);
            outerAura.position.set(0, 2.8, 0);
            auraGroup.add(outerAura);
            auraMeshes.push({ mesh: outerAura, mat: outerAuraMat });

            // Aura rings
            for (let i = 0; i < 5; i++) {
                const ringGeo = new THREE.TorusGeometry(0.6 + i * 0.15, 0.02, 8, 64);
                const ringMat = new THREE.ShaderMaterial({
                    transparent: true,
                    depthWrite: false,
                    uniforms: {
                        uTime: { value: 0 },
                        uColor: { value: new THREE.Color(1, 0.9, 0.3) },
                        uIndex: { value: i },
                    },
                    vertexShader: `
                        uniform float uTime;
                        uniform float uIndex;
                        varying float vAlpha;
                        void main() {
                            vec3 pos = position;
                            float t = uTime * 2.0 + uIndex * 1.5;
                            pos.y += sin(t) * 0.5;
                            vAlpha = 0.3 * (1.0 - abs(sin(t)) * 0.5);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform vec3 uColor;
                        varying float vAlpha;
                        void main() {
                            gl_FragColor = vec4(uColor, vAlpha);
                        }
                    `
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.set(0, 2 + i * 0.5, 0);
                ring.rotation.x = Math.PI / 2;
                auraGroup.add(ring);
                auraMeshes.push({ mesh: ring, mat: ringMat });
            }

            auraGroup.visible = showAura;
        }

        // ============================================
        // PARTICLE SYSTEMS
        // ============================================
        function createParticles() {
            // Energy particles floating up
            const particleCount = 200;
            const particleGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 3;
                positions[i * 3 + 1] = Math.random() * 6;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 3;

                velocities[i * 3] = (Math.random() - 0.5) * 0.02;
                velocities[i * 3 + 1] = Math.random() * 0.03 + 0.01;
                velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.02;

                sizes[i] = Math.random() * 0.08 + 0.02;
            }

            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const particleMat = new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,
                uniforms: {
                    uColor: { value: new THREE.Color(1, 0.9, 0.3) },
                    uTime: { value: 0 },
                },
                vertexShader: `
                    attribute float size;
                    varying float vAlpha;
                    uniform float uTime;
                    void main() {
                        vec3 pos = position;
                        pos.y = mod(pos.y + uTime * 0.5, 6.0);
                        vAlpha = 1.0 - pos.y / 6.0;
                        vAlpha *= 0.6;
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * (200.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    varying float vAlpha;
                    void main() {
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        float alpha = (1.0 - dist * 2.0) * vAlpha;
                        gl_FragColor = vec4(uColor, alpha);
                    }
                `
            });

            const particles = new THREE.Points(particleGeo, particleMat);
            particles.visible = showAura;
            scene.add(particles);
            particleSystems.push({ points: particles, mat: particleMat, velocities: velocities });
        }

        // ============================================
        // TRANSFORMATION MODES
        // ============================================
        function setMode(mode) {
            currentMode = mode;

            // Update buttons
            document.querySelectorAll('#controls button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let hairColor, auraColor1, auraColor2, particleColor, eyeColor;

            switch (mode) {
                case 'base':
                    hairColor = HAIR_BLACK.clone();
                    auraColor1 = new THREE.Color(1, 1, 1);
                    auraColor2 = new THREE.Color(1, 0.9, 0.3);
                    particleColor = new THREE.Color(1, 0.9, 0.3);
                    eyeColor = new THREE.Color(0.05, 0.05, 0.05);
                    break;
                case 'ssj':
                    hairColor = SSJ_GOLD.clone();
                    auraColor1 = new THREE.Color(1, 1, 0.5);
                    auraColor2 = new THREE.Color(1, 0.8, 0);
                    particleColor = new THREE.Color(1, 0.85, 0.1);
                    eyeColor = new THREE.Color(0.1, 0.6, 0.5);
                    break;
                case 'ssb':
                    hairColor = SSB_BLUE.clone();
                    auraColor1 = new THREE.Color(0.3, 0.7, 1);
                    auraColor2 = new THREE.Color(0, 0.3, 1);
                    particleColor = new THREE.Color(0.2, 0.6, 1);
                    eyeColor = new THREE.Color(0.1, 0.5, 0.9);
                    break;
                case 'ui':
                    hairColor = UI_SILVER.clone();
                    auraColor1 = new THREE.Color(0.9, 0.9, 1);
                    auraColor2 = new THREE.Color(0.6, 0.6, 0.9);
                    particleColor = new THREE.Color(0.8, 0.8, 1);
                    eyeColor = new THREE.Color(0.7, 0.7, 0.85);
                    break;
            }

            // Animate hair color transition
            const startHairColor = materials.hair.color.clone();
            const startEyeColor = materials.iris.color.clone();
            const duration = 1000;
            const startTime = Date.now();

            function animateTransition() {
                const elapsed = Date.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                materials.hair.color.lerpColors(startHairColor, hairColor, eased);

                if (mode === 'ssj' || mode === 'ssb' || mode === 'ui') {
                    materials.hair.emissive = hairColor.clone().multiplyScalar(eased * 0.15);
                    materials.hair.emissiveIntensity = eased * 0.3;
                } else {
                    materials.hair.emissive = new THREE.Color(0, 0, 0);
                    materials.hair.emissiveIntensity = 0;
                }

                // Update iris
                materials.iris.color.lerpColors(startEyeColor, eyeColor, eased);

                // Update aura colors
                auraMeshes.forEach(item => {
                    if (item.mat.uniforms.uColor1) {
                        item.mat.uniforms.uColor1.value.copy(auraColor1);
                        item.mat.uniforms.uColor2.value.copy(auraColor2);
                    }
                    if (item.mat.uniforms.uColor) {
                        item.mat.uniforms.uColor.value.copy(auraColor2);
                    }
                });

                // Update particles
                particleSystems.forEach(ps => {
                    ps.mat.uniforms.uColor.value.copy(particleColor);
                });

                if (t < 1) requestAnimationFrame(animateTransition);
            }

            animateTransition();

            // Screen flash effect
            createFlashEffect(auraColor2);
        }

        function createFlashEffect(color) {
            const flashGeo = new THREE.PlaneGeometry(100, 100);
            const flashMat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide,
                depthTest: false,
            });
            const flash = new THREE.Mesh(flashGeo, flashMat);
            flash.position.copy(camera.position);
            flash.quaternion.copy(camera.quaternion);
            flash.translateZ(-1);
            scene.add(flash);

            const startTime = Date.now();
            function fadeFlash() {
                const t = (Date.now() - startTime) / 500;
                flashMat.opacity = 0.5 * (1 - t);
                if (t < 1) {
                    requestAnimationFrame(fadeFlash);
                } else {
                    scene.remove(flash);
                    flashMat.dispose();
                    flashGeo.dispose();
                }
            }
            fadeFlash();
        }

        function toggleAura() {
            showAura = !showAura;
            auraGroup.visible = showAura;
            particleSystems.forEach(ps => {
                ps.points.visible = showAura;
            });
        }

        // ============================================
        // MOVEMENT CONTROLS (Arrow Keys, No Jump)
        // ============================================
        function setupMovementControls() {
            const tracked = moveState.keys;

            function setKeyState(isDown, e) {
                if (!Object.prototype.hasOwnProperty.call(tracked, e.key)) return;
                tracked[e.key] = isDown;
                e.preventDefault();
            }

            window.addEventListener('keydown', (e) => setKeyState(true, e));
            window.addEventListener('keyup', (e) => setKeyState(false, e));
            window.addEventListener('blur', () => {
                Object.keys(tracked).forEach(key => tracked[key] = false);
            });
        }

        function shortestAngleDelta(target, current) {
            return Math.atan2(Math.sin(target - current), Math.cos(target - current));
        }

        function updateLocomotion(delta, time) {
            const forwardAxis = (moveState.keys.ArrowUp ? 1 : 0) - (moveState.keys.ArrowDown ? 1 : 0);
            const turnAxis = (moveState.keys.ArrowLeft ? 1 : 0) - (moveState.keys.ArrowRight ? 1 : 0);

            const turnMultiplier = Math.abs(moveState.speed) > 0.1 ? 1.0 : 0.75;
            moveState.heading += turnAxis * MOVE_CONFIG.turnSpeed * turnMultiplier * delta;

            let targetSpeed = 0;
            if (forwardAxis > 0) targetSpeed = MOVE_CONFIG.forwardSpeed;
            if (forwardAxis < 0) targetSpeed = -MOVE_CONFIG.backwardSpeed;

            const blendRate = Math.abs(targetSpeed) > Math.abs(moveState.speed) ? MOVE_CONFIG.acceleration : MOVE_CONFIG.deceleration;
            moveState.speed += (targetSpeed - moveState.speed) * Math.min(1, blendRate * delta);

            moveForward.set(Math.sin(moveState.heading), 0, Math.cos(moveState.heading));
            gokuGroup.position.x += moveForward.x * moveState.speed * delta;
            gokuGroup.position.z += moveForward.z * moveState.speed * delta;

            const rangeSq = gokuGroup.position.x * gokuGroup.position.x + gokuGroup.position.z * gokuGroup.position.z;
            if (rangeSq > MOVE_CONFIG.maxRange * MOVE_CONFIG.maxRange) {
                const range = Math.sqrt(rangeSq);
                const clamp = MOVE_CONFIG.maxRange / range;
                gokuGroup.position.x *= clamp;
                gokuGroup.position.z *= clamp;
            }

            const yawDelta = shortestAngleDelta(moveState.heading, gokuGroup.rotation.y);
            gokuGroup.rotation.y += yawDelta * Math.min(1, 10 * delta);

            const speedRatio = Math.min(1, Math.abs(moveState.speed) / MOVE_CONFIG.forwardSpeed);
            if (speedRatio > 0.01) {
                moveState.walkCycle += delta * MOVE_CONFIG.gaitRate * (0.4 + speedRatio * 0.9);
            }

            const gaitDirection = moveState.speed >= 0 ? 1 : -1;
            const leftLegWave = Math.sin(moveState.walkCycle) * gaitDirection;
            const rightLegWave = Math.sin(moveState.walkCycle + Math.PI) * gaitDirection;
            const leftKneeLift = Math.max(0, Math.sin(moveState.walkCycle - Math.PI * 0.2));
            const rightKneeLift = Math.max(0, Math.sin(moveState.walkCycle + Math.PI * 0.8));

            const legSwing = 0.62 * speedRatio;
            const armSwing = 0.58 * speedRatio;
            const torsoTwist = 0.09 * speedRatio;
            const torsoLean = 0.05 * speedRatio;

            if (rig.leftLeg && rig.rightLeg) {
                rig.leftLeg.rotation.x = leftLegWave * legSwing;
                rig.rightLeg.rotation.x = rightLegWave * legSwing;
                rig.leftLeg.rotation.z = Math.sin(moveState.walkCycle + Math.PI * 0.5) * 0.04 * speedRatio;
                rig.rightLeg.rotation.z = -Math.sin(moveState.walkCycle + Math.PI * 0.5) * 0.04 * speedRatio;
            }

            if (rig.leftKnee && rig.rightKnee) {
                rig.leftKnee.rotation.x = 0.08 + leftKneeLift * 0.72 * speedRatio;
                rig.rightKnee.rotation.x = 0.08 + rightKneeLift * 0.72 * speedRatio;
            }

            if (rig.leftAnkle && rig.rightAnkle) {
                rig.leftAnkle.rotation.x = -leftLegWave * 0.28 * speedRatio - leftKneeLift * 0.14 * speedRatio;
                rig.rightAnkle.rotation.x = -rightLegWave * 0.28 * speedRatio - rightKneeLift * 0.14 * speedRatio;
            }

            if (rig.leftArm && rig.rightArm) {
                rig.leftArm.rotation.x = rightLegWave * armSwing - 0.08 * speedRatio;
                rig.rightArm.rotation.x = leftLegWave * armSwing - 0.08 * speedRatio;
                rig.leftArm.rotation.z = -0.12 + Math.sin(moveState.walkCycle + Math.PI) * 0.08 * speedRatio;
                rig.rightArm.rotation.z = 0.12 + Math.sin(moveState.walkCycle) * 0.08 * speedRatio;
            }

            if (rig.leftForearm && rig.rightForearm) {
                rig.leftForearm.rotation.x = 0.2 + Math.max(0, -rightLegWave) * 0.32 * speedRatio;
                rig.rightForearm.rotation.x = 0.2 + Math.max(0, -leftLegWave) * 0.32 * speedRatio;
            }

            if (rig.torso) {
                rig.torso.rotation.y = -Math.sin(moveState.walkCycle) * torsoTwist;
                rig.torso.rotation.x = Math.abs(Math.sin(moveState.walkCycle * 2)) * torsoLean;
            }

            if (rig.head) {
                const torsoYaw = rig.torso ? rig.torso.rotation.y : 0;
                rig.head.rotation.y = -torsoYaw * 0.45;
                rig.head.rotation.x = -Math.abs(Math.sin(moveState.walkCycle * 2)) * 0.015 * speedRatio;
            }

            const walkBob = Math.abs(Math.sin(moveState.walkCycle * 2.0)) * 0.06 * speedRatio;
            const breathing = Math.sin(time * 1.5) * 0.02 * (1 - speedRatio * 0.6);
            moveState.verticalOffset = breathing + walkBob;
            gokuGroup.position.y = moveState.verticalOffset;

            if (orbitState && orbitState.updateCamera) {
                orbitFollowTarget.set(gokuGroup.position.x, 2.5 + gokuGroup.position.y, gokuGroup.position.z);
                orbitState.target.lerp(orbitFollowTarget, Math.min(1, delta * 5));
                orbitState.updateCamera();
            }
        }

        // ============================================
        // ORBIT CONTROLS (Manual)
        // ============================================
        function setupControls() {
            orbitState = {
                isDragging: false,
                previousMouse: { x: 0, y: 0 },
                spherical: { theta: 0, phi: Math.PI / 3, radius: 8 },
                target: new THREE.Vector3(0, 2.5, 0),
                updateCamera: null,
            };

            function updateCamera() {
                const spherical = orbitState.spherical;
                const target = orbitState.target;
                camera.position.x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
                camera.position.y = target.y + spherical.radius * Math.cos(spherical.phi);
                camera.position.z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
                camera.lookAt(target);
            }
            orbitState.updateCamera = updateCamera;

            renderer.domElement.addEventListener('mousedown', (e) => {
                orbitState.isDragging = true;
                orbitState.previousMouse.x = e.clientX;
                orbitState.previousMouse.y = e.clientY;
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (!orbitState.isDragging) return;
                const dx = e.clientX - orbitState.previousMouse.x;
                const dy = e.clientY - orbitState.previousMouse.y;
                orbitState.spherical.theta -= dx * 0.005;
                orbitState.spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, orbitState.spherical.phi + dy * 0.005));
                orbitState.previousMouse.x = e.clientX;
                orbitState.previousMouse.y = e.clientY;
                updateCamera();
            });

            renderer.domElement.addEventListener('mouseup', () => orbitState.isDragging = false);
            renderer.domElement.addEventListener('mouseleave', () => orbitState.isDragging = false);

            renderer.domElement.addEventListener('wheel', (e) => {
                orbitState.spherical.radius = Math.max(3, Math.min(15, orbitState.spherical.radius + e.deltaY * 0.01));
                updateCamera();
            });

            // Touch support
            renderer.domElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    orbitState.isDragging = true;
                    orbitState.previousMouse.x = e.touches[0].clientX;
                    orbitState.previousMouse.y = e.touches[0].clientY;
                }
            });

            renderer.domElement.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!orbitState.isDragging || e.touches.length !== 1) return;
                const dx = e.touches[0].clientX - orbitState.previousMouse.x;
                const dy = e.touches[0].clientY - orbitState.previousMouse.y;
                orbitState.spherical.theta -= dx * 0.005;
                orbitState.spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, orbitState.spherical.phi + dy * 0.005));
                orbitState.previousMouse.x = e.touches[0].clientX;
                orbitState.previousMouse.y = e.touches[0].clientY;
                updateCamera();
            }, { passive: false });

            renderer.domElement.addEventListener('touchend', () => orbitState.isDragging = false);

            updateCamera();

            // Auto-rotate slowly
            setInterval(() => {
                if (!orbitState.isDragging) {
                    orbitState.spherical.theta += 0.002;
                    updateCamera();
                }
            }, 16);
        }

        // ============================================
        // ANIMATION LOOP
        // ============================================
        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.033);
            const time = clock.elapsedTime;

            if (gokuGroup) {
                updateLocomotion(delta, time);
            }

            // Update aura shaders
            auraMeshes.forEach(item => {
                if (item.mat.uniforms && item.mat.uniforms.uTime) {
                    item.mat.uniforms.uTime.value = time;
                }
            });

            // Update particle shaders
            particleSystems.forEach(ps => {
                if (ps.mat.uniforms && ps.mat.uniforms.uTime) {
                    ps.mat.uniforms.uTime.value = time;
                }
            });

            // Hair sway for SSJ modes
            if (currentMode !== 'base') {
                hairMeshes.forEach((mesh, i) => {
                    if (mesh.geometry.type === 'ConeGeometry' || mesh.geometry.type === 'BufferGeometry') {
                        mesh.rotation.x += Math.sin(time * 3 + i) * 0.0005;
                        mesh.rotation.z += Math.cos(time * 2.5 + i * 0.5) * 0.0003;
                    }
                });
            }

            // Ground crack glow for transformations
            if (currentMode !== 'base' && showAura) {
                const groundGlowIntensity = 0.3 + Math.sin(time * 2) * 0.1;
                if (groundPlane) {
                    let glowColor;
                    switch (currentMode) {
                        case 'ssj': glowColor = new THREE.Color(0.3, 0.25, 0); break;
                        case 'ssb': glowColor = new THREE.Color(0, 0.1, 0.3); break;
                        case 'ui': glowColor = new THREE.Color(0.15, 0.15, 0.2); break;
                        default: glowColor = new THREE.Color(0.1, 0.1, 0.1);
                    }
                    groundPlane.material.emissive = glowColor;
                    groundPlane.material.emissiveIntensity = groundGlowIntensity;
                }
            } else if (groundPlane) {
                groundPlane.material.emissiveIntensity = 0;
            }

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
