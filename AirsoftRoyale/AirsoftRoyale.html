<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airsoft Royale</title>
<!-- Three.js core -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Cannon.js physics -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<!-- Indoor Environment Module -->
<script src="IndoorEnv.js" defer></script>
<style>
/* === BASE RESET === */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; }
canvas { display: block; }

/* === BLOCKER (pointer lock overlay) === */
#blocker {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); display: none; justify-content: center;
  align-items: center; z-index: 100; font-size: 24px; cursor: pointer;
  flex-direction: column;
}
#blocker .subtitle { font-size: 14px; margin-top: 10px; color: #aaa; }

/* === MAIN MENU === */
#menu-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200;
}
#menu-screen h1 {
  font-size: 64px; font-weight: 900; letter-spacing: 4px;
  background: linear-gradient(90deg, #ff6b35, #f7c948, #ff6b35);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: none; margin-bottom: 8px;
}
#menu-screen .tagline { font-size: 16px; color: #8899aa; margin-bottom: 40px; }
.menu-btn {
  width: 280px; padding: 14px; margin: 6px; font-size: 16px; font-weight: 700;
  border: 2px solid #ff6b35; border-radius: 6px; background: rgba(255,107,53,0.1);
  color: #ff6b35; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  letter-spacing: 2px;
}
.menu-btn:hover { background: #ff6b35; color: #fff; }

/* === LOADOUT SCREEN === */
#loadout-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(10,10,30,0.97); display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 190;
}
.loadout-grid {
  display: grid; grid-template-columns: repeat(3, 200px); gap: 16px; margin: 20px 0;
}
.loadout-card {
  background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 8px;
  padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.loadout-card:hover, .loadout-card.selected { border-color: #ff6b35; background: rgba(255,107,53,0.15); }
.loadout-card h3 { font-size: 14px; margin-bottom: 4px; }
.loadout-card p { font-size: 11px; color: #888; }

/* === HUD === */
#hud {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 50; display: none;
}

/* Crosshair */
#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 24px; height: 24px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.85);
}
#crosshair::before { width: 2px; height: 24px; left: 11px; top: 0; }
#crosshair::after { width: 24px; height: 2px; top: 11px; left: 0; }
.crosshair-dot {
  position: absolute; width: 4px; height: 4px; background: #ff4444;
  border-radius: 50%; top: 10px; left: 10px;
}

/* Health bar */
#health-bar-container {
  position: absolute; bottom: 30px; left: 30px;
  width: 200px; height: 20px; background: rgba(0,0,0,0.6);
  border: 1px solid #555; border-radius: 3px;
}
#health-bar {
  height: 100%; width: 100%; background: linear-gradient(90deg, #00cc44, #44ff66);
  border-radius: 2px; transition: width 0.3s;
}
#health-text {
  position: absolute; bottom: 54px; left: 30px; font-size: 13px; font-weight: 700;
}

/* Ammo counter */
#ammo-display {
  position: absolute; bottom: 30px; right: 30px; text-align: right;
}
#ammo-current { font-size: 42px; font-weight: 900; }
#ammo-reserve { font-size: 18px; color: #aaa; }
#weapon-name { font-size: 12px; color: #ff6b35; text-transform: uppercase; letter-spacing: 2px; }

/* Minimap */
#minimap {
  position: absolute; top: 20px; right: 20px; width: 160px; height: 160px;
  background: rgba(0,0,0,0.5); border: 2px solid #444; border-radius: 4px;
  overflow: hidden;
}
#minimap canvas { width: 100%; height: 100%; }

/* Kill feed */
#kill-feed {
  position: absolute; top: 20px; left: 20px; font-size: 13px; max-width: 300px;
}
.kill-entry { padding: 3px 8px; margin: 2px 0; background: rgba(0,0,0,0.5); border-radius: 3px; animation: fadeKill 4s forwards; }
@keyframes fadeKill { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

/* Hit marker */
#hitmarker {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 30px; height: 30px; display: none;
}
.hm-line {
  position: absolute; background: #fff; width: 2px; height: 10px;
}
.hm-line:nth-child(1){ top:0; left:14px; transform:rotate(45deg); }
.hm-line:nth-child(2){ top:0; right:14px; transform:rotate(-45deg); }
.hm-line:nth-child(3){ bottom:0; left:14px; transform:rotate(-45deg); }
.hm-line:nth-child(4){ bottom:0; right:14px; transform:rotate(45deg); }

/* Damage vignette */
#damage-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 49;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0) 100%);
  opacity: 0; transition: opacity 0.1s;
}

/* Scoreboard */
#scoreboard {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.85); border: 1px solid #555; border-radius: 8px;
  padding: 20px; min-width: 400px; display: none; pointer-events: none;
}
#scoreboard table { width: 100%; border-collapse: collapse; }
#scoreboard th { color: #ff6b35; padding: 6px; text-align: left; font-size: 13px; border-bottom: 1px solid #333; }
#scoreboard td { padding: 5px 6px; font-size: 13px; border-bottom: 1px solid #222; }

/* Game over */
#game-over {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 300;
}
#game-over h1 { font-size: 48px; margin-bottom: 10px; }
#game-over .stats { font-size: 16px; color: #aaa; margin-bottom: 30px; }

/* Reload bar */
#reload-bar {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  width: 150px; height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px;
  display: none;
}
#reload-progress { height: 100%; width: 0%; background: #ff6b35; border-radius: 3px; }

/* Notifications */
#notifications {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -80px);
  text-align: center; font-size: 18px; font-weight: 700;
}
.notif { animation: notifFade 2s forwards; }
@keyframes notifFade { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-30px)} }
</style>
</head>
<body>

<!-- Blocker (pause/resume overlay) -->
<div id="blocker">
  <div>Click to Resume</div>
  <div class="subtitle">ESC to pause | WASD to move | Mouse to aim</div>
</div>

<!-- Damage overlay -->
<div id="damage-overlay"></div>

<!-- MAIN MENU -->
<div id="menu-screen">
  <h1>AIRSOFT ROYALE</h1>
  <div class="tagline">Digital Airsoft Combat Experience</div>
  <button class="menu-btn" onclick="showLoadout('tdm')">Team Deathmatch</button>
  <button class="menu-btn" onclick="showLoadout('ctf')">Capture the Flag</button>
  <button class="menu-btn" onclick="showLoadout('koth')">King of the Hill</button>
  <button class="menu-btn" onclick="showLoadout('br')">Battle Royale</button>
  <div style="margin-top:24px;border-top:1px solid #333;padding-top:20px;">
    <div style="color:#8899aa;font-size:13px;margin-bottom:10px;">INDOOR ARENA</div>
    <button class="menu-btn" style="border-color:#FF6B35;color:#FF6B35;" onclick="showLoadout('indoor_tdm')">Indoor CQB - TDM</button>
    <button class="menu-btn" style="border-color:#FF6B35;color:#FF6B35;" onclick="showLoadout('indoor_koth')">Indoor CQB - KOTH</button>
    <button class="menu-btn" style="border-color:#66ccff;color:#66ccff;" onclick="showLoadout('indoor_dark_tdm')">Dark Airsoft - TDM</button>
    <button class="menu-btn" style="border-color:#66ccff;color:#66ccff;" onclick="showLoadout('indoor_dark_koth')">Dark Airsoft - KOTH</button>
  </div>
</div>

<!-- LOADOUT SCREEN -->
<div id="loadout-screen">
  <h2 style="margin-bottom:8px;">Choose Your Loadout</h2>
  <p style="color:#888;margin-bottom:16px;font-size:13px;" id="mode-label">Mode: TDM</p>
  <div class="loadout-grid" id="weapon-grid"></div>
  <h3 style="margin:12px 0 6px;">Gear</h3>
  <div class="loadout-grid" id="gear-grid"></div>
  <button class="menu-btn" style="margin-top:20px;" onclick="startGame()">DEPLOY</button>
  <button class="menu-btn" style="border-color:#888;color:#888;" onclick="backToMenu()">BACK</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="crosshair"><div class="crosshair-dot"></div></div>
  <div id="health-text">HP: 100</div>
  <div id="health-bar-container"><div id="health-bar"></div></div>
  <div id="ammo-display">
    <div id="weapon-name">M4 ASSAULT RIFLE</div>
    <div><span id="ammo-current">30</span> / <span id="ammo-reserve">120</span></div>
  </div>
  <div id="minimap"><canvas id="minimap-canvas" width="160" height="160"></canvas></div>
  <div id="kill-feed"></div>
  <div id="match-timer" style="position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:20px;font-weight:700;text-shadow:0 0 4px #000;"></div>
  <div id="mode-info" style="position:absolute;top:46px;left:50%;transform:translateX(-50%);font-size:12px;color:#ff6b35;text-transform:uppercase;letter-spacing:2px;"></div>
  <div id="ability-bar" style="position:absolute;bottom:60px;left:50%;transform:translateX(-50%);display:flex;gap:8px;">
    <div class="ability-slot" style="background:rgba(0,0,0,0.5);border:1px solid #555;border-radius:4px;padding:4px 10px;font-size:11px;">[1] Scanner</div>
    <div class="ability-slot" style="background:rgba(0,0,0,0.5);border:1px solid #555;border-radius:4px;padding:4px 10px;font-size:11px;">[2] Smoke</div>
    <div class="ability-slot" style="background:rgba(0,0,0,0.5);border:1px solid #555;border-radius:4px;padding:4px 10px;font-size:11px;">[3] Flash</div>
    <div class="ability-slot" style="background:rgba(0,0,0,0.5);border:1px solid #555;border-radius:4px;padding:4px 10px;font-size:11px;">[G] Grenade</div>
  </div>
  <div id="hitmarker">
    <div class="hm-line"></div><div class="hm-line"></div>
    <div class="hm-line"></div><div class="hm-line"></div>
  </div>
  <div id="reload-bar"><div id="reload-progress"></div></div>
  <div id="notifications"></div>
  <div id="scoreboard">
    <h3 style="color:#ff6b35;margin-bottom:10px;">SCOREBOARD</h3>
    <table><thead><tr><th>Player</th><th>Kills</th><th>Deaths</th><th>Score</th></tr></thead>
    <tbody id="scoreboard-body"></tbody></table>
  </div>
</div>

<!-- GAME OVER -->
<div id="game-over">
  <h1 id="game-over-title">VICTORY</h1>
  <div class="stats" id="game-over-stats"></div>
  <button class="menu-btn" onclick="returnToMenu()">RETURN TO MENU</button>
</div>

<!-- Game canvas container -->
<div id="game-container"></div>

<script>
// ============================================================
// AIRSOFT ROYALE - 3D Browser-Based Airsoft Game
// ============================================================
'use strict';

// ============ GAME CONSTANTS ============
const MAP_SIZE = 500;
const HALF_MAP = MAP_SIZE / 2;
const GRAVITY = -9.82;
const BB_SPEED = 80;       // units/sec (scaled from ~350fps real)
const BB_DROP = 15;         // gravity effect on lightweight BBs
const BB_LIFETIME = 2.5;    // seconds before BB despawns
const MAX_ENEMIES = 8;
const RESPAWN_TIME = 3;     // seconds
const MATCH_TIME = 300;     // 5 minutes per match
const BUILD_GRID = 2;
const BUILD_MAX_PIECES = 160;

// ============ WEAPON DEFINITIONS ============
const WEAPONS = {
  m4: {
    name: 'M4 Assault Rifle', type: 'primary', category: 'assault',
    damage: 25, fireRate: 0.1, magSize: 30, reserveAmmo: 120,
    reloadTime: 2.2, recoil: 0.015, spread: 0.02,
    range: 150, velocity: 85, auto: true,
    desc: 'Balanced assault rifle. Medium range, moderate fire rate.'
  },
  ak47: {
    name: 'AK-47', type: 'primary', category: 'assault',
    damage: 30, fireRate: 0.12, magSize: 30, reserveAmmo: 120,
    reloadTime: 2.5, recoil: 0.022, spread: 0.025,
    range: 140, velocity: 80, auto: true,
    desc: 'Hard-hitting assault rifle. Higher recoil, more damage.'
  },
  mp5: {
    name: 'MP5', type: 'primary', category: 'smg',
    damage: 18, fireRate: 0.07, magSize: 30, reserveAmmo: 150,
    reloadTime: 1.8, recoil: 0.01, spread: 0.03,
    range: 80, velocity: 70, auto: true,
    desc: 'Fast-firing SMG. Excellent in close quarters.'
  },
  p90: {
    name: 'P90', type: 'primary', category: 'smg',
    damage: 16, fireRate: 0.06, magSize: 50, reserveAmmo: 150,
    reloadTime: 2.0, recoil: 0.008, spread: 0.035,
    range: 75, velocity: 72, auto: true,
    desc: 'High capacity SMG. Very fast fire rate.'
  },
  l96: {
    name: 'L96 Sniper', type: 'primary', category: 'sniper',
    damage: 80, fireRate: 1.2, magSize: 5, reserveAmmo: 30,
    reloadTime: 3.0, recoil: 0.04, spread: 0.003,
    range: 250, velocity: 120, auto: false,
    desc: 'Bolt-action sniper. One-shot potential at long range.'
  },
  m249: {
    name: 'M249 LMG', type: 'primary', category: 'lmg',
    damage: 22, fireRate: 0.08, magSize: 100, reserveAmmo: 200,
    reloadTime: 4.0, recoil: 0.02, spread: 0.04,
    range: 130, velocity: 78, auto: true,
    desc: 'Light machine gun. Huge magazine, suppressive fire.'
  },
  pistol: {
    name: 'M9 Pistol', type: 'secondary', category: 'pistol',
    damage: 15, fireRate: 0.2, magSize: 15, reserveAmmo: 60,
    reloadTime: 1.5, recoil: 0.018, spread: 0.025,
    range: 60, velocity: 65, auto: false,
    desc: 'Standard sidearm. Reliable backup weapon.'
  },
  stick: {
    name: 'Training Stick', type: 'primary', category: 'melee',
    damage: 38, fireRate: 0.45, magSize: 1, reserveAmmo: 0,
    reloadTime: 0, recoil: 0.003, spread: 0,
    range: 5.8, velocity: 0, auto: false,
    desc: 'Close-range melee weapon. High damage in striking distance.'
  }
};

// ============ GEAR DEFINITIONS ============
const GEAR = {
  light: {
    name: 'Light Vest', speedMult: 1.0, armor: 0,
    desc: 'No armor penalty. Full speed movement.'
  },
  medium: {
    name: 'Tactical Vest', speedMult: 0.85, armor: 25,
    desc: '+25 armor. Slight speed reduction.'
  },
  heavy: {
    name: 'Heavy Plate Carrier', speedMult: 0.7, armor: 50,
    desc: '+50 armor. Significant speed reduction.'
  }
};

// ============ GAME STATE ============
const Game = {
  // Core state
  active: false,
  paused: false,
  mode: 'tdm',
  isIndoor: false,
  darkMode: false,
  matchTimer: MATCH_TIME,
  
  // Three.js
  scene: null,
  camera: null,
  renderer: null,
  clock: null,
  
  // Cannon.js
  world: null,
  
  // Player
  player: {
    body: null,
    mesh: null,
    bodyMesh: null, // Visible FP body
    health: 100,
    armor: 0,
    speed: 10,
    sprintMult: 1.6,
    crouchMult: 0.5,
    isSprinting: false,
    isCrouching: false,
    isProne: false,
    isAlive: true,
    canJump: true,
    jumpCooldown: 0,
    team: 'alpha',
    kills: 0,
    deaths: 0,
    score: 0,
    xp: 0,
    respawnTimer: 0
  },
  
  // Weapon state
  weapon: {
    current: null,
    secondary: null,
    ammo: 0,
    reserve: 0,
    isReloading: false,
    reloadTimer: 0,
    fireTimer: 0,
    isFiring: false,
    sway: { x: 0, y: 0 },
    recoilOffset: 0,
    weaponMesh: null,
    meleeSwingTimer: 0,
    meleeSwingDuration: 0.22
  },
  
  // Entities
  enemies: [],
  bbs: [],           // active BB projectiles
  powerUps: [],
  particles: [],
  
  // Input
  keys: {},
  mouse: { x: 0, y: 0, dx: 0, dy: 0 },
  mouseDown: false,
  
  // Camera control (yaw/pitch)
  yaw: 0,
  pitch: 0,
  
  // Collections for map objects
  buildings: [],
  covers: [],
  trees: [],
  buildPieces: [],

  // Build system
  build: {
    mode: false,
    selected: 'wall' // wall | floor | ramp
  },
  
  // Wind (affects BB trajectory)
  wind: { x: 0, z: 0, strength: 0 },
  
  // Minimap
  minimapCtx: null,
  
  // Kill feed
  killFeedEntries: [],
  
  // Scoreboard data
  scores: []
};

const StaticCollisionCache = {
  bodies: [],
  aabbs: []
};

function rebuildStaticCollisionCache() {
  StaticCollisionCache.bodies = [];
  StaticCollisionCache.aabbs = [];
  if (!Game.world) return;

  for (let i = 0; i < Game.world.bodies.length; i++) {
    const body = Game.world.bodies[i];
    if (body.mass !== 0) continue;
    if (!body.shapes || body.shapes.length === 0) continue;
    if (body.shapes[0].type !== CANNON.Shape.types.BOX) continue;

    body.computeAABB();
    StaticCollisionCache.bodies.push(body);
    StaticCollisionCache.aabbs.push({
      lower: {
        x: body.aabb.lowerBound.x,
        y: body.aabb.lowerBound.y,
        z: body.aabb.lowerBound.z
      },
      upper: {
        x: body.aabb.upperBound.x,
        y: body.aabb.upperBound.y,
        z: body.aabb.upperBound.z
      }
    });
  }
}

// ============ SELECTED LOADOUT ============
let selectedWeapon = 'm4';
let selectedGear = 'light';

// ============ MENU FUNCTIONS ============
function showLoadout(mode) {
  // Check map/mode variants
  if (mode.startsWith('indoor_dark_')) {
    Game.isIndoor = true;
    Game.darkMode = true;
    Game.mode = mode.replace('indoor_dark_', '');
  } else if (mode.startsWith('indoor_')) {
    Game.isIndoor = true;
    Game.darkMode = false;
    Game.mode = mode.replace('indoor_', '');
  } else {
    Game.isIndoor = false;
    Game.darkMode = false;
    Game.mode = mode;
  }
  const labels = { tdm:'Team Deathmatch', ctf:'Capture the Flag', koth:'King of the Hill', br:'Battle Royale' };
  const mapLabel = Game.isIndoor ? (Game.darkMode ? ' (Indoor Dark Mode)' : ' (Indoor CQB)') : '';
  document.getElementById('mode-label').textContent = 'Mode: ' + (labels[Game.mode] || Game.mode) + mapLabel;
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('loadout-screen').style.display = 'flex';
  buildLoadoutUI();
}

function backToMenu() {
  document.getElementById('loadout-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
}

function returnToMenu() {
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  Game.active = false;
}

function buildLoadoutUI() {
  // Weapon grid
  const wg = document.getElementById('weapon-grid');
  wg.innerHTML = '';
  for (const [key, w] of Object.entries(WEAPONS)) {
    if (w.type !== 'primary') continue;
    const card = document.createElement('div');
    card.className = 'loadout-card' + (key === selectedWeapon ? ' selected' : '');
    card.innerHTML = `<h3>${w.name}</h3><p>${w.desc}</p>
      <p style="color:#ff6b35;margin-top:6px;">DMG:${w.damage} | RPM:${Math.round(60/w.fireRate)} | MAG:${w.magSize}</p>`;
    card.onclick = () => { selectedWeapon = key; buildLoadoutUI(); };
    wg.appendChild(card);
  }
  // Gear grid
  const gg = document.getElementById('gear-grid');
  gg.innerHTML = '';
  for (const [key, g] of Object.entries(GEAR)) {
    const card = document.createElement('div');
    card.className = 'loadout-card' + (key === selectedGear ? ' selected' : '');
    card.innerHTML = `<h3>${g.name}</h3><p>${g.desc}</p>`;
    card.onclick = () => { selectedGear = key; buildLoadoutUI(); };
    gg.appendChild(card);
  }
}

// ============ THREE.JS SCENE SETUP ============
function initScene() {
  // Renderer
  Game.renderer = new THREE.WebGLRenderer({ antialias: true });
  Game.renderer.setSize(window.innerWidth, window.innerHeight);
  Game.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  Game.renderer.shadowMap.enabled = true;
  Game.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  Game.renderer.toneMapping = THREE.ACESFilmicToneMapping;
  Game.renderer.toneMappingExposure = 1.0;
  document.getElementById('game-container').appendChild(Game.renderer.domElement);

  // Scene
  Game.scene = new THREE.Scene();
  Game.scene.background = new THREE.Color(0x87ceeb);
  Game.scene.fog = new THREE.FogExp2(0x87ceeb, 0.003);

  // Camera (FPS)
  Game.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  Game.camera.position.set(0, 2, 0);

  // Clock
  Game.clock = new THREE.Clock();

  // Lighting
  initLighting();

  // Skybox gradient
  initSky();
}

function initLighting() {
  // Ambient light
  const ambient = new THREE.AmbientLight(0x6688aa, 0.5);
  Game.scene.add(ambient);

  // Directional sun
  const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
  sun.position.set(100, 150, 80);

}

function initSky() {
  // Simple gradient sky dome
  const skyGeo = new THREE.SphereGeometry(400, 16, 16);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: {
      topColor: { value: new THREE.Color(0x0055aa) },
      bottomColor: { value: new THREE.Color(0x87ceeb) },
    },
    vertexShader: `
      varying vec3 vWorldPosition;
      void main() {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPos.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      varying vec3 vWorldPosition;
      void main() {
        float h = normalize(vWorldPosition).y;
        gl_FragColor = vec4(mix(bottomColor, topColor, max(h, 0.0)), 1.0);
      }
    `,
    side: THREE.BackSide,
    depthWrite: false
  });
  Game.scene.add(new THREE.Mesh(skyGeo, skyMat));
}

// ============ CANNON.JS PHYSICS SETUP ============
function initPhysics() {
  Game.world = new CANNON.World();
  Game.world.gravity.set(0, GRAVITY, 0);
  Game.world.broadphase = new CANNON.NaiveBroadphase();
  Game.world.solver.iterations = 10;
  Game.world.defaultContactMaterial.friction = 0.3;
  Game.world.defaultContactMaterial.restitution = 0.2;

  // Ground physics body
  const groundShape = new CANNON.Plane();
  const groundBody = new CANNON.Body({ mass: 0, shape: groundShape });
  groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
  Game.world.addBody(groundBody);
}

// ============ MAP / TERRAIN ============
function createTerrain() {
  // Ground plane with texture
  const groundGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 64, 64);
  // Add slight elevation variation
  const vertices = groundGeo.attributes.position.array;
  for (let i = 0; i < vertices.length; i += 3) {
    const x = vertices[i], y = vertices[i + 1];
    vertices[i + 2] = Math.sin(x * 0.02) * Math.cos(y * 0.02) * 2 +
                       Math.sin(x * 0.05 + y * 0.03) * 0.8;
  }
  groundGeo.computeVertexNormals();

  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x4a7c3f, roughness: 0.9, metalness: 0.0,
    flatShading: false
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  Game.scene.add(ground);

  // Dirt paths
  createPath(0, 0, MAP_SIZE * 0.8, 6, 0);
  createPath(0, 0, MAP_SIZE * 0.6, 6, Math.PI / 2);
}

function createPath(x, z, length, width, rotation) {
  const geo = new THREE.PlaneGeometry(length, width);
  const mat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 1.0 });
  const path = new THREE.Mesh(geo, mat);
  path.rotation.x = -Math.PI / 2;
  path.rotation.z = rotation;
  path.position.set(x, 0.02, z);
  path.receiveShadow = true;
  Game.scene.add(path);
}

// ============ BUILDINGS ============
function createBuildings() {
  // Building configs: [x, z, width, depth, height, floors]
  const configs = [
    [40, 40, 20, 15, 10, 2],
    [-60, 30, 25, 20, 12, 2],
    [80, -50, 18, 18, 8, 1],
    [-30, -70, 22, 16, 10, 2],
    [0, 80, 30, 20, 14, 3],
  ];

  configs.forEach(([x, z, w, d, h, floors]) => {
    createBuilding(x, z, w, d, h, floors);
  });
}

function createBuilding(x, z, w, d, h, floors) {
  const group = new THREE.Group();
  
  // Walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x999988, roughness: 0.8 });
  
  // Front wall with door gap
  const doorW = 3, doorH = 4;
  // Left part of front wall
  addWall(group, wallMat, (w - doorW) / 4, h, -(d / 2), x - doorW / 2 - (w - doorW) / 4, h / 2, z);
  // Right part of front wall
  addWall(group, wallMat, (w - doorW) / 4, h, -(d / 2), x + doorW / 2 + (w - doorW) / 4, h / 2, z);
  // Above door section
  addWall(group, wallMat, doorW, h - doorH, -(d / 2), x, h - (h - doorH) / 2, z);
  
  // Back wall (solid)
  const backGeo = new THREE.BoxGeometry(w, h, 0.5);
  const backMesh = new THREE.Mesh(backGeo, wallMat);
  backMesh.position.set(x, h / 2, z + d / 2);
  backMesh.castShadow = true; backMesh.receiveShadow = true;
  group.add(backMesh);
  addPhysBox(w, h, 0.5, x, h / 2, z + d / 2);

  // Side walls
  const sideGeo = new THREE.BoxGeometry(0.5, h, d);
  [-1, 1].forEach(side => {
    const sideMesh = new THREE.Mesh(sideGeo, wallMat);
    sideMesh.position.set(x + side * w / 2, h / 2, z + d * 0.0);
    sideMesh.castShadow = true; sideMesh.receiveShadow = true;
    group.add(sideMesh);
    addPhysBox(0.5, h, d, x + side * w / 2, h / 2, z);
  });

  // Floor slabs for each storey
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x777766, roughness: 0.9 });
  for (let f = 1; f < floors; f++) {
    const floorGeo = new THREE.BoxGeometry(w - 1, 0.3, d - 1);
    const floorMesh = new THREE.Mesh(floorGeo, floorMat);
    floorMesh.position.set(x, f * (h / floors), z);
    floorMesh.receiveShadow = true;
    group.add(floorMesh);
    addPhysBox(w - 1, 0.3, d - 1, x, f * (h / floors), z);
  }

  // Roof
  const roofGeo = new THREE.BoxGeometry(w + 2, 0.4, d + 2);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x665544, roughness: 0.85 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.set(x, h, z);
  roof.castShadow = true; roof.receiveShadow = true;
  group.add(roof);
  addPhysBox(w + 2, 0.4, d + 2, x, h, z);

  Game.scene.add(group);
  Game.buildings.push({ group, x, z, w, d, h });
}

function addWall(group, mat, w2, h2, offsetZ, px, py, pz) {
  const geo = new THREE.BoxGeometry(w2, h2, 0.5);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(px, py, pz + offsetZ);
  mesh.castShadow = true; mesh.receiveShadow = true;
  group.add(mesh);
  addPhysBox(w2, h2, 0.5, px, py, pz + offsetZ);
}

function addPhysBox(w, h, d, x, y, z) {
  const shape = new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2));
  const body = new CANNON.Body({ mass: 0, shape });
  body.position.set(x, y, z);
  Game.world.addBody(body);
}

// ============ COVER, TREES, OBSTACLES ============
function createCover() {
  const coverMat = new THREE.MeshStandardMaterial({ color: 0x556644, roughness: 0.85 });
  const sandbagMat = new THREE.MeshStandardMaterial({ color: 0x998866, roughness: 0.95 });
  const barrelMat = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.6, metalness: 0.3 });

  // Sandbag bunkers (scattered around)
  const bunkerPositions = [
    [20, -20], [-40, 10], [60, 60], [-80, -40], [10, 50],
    [-50, -60], [70, 20], [30, -80], [-20, 80], [90, -30],
    [-90, 50], [50, -60], [-60, 70], [15, -45], [-35, -30]
  ];
  bunkerPositions.forEach(([x, z]) => {
    const w = 4 + Math.random() * 3, h = 1.2 + Math.random() * 0.8, d = 1.5;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(geo, sandbagMat);
    mesh.position.set(x, h / 2, z);
    mesh.rotation.y = Math.random() * Math.PI;
    mesh.castShadow = true; mesh.receiveShadow = true;
    Game.scene.add(mesh);
    addPhysBox(w, h, d, x, h / 2, z);
    Game.covers.push(mesh);
  });

  // Barrels
  const barrelPositions = [
    [25, 15], [-15, -25], [55, 35], [-45, 45], [5, -55],
    [-70, -15], [85, 10], [35, 75], [-25, -85], [65, -45]
  ];
  barrelPositions.forEach(([x, z]) => {
    const geo = new THREE.CylinderGeometry(0.8, 0.8, 2, 8);
    const mesh = new THREE.Mesh(geo, barrelMat);
    mesh.position.set(x, 1, z);
    mesh.castShadow = true; mesh.receiveShadow = true;
    Game.scene.add(mesh);
    addPhysBox(1.6, 2, 1.6, x, 1, z);
    Game.covers.push(mesh);
  });

  // Concrete barriers
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const r = 30 + Math.random() * 60;
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    const geo = new THREE.BoxGeometry(6, 2.5, 1);
    const mesh = new THREE.Mesh(geo, coverMat);
    mesh.position.set(x, 1.25, z);
    mesh.rotation.y = angle + Math.PI / 2;
    mesh.castShadow = true; mesh.receiveShadow = true;
    Game.scene.add(mesh);
    addPhysBox(6, 2.5, 1, x, 1.25, z);
    Game.covers.push(mesh);
  }
}

function createTrees() {
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5C3A1E, roughness: 0.9 });
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32, roughness: 0.8 });
  const leafMat2 = new THREE.MeshStandardMaterial({ color: 0x388E3C, roughness: 0.8 });

  for (let i = 0; i < 60; i++) {
    const x = (Math.random() - 0.5) * MAP_SIZE * 0.9;
    const z = (Math.random() - 0.5) * MAP_SIZE * 0.9;
    
    // Skip if too close to buildings
    let tooClose = false;
    for (const b of Game.buildings) {
      if (Math.abs(x - b.x) < b.w && Math.abs(z - b.z) < b.d) { tooClose = true; break; }
    }
    if (tooClose) continue;

    const treeGroup = new THREE.Group();
    const height = 5 + Math.random() * 6;
    const radius = 2 + Math.random() * 2;

    // Trunk
    const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, height, 6);
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = height / 2;
    trunk.castShadow = true;
    treeGroup.add(trunk);

    // Canopy (stacked cones for pine look)
    const mat = Math.random() > 0.5 ? leafMat : leafMat2;
    for (let j = 0; j < 3; j++) {
      const coneH = radius * 1.2;
      const coneR = radius * (1 - j * 0.2);
      const coneGeo = new THREE.ConeGeometry(coneR, coneH, 7);
      const cone = new THREE.Mesh(coneGeo, mat);
      cone.position.y = height * 0.5 + j * coneH * 0.5;
      cone.castShadow = true;
      treeGroup.add(cone);
    }

    treeGroup.position.set(x, 0, z);
    Game.scene.add(treeGroup);
    Game.trees.push(treeGroup);
    // Tree trunk collision
    addPhysBox(1, height, 1, x, height / 2, z);
  }
}

// Out-of-bounds markers
function createBoundaryMarkers() {
  const markerMat = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.5, transparent: true, opacity: 0.5 });
  const size = MAP_SIZE;

// ============ PLAYER CONTROLLER ============
function initPlayer() {
  const gear = GEAR[selectedGear];
  Game.player.armor = gear.armor;
  Game.player.speed = 10 * gear.speedMult;
  Game.player.health = 100;
  Game.player.isAlive = true;
  Game.player.kills = 0;
  Game.player.deaths = 0;
  Game.player.score = 0;

  // Physics body for player (capsule approximated by sphere)
  const shape = new CANNON.Sphere(0.8);
  Game.player.body = new CANNON.Body({ mass: 80, shape, linearDamping: 0.9 });
  Game.player.body.position.set(0, 3, -20);
  Game.player.body.fixedRotation = true;
  Game.world.addBody(Game.player.body);

  Game.camera.position.copy(Game.player.body.position);
  Game.yaw = 0;
  Game.pitch = 0;
  
  // Create visible first-person body
  createPlayerBody();
}

// Create visible first-person body (arms, torso, legs)
function createPlayerBody() {
  const bodyGroup = new THREE.Group();
  
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xddaa88, roughness: 0.8 });
  const shirtMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.7 });
  const pantsMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.8 });
  
  // Torso (visible when looking down)
  const torsoGeo = new THREE.BoxGeometry(0.6, 0.8, 0.3);
  const torso = new THREE.Mesh(torsoGeo, shirtMat);
  torso.position.set(0, -0.9, 0.2);
  bodyGroup.add(torso);
  
  // Left arm
  const armGeo = new THREE.BoxGeometry(0.12, 0.6, 0.12);
  const leftArm = new THREE.Mesh(armGeo, shirtMat);
  leftArm.position.set(-0.4, -0.7, -0.4);
  bodyGroup.add(leftArm);
  
  // Right arm
  const rightArm = new THREE.Mesh(armGeo.clone(), shirtMat);
  rightArm.position.set(0.4, -0.7, -0.4);
  bodyGroup.add(rightArm);
  
  // Left hand
  const handGeo = new THREE.BoxGeometry(0.14, 0.08, 0.2);
  const leftHand = new THREE.Mesh(handGeo, skinMat);
  leftHand.position.set(-0.4, -1.0, -0.5);
  bodyGroup.add(leftHand);
  
  // Right hand
  const rightHand = new THREE.Mesh(handGeo.clone(), skinMat);
  rightHand.position.set(0.4, -1.0, -0.5);
  bodyGroup.add(rightHand);
  
  // Legs (visible when looking down or jumping)
  const legGeo = new THREE.BoxGeometry(0.2, 0.7, 0.2);
  const leftLeg = new THREE.Mesh(legGeo, pantsMat);
  leftLeg.position.set(-0.15, -1.5, 0.1);
  bodyGroup.add(leftLeg);
  
  const rightLeg = new THREE.Mesh(legGeo.clone(), pantsMat);
  rightLeg.position.set(0.15, -1.5, 0.1);
  bodyGroup.add(rightLeg);
  
  // Feet
  const footGeo = new THREE.BoxGeometry(0.22, 0.12, 0.35);
  const leftFoot = new THREE.Mesh(footGeo, new THREE.MeshStandardMaterial({ color: 0x222222 }));
  leftFoot.position.set(-0.15, -1.9, 0.15);
  bodyGroup.add(leftFoot);
  
  const rightFoot = new THREE.Mesh(footGeo.clone(), new THREE.MeshStandardMaterial({ color: 0x222222 }));
  rightFoot.position.set(0.15, -1.9, 0.15);
  bodyGroup.add(rightFoot);
  
  // Attach to camera
  Game.camera.add(bodyGroup);
  Game.player.bodyMesh = bodyGroup;
  
  // Store references for animation
  bodyGroup.userData = {
    leftArm, rightArm, leftHand, rightHand,
    leftLeg, rightLeg, leftFoot, rightFoot, torso
  };
}

function updatePlayer(dt) {
  if (!Game.player.isAlive) {
    Game.player.respawnTimer -= dt;
    if (Game.player.respawnTimer <= 0) respawnPlayer();
    return;
  }

  const speed = Game.player.speed *
    (Game.player.isSprinting ? Game.player.sprintMult : 1) *
    (Game.player.isCrouching ? Game.player.crouchMult : 1) *
    (Game.player.isProne ? 0.3 : 1);

  // Direction vectors from camera yaw
  const forward = new THREE.Vector3(-Math.sin(Game.yaw), 0, -Math.cos(Game.yaw));
  const right = new THREE.Vector3(Math.cos(Game.yaw), 0, -Math.sin(Game.yaw));

  const moveDir = new THREE.Vector3(0, 0, 0);
  if (Game.keys['KeyW'] || Game.keys['ArrowUp']) moveDir.add(forward);
  if (Game.keys['KeyS'] || Game.keys['ArrowDown']) moveDir.sub(forward);
  if (Game.keys['KeyA'] || Game.keys['ArrowLeft']) moveDir.sub(right);
  if (Game.keys['KeyD'] || Game.keys['ArrowRight']) moveDir.add(right);

  if (moveDir.length() > 0) {
    moveDir.normalize().multiplyScalar(speed);
    Game.player.body.velocity.x = moveDir.x;
    Game.player.body.velocity.z = moveDir.z;
  } else {
    Game.player.body.velocity.x *= 0.85;
    Game.player.body.velocity.z *= 0.85;
  }

  // Jumping (fixed with cooldown)
  if (Game.player.jumpCooldown > 0) {
    Game.player.jumpCooldown -= dt;
  }
  
  if (Game.keys['Space'] && Game.player.canJump && Math.abs(Game.player.body.velocity.y) < 0.5) {
    Game.player.body.velocity.y = 10; // Increased jump height
    Game.player.canJump = false;
    Game.player.jumpCooldown = 0.5; // Half second cooldown
  }
  
  // Reset jump when grounded
  if (Game.player.jumpCooldown <= 0 && Math.abs(Game.player.body.velocity.y) < 0.1) {
    Game.player.canJump = true;
  }

  // Camera height based on stance
  let targetEye = 1.7;
  if (Game.player.isCrouching) targetEye = 1.0;
  if (Game.player.isProne) targetEye = 0.4;

  // Sync camera to physics body
  const pos = Game.player.body.position;
  Game.camera.position.x = pos.x;
  Game.camera.position.y = pos.y + targetEye;
  Game.camera.position.z = pos.z;

  // Apply yaw & pitch to camera
  const euler = new THREE.Euler(Game.pitch, Game.yaw, 0, 'YXZ');
  Game.camera.quaternion.setFromEuler(euler);

  // Update visible body animation
  updatePlayerBody(dt);

  // Keep in bounds
  const halfBound = Game.isIndoor ? INDOOR_HALF - 2 : HALF_MAP - 2;
  pos.x = Math.max(-halfBound, Math.min(halfBound, pos.x));
  pos.z = Math.max(-halfBound, Math.min(halfBound, pos.z));
}

// Animate player body based on movement
function updatePlayerBody(dt) {
  if (!Game.player.bodyMesh) return;
  
  const time = Game.clock.elapsedTime;
  const parts = Game.player.bodyMesh.userData;
  const isMoving = Game.keys['KeyW'] || Game.keys['KeyS'] || Game.keys['KeyA'] || Game.keys['KeyD'];
  const isJumping = Math.abs(Game.player.body.velocity.y) > 0.5;
  
  // Bobbing animation when walking/running
  if (isMoving && !isJumping) {
    const bobSpeed = Game.player.isSprinting ? 10 : 6;
    const bobAmount = Game.player.isSprinting ? 0.08 : 0.05;
    
    // Arms swing
    parts.leftArm.rotation.x = Math.sin(time * bobSpeed) * 0.5;
    parts.rightArm.rotation.x = -Math.sin(time * bobSpeed) * 0.5;
    parts.leftHand.rotation.x = Math.sin(time * bobSpeed) * 0.5;
    parts.rightHand.rotation.x = -Math.sin(time * bobSpeed) * 0.5;
    
    // Legs swing
    parts.leftLeg.rotation.x = -Math.sin(time * bobSpeed) * 0.6;
    parts.rightLeg.rotation.x = Math.sin(time * bobSpeed) * 0.6;
    parts.leftFoot.rotation.x = -Math.sin(time * bobSpeed) * 0.4;
    parts.rightFoot.rotation.x = Math.sin(time * bobSpeed) * 0.4;
    
    // Vertical bob
    Game.player.bodyMesh.position.y = Math.sin(time * bobSpeed * 2) * bobAmount;
  } else {
    // Idle - slight sway
    parts.leftArm.rotation.x = Math.sin(time * 1.5) * 0.05;
    parts.rightArm.rotation.x = Math.sin(time * 1.5 + Math.PI) * 0.05;
    parts.leftHand.rotation.x = 0;
    parts.rightHand.rotation.x = 0;
    parts.leftLeg.rotation.x = 0;
    parts.rightLeg.rotation.x = 0;
    parts.leftFoot.rotation.x = 0;
    parts.rightFoot.rotation.x = 0;
    Game.player.bodyMesh.position.y = 0;
  }
  
  // Jumping - legs tucked
  if (isJumping && Game.player.body.velocity.y > 0) {
    parts.leftLeg.rotation.x = 0.6;
    parts.rightLeg.rotation.x = 0.6;
    parts.leftFoot.rotation.x = -0.3;
    parts.rightFoot.rotation.x = -0.3;
  }
  
  // Crouching - lower torso
  if (Game.player.isCrouching) {
    parts.torso.position.y = -1.2;
    parts.leftLeg.position.y = -1.7;
    parts.rightLeg.position.y = -1.7;
    parts.leftLeg.rotation.x = -1.0;
    parts.rightLeg.rotation.x = -1.0;
  } else if (Game.player.isProne) {
    // Prone - very low
    parts.torso.position.y = -1.5;
    parts.leftLeg.position.y = -2.0;
    parts.rightLeg.position.y = -2.0;
    parts.leftLeg.rotation.x = -1.5;
    parts.rightLeg.rotation.x = -1.5;
  } else {
    // Standing
    parts.torso.position.y = -0.9;
    parts.leftLeg.position.y = -1.5;
    parts.rightLeg.position.y = -1.5;
  }
  
  // Sprint animation - lean forward slightly
  if (Game.player.isSprinting && isMoving) {
    Game.player.bodyMesh.rotation.x = 0.1;
  } else {
    Game.player.bodyMesh.rotation.x = 0;
  }
}

function respawnPlayer() {
  if (Game.isIndoor) {
    respawnIndoorPlayer();
    return;
  }
  Game.player.isAlive = true;
  Game.player.health = 100;
  const angle = Math.random() * Math.PI * 2;
  const r = 20 + Math.random() * 30;
  Game.player.body.position.set(Math.cos(angle) * r, 3, Math.sin(angle) * r);
  Game.player.body.velocity.set(0, 0, 0);
  showNotification('Respawned!');
}

function damagePlayer(amount) {
  if (!Game.player.isAlive) return;
  // Armor absorbs part of damage
  let dmg = amount;
  if (Game.player.armor > 0) {
    const absorbed = Math.min(Game.player.armor, dmg * 0.6);
    Game.player.armor -= absorbed;
    dmg -= absorbed;
  }
  Game.player.health -= dmg;
  
  // Red damage flash
  const overlay = document.getElementById('damage-overlay');
  overlay.style.background = 'radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0.4) 100%)';
  overlay.style.opacity = 1;
  setTimeout(() => { overlay.style.opacity = 0; }, 200);

  if (Game.player.health <= 0) {
    Game.player.health = 0;
    killPlayer();
  }
}

function killPlayer() {
  Game.player.isAlive = false;
  Game.player.deaths++;
  Game.player.respawnTimer = RESPAWN_TIME;
  showNotification('You were eliminated! Respawning...');
}

// ============ INPUT HANDLING ============
function initInput() {
  // Keyboard
  document.addEventListener('keydown', (e) => {
    Game.keys[e.code] = true;
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') Game.player.isSprinting = true;
    if (e.code === 'KeyC') Game.player.isCrouching = !Game.player.isCrouching;
    if (e.code === 'KeyX') { Game.player.isProne = !Game.player.isProne; Game.player.isCrouching = false; }
    if (e.code === 'KeyR') startReload();
    if (e.code === 'KeyQ') switchWeapon();
    if (e.code === 'KeyE') interactNearby();
    if (e.code === 'KeyG') throwGrenade();
    if (e.code === 'Tab') { e.preventDefault(); document.getElementById('scoreboard').style.display = 'block'; updateScoreboard(); }
    if (e.code === 'Digit1') useAbility('scanner');
    if (e.code === 'Digit2') useAbility('smoke');
    if (e.code === 'Digit3') useAbility('flash');
    if (e.code === 'KeyB') {
      Game.build.mode = !Game.build.mode;
      showNotification('Build mode: ' + (Game.build.mode ? 'ON' : 'OFF'));
    }
    if (e.code === 'KeyV') {
      Game.build.selected = 'wall';
      if (Game.build.mode) showNotification('Build piece: WALL');
    }
    if (e.code === 'KeyN') {
      Game.build.selected = 'floor';
      if (Game.build.mode) showNotification('Build piece: FLOOR');
    }
    if (e.code === 'KeyM') {
      Game.build.selected = 'ramp';
      if (Game.build.mode) showNotification('Build piece: RAMP');
    }
  });

  document.addEventListener('keyup', (e) => {
    Game.keys[e.code] = false;
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') Game.player.isSprinting = false;
    if (e.code === 'Tab') document.getElementById('scoreboard').style.display = 'none';
  });

  // Mouse
  document.addEventListener('mousedown', (e) => {
    if (e.button === 0) {
      if (Game.build.mode) {
        placeBuildPiece();
      } else {
        Game.mouseDown = true;
      }
    }
  });
  document.addEventListener('mouseup', (e) => {
    if (e.button === 0) Game.mouseDown = false;
  });

  // Pointer lock
  const canvas = Game.renderer.domElement;
  canvas.addEventListener('click', () => {
    if (!Game.active) return;
    canvas.requestPointerLock();
  });

  document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement === canvas) {
      Game.paused = false;
      document.getElementById('blocker').style.display = 'none';
    } else {
      if (Game.active) {
        Game.paused = true;
        document.getElementById('blocker').style.display = 'flex';
      }
    }
  });

  document.getElementById('blocker').addEventListener('click', () => {
    canvas.requestPointerLock();
  });

  // Mouse movement
  document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement !== canvas) return;
    const sensitivity = 0.002;
    Game.yaw -= e.movementX * sensitivity;
    Game.pitch -= e.movementY * sensitivity;
    Game.pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, Game.pitch));
  });

  // Window resize
  window.addEventListener('resize', () => {
    Game.camera.aspect = window.innerWidth / window.innerHeight;
    Game.camera.updateProjectionMatrix();
    Game.renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ============ WEAPON SYSTEM ============
function equipWeapon(weaponKey) {
  const w = WEAPONS[weaponKey];
  Game.weapon.current = { ...w, key: weaponKey };
  Game.weapon.ammo = w.magSize;
  Game.weapon.reserve = w.reserveAmmo;
  Game.weapon.isReloading = false;
  Game.weapon.fireTimer = 0;

  // Create weapon view model (simple box for now)
  if (Game.weapon.weaponMesh) {
    Game.camera.remove(Game.weapon.weaponMesh);
  }

  // Stick has a dedicated melee view model.
  if (w.category === 'melee') {
    const stickGroup = new THREE.Group();
    const stickGeo = new THREE.CylinderGeometry(0.022, 0.028, 1.05, 8);
    const stickMat = new THREE.MeshStandardMaterial({ color: 0x8d6e3f, roughness: 0.92, metalness: 0.02 });
    const stick = new THREE.Mesh(stickGeo, stickMat);
    stick.rotation.z = Math.PI / 2;
    stick.position.set(0.08, -0.02, -0.45);
    stickGroup.add(stick);

    const gripGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.2, 8);
    const gripMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.05 });
    const grip = new THREE.Mesh(gripGeo, gripMat);
    grip.rotation.z = Math.PI / 2;
    grip.position.set(0.42, -0.02, -0.45);
    stickGroup.add(grip);

    stickGroup.position.set(0.22, -0.18, -0.28);
    Game.camera.add(stickGroup);
    Game.weapon.weaponMesh = stickGroup;
    Game.scene.add(Game.camera);
    return;
  }

  const group = new THREE.Group();
  
  // Gun body
  const bodyLen = w.category === 'sniper' ? 1.6 : w.category === 'lmg' ? 1.3 : w.category === 'smg' ? 0.7 : 1.0;
  const bodyGeo = new THREE.BoxGeometry(0.06, 0.08, bodyLen);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3, metalness: 0.7 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.z = -bodyLen / 2;
  group.add(body);

  // Magazine
  const magGeo = new THREE.BoxGeometry(0.04, 0.15, 0.06);
  const magMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4, metalness: 0.5 });
  const mag = new THREE.Mesh(magGeo, magMat);
  mag.position.set(0, -0.1, -0.3);
  group.add(mag);

  // Stock
  const stockGeo = new THREE.BoxGeometry(0.05, 0.06, 0.3);
  const stock = new THREE.Mesh(stockGeo, bodyMat);
  stock.position.set(0, -0.02, 0.15);
  group.add(stock);

  // Position gun in view
  group.position.set(0.25, -0.2, -0.3);
  Game.camera.add(group);
  Game.weapon.weaponMesh = group;
  Game.scene.add(Game.camera);
}

function equipSecondary() {
  Game.weapon.secondary = { ...WEAPONS.pistol, key: 'pistol' };
}

function switchWeapon() {
  if (!Game.weapon.secondary || Game.weapon.isReloading) return;
  const temp = Game.weapon.current;
  const tempAmmo = Game.weapon.ammo;
  const tempReserve = Game.weapon.reserve;
  
  equipWeapon(Game.weapon.secondary.key);
  Game.weapon.secondary = temp;
}

function snapGrid(v) {
  return Math.round(v / BUILD_GRID) * BUILD_GRID;
}

function getBuildForwardDir() {
  const f = new THREE.Vector3(0, 0, -1);
  f.applyAxisAngle(new THREE.Vector3(0, 1, 0), Game.yaw);
  f.y = 0;
  if (f.lengthSq() < 0.001) f.set(0, 0, -1);
  return f.normalize();
}

function addBuildPieceMesh(mesh, body) {
  Game.scene.add(mesh);
  Game.buildPieces.push({ mesh, body });

  if (Game.buildPieces.length > BUILD_MAX_PIECES) {
    const old = Game.buildPieces.shift();
    Game.scene.remove(old.mesh);
    if (old.body) Game.world.removeBody(old.body);
  }

  rebuildStaticCollisionCache();
}

function createBuildWall(basePos, dir) {
  const faceX = Math.abs(dir.x) > Math.abs(dir.z);
  const w = faceX ? 0.4 : 4;
  const d = faceX ? 4 : 0.4;
  const h = 3;

  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color: 0xbca56f, roughness: 0.85 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(snapGrid(basePos.x), h / 2, snapGrid(basePos.z));
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  const shape = new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2));
  const body = new CANNON.Body({ mass: 0, shape });
  body.position.set(mesh.position.x, mesh.position.y, mesh.position.z);
  Game.world.addBody(body);

  addBuildPieceMesh(mesh, body);
}

function createBuildFloor(basePos) {
  const w = 4, d = 4, h = 0.3;
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color: 0x8f7d4f, roughness: 0.9 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(snapGrid(basePos.x), Math.max(0.2, Game.player.body.position.y - 1.2), snapGrid(basePos.z));
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  const shape = new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2));
  const body = new CANNON.Body({ mass: 0, shape });
  body.position.set(mesh.position.x, mesh.position.y, mesh.position.z);
  Game.world.addBody(body);

  addBuildPieceMesh(mesh, body);
}

function createBuildRamp(basePos, dir) {
  const w = 4, d = 4, h = 0.6;
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ color: 0xa68e57, roughness: 0.9 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(snapGrid(basePos.x), Math.max(0.5, Game.player.body.position.y - 0.8), snapGrid(basePos.z));
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  if (Math.abs(dir.x) > Math.abs(dir.z)) {
    mesh.rotation.z = dir.x > 0 ? -Math.PI / 7 : Math.PI / 7;
  } else {
    mesh.rotation.x = dir.z > 0 ? Math.PI / 7 : -Math.PI / 7;
  }

  const shape = new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2));
  const body = new CANNON.Body({ mass: 0, shape });
  body.position.set(mesh.position.x, mesh.position.y, mesh.position.z);
  Game.world.addBody(body);

  addBuildPieceMesh(mesh, body);
}

function placeBuildPiece() {
  if (!Game.build.mode || !Game.player.isAlive) return;

  const dir = getBuildForwardDir();
  const basePos = Game.camera.position.clone().add(dir.clone().multiplyScalar(6));

  if (Game.build.selected === 'wall') {
    createBuildWall(basePos, dir);
  } else if (Game.build.selected === 'floor') {
    createBuildFloor(basePos);
  } else {
    createBuildRamp(basePos, dir);
  }

  showNotification('Built ' + Game.build.selected.toUpperCase());
}

function shoot(dt) {
  const w = Game.weapon.current;
  if (!w || Game.weapon.isReloading) return;
  if (w.category !== 'melee' && Game.weapon.ammo <= 0) return;
  if (!Game.player.isAlive) return;

  Game.weapon.fireTimer -= dt;
  if (Game.weapon.fireTimer > 0) return;
  
  if (!w.auto && !Game.mouseDown) return;

  Game.weapon.fireTimer = w.fireRate;

  // Melee strike path for stick weapon.
  if (w.category === 'melee') {
    Game.weapon.meleeSwingTimer = Game.weapon.meleeSwingDuration;

    const strikeOrigin = Game.camera.position.clone();
    const strikeDir = new THREE.Vector3(0, 0, -1).applyQuaternion(Game.camera.quaternion).normalize();
    const maxDist = w.range || 5.8;
    const arcCos = Math.cos(Math.PI / 2.8); // wider strike arc (~64 deg)

    let bestIdx = -1;
    let bestDist = Infinity;
    for (let i = 0; i < Game.enemies.length; i++) {
      const e = Game.enemies[i];
      if (!e.alive) continue;
      const toEnemy = new THREE.Vector3().subVectors(e.mesh.position, strikeOrigin);
      const dist = toEnemy.length();
      if (dist > maxDist) continue;
      const align = toEnemy.normalize().dot(strikeDir);
      if (align < arcCos) continue;
      if (typeof hasLineOfSight === 'function' && !hasLineOfSight(strikeOrigin, e.mesh.position)) continue;
      if (dist < bestDist) {
        bestDist = dist;
        bestIdx = i;
      }
    }

    if (bestIdx >= 0) {
      if (Game.isIndoor) hitIndoorEnemy(bestIdx, w.damage);
      else hitEnemy(bestIdx, w.damage);
      showHitMarker();
      showNotification('Stick hit!');
    }

    Game.pitch += 0.01;
    Game.yaw += (Math.random() - 0.5) * 0.01;
    Game.weapon.recoilOffset = 0.03;
    return;
  }

  Game.weapon.ammo--;

  // Recoil
  Game.pitch += w.recoil * (0.8 + Math.random() * 0.4);
  Game.yaw += (Math.random() - 0.5) * w.recoil * 0.5;
  Game.weapon.recoilOffset = 0.05;

  // Spread calculation
  const spread = w.spread * (Game.player.isSprinting ? 2.5 : 1) * (Game.player.isCrouching ? 0.6 : 1);

  // Create BB projectile
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(Game.camera.quaternion);
  dir.x += (Math.random() - 0.5) * spread;
  dir.y += (Math.random() - 0.5) * spread;
  dir.z += (Math.random() - 0.5) * spread;
  dir.normalize();

  const bbPos = Game.camera.position.clone();
  bbPos.add(dir.clone().multiplyScalar(1.5));

  // BB mesh (small yellow sphere like real airsoft BBs)
  const bbGeo = new THREE.SphereGeometry(0.05, 4, 4);
  const bbMat = new THREE.MeshBasicMaterial({ color: 0xffff44 });
  const bbMesh = new THREE.Mesh(bbGeo, bbMat);
  bbMesh.position.copy(bbPos);
  Game.scene.add(bbMesh);

  Game.bbs.push({
    mesh: bbMesh,
    velocity: dir.multiplyScalar(w.velocity || BB_SPEED),
    life: BB_LIFETIME,
    damage: w.damage,
    owner: 'player'
  });

  // Muzzle flash
  createMuzzleFlash();

  // Auto reload when empty
  if (Game.weapon.ammo <= 0 && Game.weapon.reserve > 0) {
    startReload();
  }
}

function createMuzzleFlash() {
  const flashGeo = new THREE.SphereGeometry(0.08, 4, 4);
  const flashMat = new THREE.MeshBasicMaterial({ color: 0xffaa33 });
  const flash = new THREE.Mesh(flashGeo, flashMat);
  
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(Game.camera.quaternion);
  flash.position.copy(Game.camera.position).add(dir.clone().multiplyScalar(1.2));
  Game.scene.add(flash);
  
  setTimeout(() => { Game.scene.remove(flash); }, 50);
}

function startReload() {
  if (Game.weapon.isReloading || !Game.weapon.current) return;
  if (Game.weapon.current.category === 'melee') return;
  if (Game.weapon.ammo === Game.weapon.current.magSize) return;
  if (Game.weapon.reserve <= 0) return;

  Game.weapon.isReloading = true;
  Game.weapon.reloadTimer = Game.weapon.current.reloadTime;
  document.getElementById('reload-bar').style.display = 'block';
}

function updateReload(dt) {
  if (!Game.weapon.isReloading) return;
  Game.weapon.reloadTimer -= dt;
  
  const progress = 1 - (Game.weapon.reloadTimer / Game.weapon.current.reloadTime);
  document.getElementById('reload-progress').style.width = (progress * 100) + '%';

  if (Game.weapon.reloadTimer <= 0) {
    Game.weapon.isReloading = false;
    const needed = Game.weapon.current.magSize - Game.weapon.ammo;
    const available = Math.min(needed, Game.weapon.reserve);
    Game.weapon.ammo += available;
    Game.weapon.reserve -= available;
    document.getElementById('reload-bar').style.display = 'none';
  }
}

function segmentIntersectsAABB(start, end, lower, upper) {
  const dirX = end.x - start.x;
  const dirY = end.y - start.y;
  const dirZ = end.z - start.z;
  let tMin = 0;
  let tMax = 1;

  // Slab test on X axis
  if (Math.abs(dirX) < 1e-8) {
    if (start.x < lower.x || start.x > upper.x) return false;
  } else {
    const inv = 1 / dirX;
    let t1 = (lower.x - start.x) * inv;
    let t2 = (upper.x - start.x) * inv;
    if (t1 > t2) [t1, t2] = [t2, t1];
    tMin = Math.max(tMin, t1);
    tMax = Math.min(tMax, t2);
    if (tMin > tMax) return false;
  }

  // Slab test on Y axis
  if (Math.abs(dirY) < 1e-8) {
    if (start.y < lower.y || start.y > upper.y) return false;
  } else {
    const inv = 1 / dirY;
    let t1 = (lower.y - start.y) * inv;
    let t2 = (upper.y - start.y) * inv;
    if (t1 > t2) [t1, t2] = [t2, t1];
    tMin = Math.max(tMin, t1);
    tMax = Math.min(tMax, t2);
    if (tMin > tMax) return false;
  }

  // Slab test on Z axis
  if (Math.abs(dirZ) < 1e-8) {
    if (start.z < lower.z || start.z > upper.z) return false;
  } else {
    const inv = 1 / dirZ;
    let t1 = (lower.z - start.z) * inv;
    let t2 = (upper.z - start.z) * inv;
    if (t1 > t2) [t1, t2] = [t2, t1];
    tMin = Math.max(tMin, t1);
    tMax = Math.min(tMax, t2);
    if (tMin > tMax) return false;
  }

  return tMax >= 0 && tMin <= 1;
}

function getSegmentStaticCollision(prevPos, newPos) {
  if (!Game.world) return null;

  // First pass: physics raycast through the world for robust shape hits.
  const rayFrom = new CANNON.Vec3(prevPos.x, prevPos.y, prevPos.z);
  const rayTo = new CANNON.Vec3(newPos.x, newPos.y, newPos.z);
  const rayResult = new CANNON.RaycastResult();
  if (Game.world.raycastClosest(rayFrom, rayTo, {}, rayResult) && rayResult.body) {
    if (rayResult.body.mass === 0) {
      return {
        body: rayResult.body,
        point: new THREE.Vector3(
          rayResult.hitPointWorld.x,
          rayResult.hitPointWorld.y,
          rayResult.hitPointWorld.z
        ),
        normal: new THREE.Vector3(
          rayResult.hitNormalWorld.x,
          rayResult.hitNormalWorld.y,
          rayResult.hitNormalWorld.z
        ).normalize()
      };
    }
  }

  // Fallback: explicit segment-vs-AABB over static box colliders.
  for (let i = 0; i < Game.world.bodies.length; i++) {
    const body = Game.world.bodies[i];
    if (body.mass !== 0) continue;
    if (!body.shapes || body.shapes.length === 0) continue;
    if (body.shapes[0].type !== CANNON.Shape.types.BOX) continue;

    body.computeAABB();
    const lower = body.aabb.lowerBound;
    const upper = body.aabb.upperBound;

    if (segmentIntersectsAABB(prevPos, newPos, lower, upper)) {
      const travelDir = new THREE.Vector3().subVectors(newPos, prevPos);
      const normal = travelDir.lengthSq() > 1e-8
        ? travelDir.normalize().multiplyScalar(-1)
        : new THREE.Vector3(0, 1, 0);
      return { body, point: prevPos.clone(), normal };
    }
  }

  return null;
}

function segmentHitsStaticCollider(prevPos, newPos) {
  return !!getSegmentStaticCollision(prevPos, newPos);
}

function fastSegmentHitsStaticCollider(prevPos, newPos) {
  for (let i = 0; i < StaticCollisionCache.aabbs.length; i++) {
    const box = StaticCollisionCache.aabbs[i];
    if (segmentIntersectsAABB(prevPos, newPos, box.lower, box.upper)) {
      return true;
    }
  }
  return false;
}

function hasLineOfSight(fromPos, toPos) {
  return !segmentHitsStaticCollider(fromPos, toPos);
}

function updateBBs(dt) {
  for (let i = Game.bbs.length - 1; i >= 0; i--) {
    const bb = Game.bbs[i];
    bb.life -= dt;

    if (bb.life <= 0) {
      Game.scene.remove(bb.mesh);
      Game.bbs.splice(i, 1);
      continue;
    }

    // Apply gravity (BB drop - heavier than real bullets proportionally)
    bb.velocity.y -= BB_DROP * dt;

    // Apply wind
    bb.velocity.x += Game.wind.x * dt;
    bb.velocity.z += Game.wind.z * dt;

    // Move BB
    const prevPos = bb.mesh.position.clone();
    bb.mesh.position.add(bb.velocity.clone().multiplyScalar(dt));

    // Stop BBs on solid map geometry so walls/objects block shots.
    if (fastSegmentHitsStaticCollider(prevPos, bb.mesh.position)) {
      Game.scene.remove(bb.mesh);
      Game.bbs.splice(i, 1);
      continue;
    }

    // Check enemy hits
    if (bb.owner === 'player') {
      for (let j = Game.enemies.length - 1; j >= 0; j--) {
        const enemy = Game.enemies[j];
        if (!enemy.alive) continue;
        const dist = bb.mesh.position.distanceTo(enemy.mesh.position);
        if (dist < 1.5) {
          if (Game.isIndoor) {
            hitIndoorEnemy(j, bb.damage);
          } else {
            hitEnemy(j, bb.damage);
          }
          Game.scene.remove(bb.mesh);
          Game.bbs.splice(i, 1);
          showHitMarker();
          break;
        }
      }
    }
    // Check if BB hits player
    if (bb.owner === 'enemy') {
      const dist = bb.mesh.position.distanceTo(Game.camera.position);
      if (dist < 1.2) {
        damagePlayer(bb.damage);
        Game.scene.remove(bb.mesh);
        Game.bbs.splice(i, 1);
      }
    }

    // Remove if too far
    const mapBound = Game.isIndoor ? INDOOR_SIZE : MAP_SIZE;
    if (bb.mesh.position.y < -5 || bb.mesh.position.length() > mapBound) {
      Game.scene.remove(bb.mesh);
      Game.bbs.splice(i, 1);
    }
  }
}

function updateWeaponSway(dt) {
  if (!Game.weapon.weaponMesh) return;
  const time = Game.clock.elapsedTime;

  // Stick has its own wide swing animation, separate from gun sway/recoil.
  if (Game.weapon.current && Game.weapon.current.category === 'melee') {
    const moving = Game.keys['KeyW'] || Game.keys['KeyS'] || Game.keys['KeyA'] || Game.keys['KeyD'];
    const idleX = Math.sin(time * 1.2) * 0.01;
    const idleY = Math.cos(time * 1.8) * 0.007;
    const moveBob = moving ? Math.sin(time * 9) * 0.018 : 0;

    let swing = 0;
    if (Game.weapon.meleeSwingTimer > 0) {
      Game.weapon.meleeSwingTimer = Math.max(0, Game.weapon.meleeSwingTimer - dt);
      const t = 1 - (Game.weapon.meleeSwingTimer / Game.weapon.meleeSwingDuration);
      // Fast forward strike then recover.
      swing = Math.sin(Math.min(1, t) * Math.PI);
    }

    Game.weapon.weaponMesh.position.x = 0.22 + idleX + moveBob * 0.3 + swing * 0.12;
    Game.weapon.weaponMesh.position.y = -0.18 + idleY + Math.abs(moveBob) * 0.25 - swing * 0.05;
    Game.weapon.weaponMesh.position.z = -0.28 - swing * 0.18;

    Game.weapon.weaponMesh.rotation.x = -0.15 - swing * 0.45;
    Game.weapon.weaponMesh.rotation.y = 0.1 + swing * 0.95;
    Game.weapon.weaponMesh.rotation.z = -0.08 - swing * 0.55;
    return;
  }
  
  // Idle sway
  const swayX = Math.sin(time * 1.5) * 0.003;
  const swayY = Math.cos(time * 2.0) * 0.002;
  
  // Movement bob
  const moving = Game.keys['KeyW'] || Game.keys['KeyS'] || Game.keys['KeyA'] || Game.keys['KeyD'];
  const bobAmt = moving ? (Game.player.isSprinting ? 0.015 : 0.008) : 0;
  const bobX = Math.sin(time * 8) * bobAmt;
  const bobY = Math.abs(Math.cos(time * 8)) * bobAmt;

  // Recoil recovery
  Game.weapon.recoilOffset *= 0.85;

  Game.weapon.weaponMesh.position.x = 0.25 + swayX + bobX;
  Game.weapon.weaponMesh.position.y = -0.2 + swayY + bobY - Game.weapon.recoilOffset;
  Game.weapon.weaponMesh.position.z = -0.3 + Game.weapon.recoilOffset * 0.5;
}

// ============ AI ENEMIES ============
function spawnEnemies() {
  const enemyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.7 });
  const headMat = new THREE.MeshStandardMaterial({ color: 0xddaa88, roughness: 0.8 });

  for (let i = 0; i < MAX_ENEMIES; i++) {
    const group = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.BoxGeometry(0.8, 1.4, 0.5);
    const body = new THREE.Mesh(bodyGeo, enemyMat);
    body.position.y = 0.7;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.3, 8, 8);
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.7;
    head.castShadow = true;
    group.add(head);

    // Gun
    const gunGeo = new THREE.BoxGeometry(0.06, 0.06, 0.6);
    const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6 });
    const gun = new THREE.Mesh(gunGeo, gunMat);
    gun.position.set(0.35, 0.9, -0.3);
    group.add(gun);

    // Position randomly (farther away for easier start)
    const angle = Math.random() * Math.PI * 2;
    const r = 60 + Math.random() * 80;
    group.position.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
    Game.scene.add(group);

    // Physics body
    const shape = new CANNON.Sphere(0.8);
    const physBody = new CANNON.Body({ mass: 70, shape, linearDamping: 0.9 });
    physBody.position.copy(group.position);
    physBody.position.y = 1;
    physBody.fixedRotation = true;
    Game.world.addBody(physBody);

    Game.enemies.push({
      mesh: group,
      body: physBody,
      health: 100,
      alive: true,
      fireTimer: 0,
      fireRate: 0.8 + Math.random() * 0.7, // Slower fire rate
      damage: 5 + Math.random() * 5, // Reduced damage (5-10)
      speed: 3 + Math.random() * 3,
      state: 'patrol', // patrol, chase, take_cover
      patrolTarget: null,
      alertTimer: 0,
      team: 'bravo',
      name: 'Bot-' + (i + 1)
    });
  }
}

function updateEnemies(dt) {
  const playerPos = Game.camera.position;

  Game.enemies.forEach((enemy, idx) => {
    if (!enemy.alive) {
      enemy.mesh.visible = false;
      return;
    }

    const ePos = enemy.mesh.position;
    const dist = ePos.distanceTo(playerPos);
    const dirToPlayer = new THREE.Vector3().subVectors(playerPos, ePos).normalize();

    // State machine (reduced detection range)
    if (dist < 60 && Game.player.isAlive) {
      enemy.state = 'chase';
      enemy.alertTimer = 5;
    } else if (enemy.alertTimer > 0) {
      enemy.alertTimer -= dt;
      enemy.state = 'chase';
    } else {
      enemy.state = 'patrol';
    }

    if (enemy.state === 'patrol') {
      // Random patrol
      if (!enemy.patrolTarget || ePos.distanceTo(enemy.patrolTarget) < 3) {
        enemy.patrolTarget = new THREE.Vector3(
          (Math.random() - 0.5) * MAP_SIZE * 0.7,
          0,
          (Math.random() - 0.5) * MAP_SIZE * 0.7
        );
      }
      const moveDir = new THREE.Vector3().subVectors(enemy.patrolTarget, ePos).normalize();
      enemy.body.velocity.x = moveDir.x * enemy.speed * 0.5;
      enemy.body.velocity.z = moveDir.z * enemy.speed * 0.5;
      
      // Face movement direction
      enemy.mesh.rotation.y = Math.atan2(moveDir.x, moveDir.z);
    }

    if (enemy.state === 'chase') {
      // Move toward player if far, strafe if close
      enemy.mesh.rotation.y = Math.atan2(dirToPlayer.x, dirToPlayer.z);

      if (dist > 20) {
        enemy.body.velocity.x = dirToPlayer.x * enemy.speed;
        enemy.body.velocity.z = dirToPlayer.z * enemy.speed;
      } else if (dist > 8) {
        // Strafe while shooting
        const strafe = new THREE.Vector3(-dirToPlayer.z, 0, dirToPlayer.x);
        strafe.multiplyScalar(Math.sin(Game.clock.elapsedTime * 2 + idx) * enemy.speed * 0.7);
        enemy.body.velocity.x = strafe.x;
        enemy.body.velocity.z = strafe.z;
      } else {
        // Back up if too close
        enemy.body.velocity.x = -dirToPlayer.x * enemy.speed * 0.5;
        enemy.body.velocity.z = -dirToPlayer.z * enemy.speed * 0.5;
      }

      // Shoot at player
      enemy.fireTimer -= dt;
      if (enemy.fireTimer <= 0 && dist < 100 && Game.player.isAlive) {
        enemy.fireTimer = enemy.fireRate;
        enemyShoot(enemy, dirToPlayer);
      }
    }

    // Sync mesh to physics
    enemy.mesh.position.x = enemy.body.position.x;
    enemy.mesh.position.z = enemy.body.position.z;
    enemy.mesh.position.y = enemy.body.position.y - 1;

    // Keep in bounds
    enemy.body.position.x = Math.max(-HALF_MAP + 5, Math.min(HALF_MAP - 5, enemy.body.position.x));
    enemy.body.position.z = Math.max(-HALF_MAP + 5, Math.min(HALF_MAP - 5, enemy.body.position.z));
  });
}

function enemyShoot(enemy, dir) {
  const ePos = enemy.mesh.position.clone();
  ePos.y += 1.2;

  // Enemy accuracy (with spread) - increased for easier gameplay
  const spread = 0.15;
  dir.x += (Math.random() - 0.5) * spread;
  dir.y += (Math.random() - 0.5) * spread;
  dir.z += (Math.random() - 0.5) * spread;
  dir.normalize();

  const bbGeo = new THREE.SphereGeometry(0.05, 4, 4);
  const bbMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
  const bbMesh = new THREE.Mesh(bbGeo, bbMat);
  bbMesh.position.copy(ePos);
  Game.scene.add(bbMesh);

  Game.bbs.push({
    mesh: bbMesh,
    velocity: dir.multiplyScalar(BB_SPEED * 0.8),
    life: BB_LIFETIME,
    damage: enemy.damage,
    owner: 'enemy'
  });
}

function hitEnemy(index, damage) {
  const enemy = Game.enemies[index];
  enemy.health -= damage;
  enemy.alertTimer = 8; // Alert when hit
  
  // Flash red
  enemy.mesh.children[0].material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
  setTimeout(() => {
    if (enemy.alive) enemy.mesh.children[0].material = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.7 });
  }, 100);

  if (enemy.health <= 0) {
    enemy.alive = false;
    enemy.mesh.visible = false;
    Game.player.kills++;
    Game.player.score += 100;
    Game.player.xp += 50;
    addKillFeedEntry('You', enemy.name);
    showNotification('+100 Score');

    // Respawn enemy after delay
    setTimeout(() => {
      enemy.health = 100;
      enemy.alive = true;
      enemy.mesh.visible = true;
      const angle = Math.random() * Math.PI * 2;
      const r = 50 + Math.random() * 80;
      enemy.body.position.set(Math.cos(angle) * r, 2, Math.sin(angle) * r);
    }, RESPAWN_TIME * 1000);
  }
}

// ============ MINIMAP ============
function initMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  Game.minimapCtx = canvas.getContext('2d');
}

function updateMinimap() {
  const ctx = Game.minimapCtx;
  if (!ctx) return;

  const size = 160;
  const scale = size / MAP_SIZE;

  ctx.clearRect(0, 0, size, size);

  // Background
  ctx.fillStyle = 'rgba(30, 40, 30, 0.8)';
  ctx.fillRect(0, 0, size, size);

  // Grid
  ctx.strokeStyle = 'rgba(100, 100, 100, 0.3)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < size; i += 20) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
  }

  // Buildings
  ctx.fillStyle = 'rgba(150, 150, 130, 0.6)';
  Game.buildings.forEach(b => {
    const mx = (b.x + HALF_MAP) * scale;
    const mz = (b.z + HALF_MAP) * scale;
    ctx.fillRect(mx - b.w * scale / 2, mz - b.d * scale / 2, b.w * scale, b.d * scale);
  });

  // Enemies (red dots)
  ctx.fillStyle = '#ff3333';
  Game.enemies.forEach(e => {
    if (!e.alive) return;
    const mx = (e.mesh.position.x + HALF_MAP) * scale;
    const mz = (e.mesh.position.z + HALF_MAP) * scale;
    ctx.beginPath();
    ctx.arc(mx, mz, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Player (green arrow)
  const px = (Game.camera.position.x + HALF_MAP) * scale;
  const pz = (Game.camera.position.z + HALF_MAP) * scale;
  ctx.save();
  ctx.translate(px, pz);
  ctx.rotate(-Game.yaw);
  ctx.fillStyle = '#44ff44';
  ctx.beginPath();
  ctx.moveTo(0, -5);
  ctx.lineTo(-3, 4);
  ctx.lineTo(3, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ============ GAME MODES ============
const Modes = {
  // Team Deathmatch: first to kill limit or most kills at timer end
  tdm: {
    killLimit: 30,
    init() { showNotification('Team Deathmatch - First to 30 eliminations!'); },
    update(dt) {
      if (Game.player.kills >= this.killLimit) endMatch(true);
    }
  },

  // Capture the Flag
  ctf: {
    flagMeshA: null, flagMeshB: null,
    flagPosA: new THREE.Vector3(-80, 0, 0),
    flagPosB: new THREE.Vector3(80, 0, 0),
    capturesA: 0, capturesB: 0, captureLimit: 3,
    playerHasFlag: false,
    init() {
      showNotification('Capture the Flag - Grab enemy flag and return!');
      // Create flags
      this.flagMeshA = createFlag(this.flagPosA, 0x4444ff);
      this.flagMeshB = createFlag(this.flagPosB, 0xff4444);
    },
    update(dt) {
      if (!this.flagMeshB) return;
      // Player grabs enemy flag
      const dist = Game.camera.position.distanceTo(this.flagPosB);
      if (dist < 4 && !this.playerHasFlag) {
        this.playerHasFlag = true;
        this.flagMeshB.visible = false;
        showNotification('Flag captured! Return to base!');
      }
      // Return flag
      if (this.playerHasFlag) {
        const homeDist = Game.camera.position.distanceTo(this.flagPosA);
        if (homeDist < 4) {
          this.capturesA++;
          this.playerHasFlag = false;
          this.flagMeshB.visible = true;
          this.flagMeshB.position.copy(this.flagPosB);
          Game.player.score += 500;
          showNotification('Flag returned! Score: ' + this.capturesA + '/' + this.captureLimit);
          if (this.capturesA >= this.captureLimit) endMatch(true);
        }
      }
    }
  },

  // King of the Hill
  koth: {
    zoneMesh: null,
    zonePos: new THREE.Vector3(0, 0, 0),
    zoneRadius: 15,
    controlTime: 0,
    controlTarget: 60,
    init() {
      showNotification('King of the Hill - Control the zone for 60 seconds!');
      const geo = new THREE.CylinderGeometry(this.zoneRadius, this.zoneRadius, 0.2, 32);
      const mat = new THREE.MeshStandardMaterial({ color: 0xffaa00, transparent: true, opacity: 0.3 });
      this.zoneMesh = new THREE.Mesh(geo, mat);
      this.zoneMesh.position.copy(this.zonePos);
      Game.scene.add(this.zoneMesh);
      // Zone pillar markers
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2;
        const pGeo = new THREE.CylinderGeometry(0.3, 0.3, 5, 6);
        const pMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        const p = new THREE.Mesh(pGeo, pMat);
        p.position.set(Math.cos(a) * this.zoneRadius, 2.5, Math.sin(a) * this.zoneRadius);
        Game.scene.add(p);
      }
    },
    update(dt) {
      const dist = new THREE.Vector2(
        Game.camera.position.x - this.zonePos.x,
        Game.camera.position.z - this.zonePos.z
      ).length();
      if (dist < this.zoneRadius) {
        this.controlTime += dt;
        this.zoneMesh.material.color.setHex(0x44ff44);
        if (this.controlTime >= this.controlTarget) endMatch(true);
      } else {
        this.zoneMesh.material.color.setHex(0xffaa00);
      }
    }
  },

  // Battle Royale
  br: {
    zoneMesh: null,
    zoneRadius: HALF_MAP,
    shrinkRate: 5,
    minRadius: 20,
    damageRate: 10,
    init() {
      showNotification('Battle Royale - Stay inside the shrinking zone!');
      const geo = new THREE.RingGeometry(this.zoneRadius - 1, this.zoneRadius, 64);
      const mat = new THREE.MeshBasicMaterial({ color: 0x4444ff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
      this.zoneMesh = new THREE.Mesh(geo, mat);
      this.zoneMesh.rotation.x = -Math.PI / 2;
      this.zoneMesh.position.y = 0.5;
      Game.scene.add(this.zoneMesh);
    },
    update(dt) {
      // Shrink zone
      if (this.zoneRadius > this.minRadius) {
        this.zoneRadius -= this.shrinkRate * dt;
        // Update visual
        Game.scene.remove(this.zoneMesh);
        const geo = new THREE.RingGeometry(this.zoneRadius - 1, this.zoneRadius + 2, 64);
        const mat = new THREE.MeshBasicMaterial({ color: 0x4444ff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
        this.zoneMesh = new THREE.Mesh(geo, mat);
        this.zoneMesh.rotation.x = -Math.PI / 2;
        this.zoneMesh.position.y = 0.5;
        Game.scene.add(this.zoneMesh);
      }
      // Damage outside zone
      const playerDist = new THREE.Vector2(Game.camera.position.x, Game.camera.position.z).length();
      if (playerDist > this.zoneRadius) {
        damagePlayer(this.damageRate * dt);
      }
    }
  }
};

function createFlag(pos, color) {
  const group = new THREE.Group();
  // Pole
  const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 5, 6);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.y = 2.5;
  group.add(pole);
  // Flag cloth
  const flagGeo = new THREE.PlaneGeometry(2, 1.2);
  const flagMat = new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide });
  const flag = new THREE.Mesh(flagGeo, flagMat);
  flag.position.set(1, 4.2, 0);
  group.add(flag);
  group.position.copy(pos);
  Game.scene.add(group);
  return group;
}
