// ============ POWER-UPS ============
function spawnPowerUps() {
  const types = [
    { type: 'speed', color: 0x44aaff, label: 'SPEED BOOST' },
    { type: 'shield', color: 0xffaa00, label: 'SHIELD' },
    { type: 'ammo', color: 0x44ff44, label: 'AMMO CRATE' },
    { type: 'health', color: 0xff4444, label: 'HEALTH PACK' }
  ];

  for (let i = 0; i < 12; i++) {
    const t = types[i % types.length];
    const angle = (i / 12) * Math.PI * 2;
    const r = 30 + Math.random() * 80;
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;

    const group = new THREE.Group();
    const boxGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
    const boxMat = new THREE.MeshStandardMaterial({
      color: t.color, transparent: true, opacity: 0.7,
      emissive: t.color, emissiveIntensity: 0.3
    });
    const box = new THREE.Mesh(boxGeo, boxMat);
    group.add(box);
    group.position.set(x, 1, z);
    Game.scene.add(group);

    Game.powerUps.push({
      mesh: group,
      type: t.type,
      label: t.label,
      active: true,
      respawnTimer: 0
    });
  }
}

function updatePowerUps(dt) {
  Game.powerUps.forEach(pu => {
    if (!pu.active) {
      pu.respawnTimer -= dt;
      if (pu.respawnTimer <= 0) {
        pu.active = true;
        pu.mesh.visible = true;
      }
      return;
    }

    // Spin animation
    pu.mesh.rotation.y += dt * 1.5;
    pu.mesh.position.y = 1 + Math.sin(Game.clock.elapsedTime * 2) * 0.3;

    // Check player pickup
    const dist = Game.camera.position.distanceTo(pu.mesh.position);
    if (dist < 2.5) {
      pickupPowerUp(pu);
    }
  });
}

function pickupPowerUp(pu) {
  pu.active = false;
  pu.mesh.visible = false;
  pu.respawnTimer = 20; // 20 second respawn

  switch (pu.type) {
    case 'speed':
      showNotification('Speed Boost! (10s)');
      Game.player.speed *= 1.5;
      setTimeout(() => { Game.player.speed = 10 * GEAR[selectedGear].speedMult; }, 10000);
      break;
    case 'shield':
      showNotification('Shield Active! +50 Armor');
      Game.player.armor = Math.min(100, Game.player.armor + 50);
      break;
    case 'ammo':
      showNotification('Ammo Resupplied!');
      if (Game.weapon.current) {
        Game.weapon.reserve = Game.weapon.current.reserveAmmo;
      }
      break;
    case 'health':
      showNotification('Health Restored!');
      Game.player.health = Math.min(100, Game.player.health + 50);
      break;
  }
  Game.player.score += 25;
}

// ============ ABILITIES ============
let abilityCooldowns = { scanner: 0, smoke: 0, flash: 0 };

function useAbility(type) {
  if (abilityCooldowns[type] > 0) return;

  switch (type) {
    case 'scanner':
      abilityCooldowns.scanner = 15;
      showNotification('Tactical Scanner Activated!');
      // Briefly show enemies on minimap with highlighting
      Game.enemies.forEach(e => {
        if (!e.alive) return;
        const marker = new THREE.Mesh(
          new THREE.SphereGeometry(1.5, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.4, wireframe: true })
        );
        marker.position.copy(e.mesh.position);
        marker.position.y += 2;
        Game.scene.add(marker);
        setTimeout(() => Game.scene.remove(marker), 3000);
      });
      break;

    case 'smoke':
      abilityCooldowns.smoke = 20;
      showNotification('Smoke Grenade Deployed!');
      createSmoke(Game.camera.position.clone());
      break;

    case 'flash':
      abilityCooldowns.flash = 25;
      showNotification('Flashbang!');
      // White flash overlay
      const overlay = document.getElementById('damage-overlay');
      overlay.style.background = 'rgba(255,255,255,0.9)';
      overlay.style.opacity = 1;
      setTimeout(() => { overlay.style.opacity = 0; }, 300);
      setTimeout(() => { overlay.style.background = 'radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0) 100%)'; }, 400);
      // Stun nearby enemies
      Game.enemies.forEach(e => {
        if (!e.alive) return;
        if (e.mesh.position.distanceTo(Game.camera.position) < 25) {
          e.fireTimer = 4; // Can't shoot for 4 seconds
        }
      });
      break;
  }
}

function updateCooldowns(dt) {
  for (const key in abilityCooldowns) {
    if (abilityCooldowns[key] > 0) abilityCooldowns[key] -= dt;
  }
}

function createSmoke(pos) {
  const particles = [];
  for (let i = 0; i < 40; i++) {
    const geo = new THREE.SphereGeometry(0.8 + Math.random() * 1.2, 6, 6);
    const mat = new THREE.MeshBasicMaterial({
      color: 0xaaaaaa, transparent: true, opacity: 0.5
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.set(
      pos.x + (Math.random() - 0.5) * 6,
      pos.y + Math.random() * 4,
      pos.z + (Math.random() - 0.5) * 6
    );
    Game.scene.add(p);
    particles.push({ mesh: p, life: 6 + Math.random() * 2 });
  }
  Game.particles.push(...particles);
}

function throwGrenade() {
  showNotification('Grenade thrown!');
  const dir = new THREE.Vector3(0, 0.3, -1);
  dir.applyQuaternion(Game.camera.quaternion);
  dir.normalize();

  const pos = Game.camera.position.clone().add(dir.clone().multiplyScalar(2));

  // Grenade mesh
  const geo = new THREE.SphereGeometry(0.15, 6, 6);
  const mat = new THREE.MeshStandardMaterial({ color: 0x336633 });
  const gren = new THREE.Mesh(geo, mat);
  gren.position.copy(pos);
  Game.scene.add(gren);

  const vel = dir.multiplyScalar(30);
  const grenade = { mesh: gren, velocity: vel, life: 2.5 };
  
  // Animate grenade
  const grenUpdate = setInterval(() => {
    grenade.life -= 0.016;
    grenade.velocity.y -= 15 * 0.016;

    const prevPos = grenade.mesh.position.clone();
    grenade.mesh.position.add(grenade.velocity.clone().multiplyScalar(0.016));

    // Bounce/stop on solid map geometry so grenades cannot pass through walls.
    const hit = getSegmentStaticCollision(prevPos, grenade.mesh.position);
    if (hit) {
      const normal = hit.normal && hit.normal.lengthSq() > 1e-8
        ? hit.normal.clone().normalize()
        : new THREE.Vector3(0, 1, 0);

      if (hit.point) {
        grenade.mesh.position.copy(hit.point.clone().add(normal.clone().multiplyScalar(0.03)));
      } else {
        grenade.mesh.position.copy(prevPos);
      }

      // Angle-aware ricochet: reflect velocity around collision normal.
      const incoming = grenade.velocity.clone();
      const vn = incoming.dot(normal);
      if (vn < 0) {
        const reflected = incoming.sub(normal.clone().multiplyScalar(2 * vn));
        const restitution = 0.45;   // bounciness on the normal axis
        const tangentialDrag = 0.82; // friction along the surface
        const normalPart = normal.clone().multiplyScalar(reflected.dot(normal));
        const tangentPart = reflected.clone().sub(normalPart);
        grenade.velocity.copy(
          tangentPart.multiplyScalar(tangentialDrag)
            .add(normalPart.multiplyScalar(restitution))
        );
      } else {
        grenade.velocity.multiplyScalar(0.7);
      }

      // If almost stopped, settle in place.
      if (grenade.velocity.lengthSq() < 1.0) {
        grenade.velocity.set(0, Math.max(0, grenade.velocity.y), 0);
      }
    }

    if (grenade.mesh.position.y < 0.15) {
      grenade.mesh.position.y = 0.15;
      grenade.velocity.y *= -0.3;
      grenade.velocity.x *= 0.7;
      grenade.velocity.z *= 0.7;
    }
    if (grenade.life <= 0) {
      clearInterval(grenUpdate);
      // Explosion
      createExplosion(grenade.mesh.position.clone());
      Game.scene.remove(grenade.mesh);
      // Damage enemies in radius
      Game.enemies.forEach((e, idx) => {
        if (!e.alive) return;
        const d = e.mesh.position.distanceTo(grenade.mesh.position);
        if (d < 12 && hasLineOfSight(grenade.mesh.position, e.mesh.position)) {
          if (Game.isIndoor) hitIndoorEnemy(idx, 60 * (1 - d / 12));
          else hitEnemy(idx, 60 * (1 - d / 12));
        }
      });
      // Damage player
      const pd = Game.camera.position.distanceTo(grenade.mesh.position);
      if (pd < 12 && hasLineOfSight(grenade.mesh.position, Game.camera.position)) {
        damagePlayer(50 * (1 - pd / 12));
      }
    }
  }, 16);
}

function createExplosion(pos) {
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.SphereGeometry(0.3 + Math.random() * 0.5, 4, 4);
    const mat = new THREE.MeshBasicMaterial({
      color: Math.random() > 0.5 ? 0xff6600 : 0xffaa00,
      transparent: true, opacity: 0.8
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.position.add(new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      Math.random() * 5,
      (Math.random() - 0.5) * 4
    ));
    Game.scene.add(p);
    Game.particles.push({ mesh: p, life: 0.5 + Math.random() * 0.5 });
  }
}

function updateParticles(dt) {
  for (let i = Game.particles.length - 1; i >= 0; i--) {
    const p = Game.particles[i];
    p.life -= dt;
    p.mesh.material.opacity = Math.max(0, p.life / 3);
    p.mesh.position.y += dt * 0.5;
    if (p.life <= 0) {
      Game.scene.remove(p.mesh);
      Game.particles.splice(i, 1);
    }
  }
}

function interactNearby() {
  // Placeholder for interaction logic (doors, switches, etc.)
  showNotification('Nothing to interact with.');
}

// ============ WEATHER SYSTEM ============
let weatherState = 'clear';
let weatherTimer = 30;
let rainParticles = [];

function updateWeather(dt) {
  weatherTimer -= dt;
  if (weatherTimer <= 0) {
    weatherTimer = 30 + Math.random() * 40;
    const weathers = ['clear', 'rain', 'fog', 'windy'];
    weatherState = weathers[Math.floor(Math.random() * weathers.length)];
    applyWeather();
  }

  // Wind variation
  Game.wind.x += (Math.random() - 0.5) * 0.5 * dt;
  Game.wind.z += (Math.random() - 0.5) * 0.5 * dt;
  Game.wind.x = Math.max(-3, Math.min(3, Game.wind.x));
  Game.wind.z = Math.max(-3, Math.min(3, Game.wind.z));

  // Update rain
  if (weatherState === 'rain') {
    updateRain(dt);
  }
}

function applyWeather() {
  // Clear old rain
  rainParticles.forEach(p => Game.scene.remove(p));
  rainParticles = [];

  switch (weatherState) {
    case 'clear':
      Game.scene.fog = new THREE.FogExp2(0x87ceeb, 0.003);
      Game.wind.x = 0; Game.wind.z = 0;
      break;
    case 'rain':
      Game.scene.fog = new THREE.FogExp2(0x667788, 0.006);
      showNotification('Rain starting...');
      createRain();
      break;
    case 'fog':
      Game.scene.fog = new THREE.FogExp2(0x999999, 0.015);
      showNotification('Fog rolling in...');
      break;
    case 'windy':
      Game.scene.fog = new THREE.FogExp2(0x87ceeb, 0.004);
      Game.wind.x = (Math.random() - 0.5) * 6;
      Game.wind.z = (Math.random() - 0.5) * 6;
      showNotification('Strong winds! BB accuracy reduced.');
      break;
  }
}

function createRain() {
  const rainGeo = new THREE.BufferGeometry();
  const rainCount = 2000;
  const positions = new Float32Array(rainCount * 3);
  for (let i = 0; i < rainCount * 3; i += 3) {
    positions[i] = (Math.random() - 0.5) * 200;
    positions[i + 1] = Math.random() * 80;
    positions[i + 2] = (Math.random() - 0.5) * 200;
  }
  rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const rainMat = new THREE.PointsMaterial({ color: 0xaaaacc, size: 0.15, transparent: true, opacity: 0.5 });
  const rain = new THREE.Points(rainGeo, rainMat);
  Game.scene.add(rain);
  rainParticles.push(rain);
}

function updateRain(dt) {
  rainParticles.forEach(rain => {
    const pos = rain.geometry.attributes.position.array;
    for (let i = 1; i < pos.length; i += 3) {
      pos[i] -= 40 * dt;
      if (pos[i] < 0) pos[i] = 80;
    }
    rain.geometry.attributes.position.needsUpdate = true;
    // Move rain with player
    rain.position.x = Game.camera.position.x;
    rain.position.z = Game.camera.position.z;
  });
}

// ============ START GAME ============
function startGame() {
  // Hide menus
  document.getElementById('loadout-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('hud').style.display = 'block';

  // Init systems (only on first start)
  if (!Game.scene) {
    initScene();
    initPhysics();
    initInput();
    initMinimap();
  } else {
    // Clear old entities for restart
    Game.enemies.forEach(e => { Game.scene.remove(e.mesh); Game.world.removeBody(e.body); });
    Game.enemies = [];
    Game.bbs.forEach(b => Game.scene.remove(b.mesh));
    Game.bbs = [];
    Game.particles.forEach(p => Game.scene.remove(p.mesh));
    Game.particles = [];
    Game.powerUps.forEach(p => Game.scene.remove(p.mesh));
    Game.powerUps = [];
    Game.buildPieces.forEach(p => {
      Game.scene.remove(p.mesh);
      if (p.body) Game.world.removeBody(p.body);
    });
    Game.buildPieces = [];
    // Remove old player body
    if (Game.player.body) Game.world.removeBody(Game.player.body);
    // Remove old body mesh
    if (Game.player.bodyMesh) {
      Game.camera.remove(Game.player.bodyMesh);
      Game.player.bodyMesh = null;
    }
  }

  // Build map based on indoor/outdoor selection
  if (Game.isIndoor) {
    // Clear any outdoor objects if present
    if (Game.buildings.length > 0) {
      // Outdoor map was loaded before — we need a fresh scene
      // For simplicity, rebuild scene
    }
    // Build indoor facility
    buildIndoorEnvironment();
  } else {
    if (typeof clearIndoorEnvironment === 'function') {
      clearIndoorEnvironment();
    }
    // Outdoor map (only first time or reuse)
    if (Game.buildings.length === 0) {
      createTerrain();
      createBuildings();
      createCover();
      createTrees();
      createBoundaryMarkers();
    }
  }

  // Indoor quality profile: lower render workload for smoother local FPS.
  if (Game.isIndoor) {
    Game.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.25));
    Game.renderer.shadowMap.enabled = false;
    Game.renderer.toneMappingExposure = Game.darkMode ? 0.22 : 0.9;
  } else {
    Game.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    Game.renderer.shadowMap.enabled = true;
    Game.renderer.toneMappingExposure = 1.0;
  }

  // Rebuild static collision cache after map geometry changes.
  rebuildStaticCollisionCache();

  // Init player, weapons, enemies
  initPlayer();

  // Override spawn position for indoor
  if (Game.isIndoor) {
    const sp = getIndoorSpawnPosition();
    Game.player.body.position.set(sp.x, sp.y, sp.z);
  }

  equipWeapon(selectedWeapon);
  equipSecondary();

  // Spawn enemies and power-ups based on map
  if (Game.isIndoor) {
    spawnIndoorEnemies();
    spawnIndoorPowerUps();
    IndoorRules.apply();
  } else {
    spawnEnemies();
    spawnPowerUps();
  }

  // Reset match state
  Game.matchTimer = Game.isIndoor ? IndoorRules.matchTime : MATCH_TIME;
  Game.player.kills = 0;
  Game.player.deaths = 0;
  Game.player.score = 0;
  abilityCooldowns = { scanner: 0, smoke: 0, flash: 0 };
  weatherState = 'clear';
  weatherTimer = 30;

  // Init game mode
  if (Modes[Game.mode] && Modes[Game.mode].init) {
    Modes[Game.mode].init();
  }

  Game.active = true;
  Game.paused = false;

  // Request pointer lock
  Game.renderer.domElement.requestPointerLock();

  // Start game loop if not already running
  if (!Game.loopRunning) {
    Game.loopRunning = true;
    gameLoop();
  }
}

// ============ GAME LOOP ============
function gameLoop() {
  requestAnimationFrame(gameLoop);

  if (!Game.active || Game.paused) {
    Game.clock.getDelta(); // consume delta to prevent accumulation
    return;
  }

  const dt = Math.min(Game.clock.getDelta(), 0.05); // cap delta

  // Physics step
  Game.world.step(1 / 60, dt, 3);

  // Player update
  updatePlayer(dt);

  // Weapon
  if (Game.mouseDown && Game.weapon.current && !Game.build.mode) {
    shoot(dt);
  }
  Game.weapon.fireTimer -= dt;
  updateReload(dt);
  updateWeaponSway(dt);
  updateBBs(dt);

  // Enemies (indoor vs outdoor AI)
  if (Game.isIndoor) {
    updateIndoorEnemies(dt);
    if (Game.darkMode && typeof updateDarkMode === 'function') {
      updateDarkMode(dt);
    }
    IndoorRules.checkBangBang(dt);
  } else {
    updateEnemies(dt);
  }

  // Power-ups
  updatePowerUps(dt);

  // Particles
  updateParticles(dt);

  // Cooldowns
  updateCooldowns(dt);

  // Weather (skip indoors)
  if (!Game.isIndoor) {
    updateWeather(dt);
  }

  // Game mode
  if (Modes[Game.mode] && Modes[Game.mode].update) {
    Modes[Game.mode].update(dt);
  }

  // Match timer
  Game.matchTimer -= dt;
  if (Game.matchTimer <= 0) {
    endMatch(Game.player.kills > 0);
  }

  // HUD
  updateHUD();
  if (Game.isIndoor) {
    updateIndoorMinimap();
  } else {
    updateMinimap();
  }

  // Render
  Game.renderer.render(Game.scene, Game.camera);
}

// ============ ENTRY POINT ============
// Nothing starts until player clicks a mode button
// The menu is shown by default via CSS
